<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ANYWAY. — Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#111110; --cream:#F6F4EE; --gold:#D4A419; --grey:#6E6A61;
    --hairline:rgba(17,17,16,.28); --panel:#F1EEE5;
    /* vertical accents (reserved for future) */
    --cobalt:#3B77C2; --magenta:#B8438A; --verde:#3E9B4F;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--cream);color:var(--ink);}
  body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;font-size:16px;}
  .hide{display:none !important;}
  button{-webkit-tap-highlight-color:transparent;font-family:inherit;}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  input,textarea{border-radius:0;}

  .app{max-width:560px;margin:0 auto;padding:0 20px 90px;}

  .top{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:.5px solid var(--hairline);}
  .mark{font-family:'Archivo Black',sans-serif;font-size:20px;letter-spacing:-.01em;}
  .mark span{color:var(--gold);}
  .top-right{display:flex;align-items:center;gap:14px;}
  .date{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);}
  .lockbtn{background:none;border:.5px solid var(--hairline);color:var(--grey);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 9px;cursor:pointer;}
  .lockbtn:hover{border-color:var(--ink);color:var(--ink);}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);}

  .score{display:flex;justify-content:space-between;align-items:center;padding:22px 0 18px;border-bottom:.5px solid var(--hairline);}
  .score-left{display:flex;align-items:center;gap:16px;}
  .big-num{font-family:'Archivo Black',sans-serif;font-size:44px;line-height:1;}
  .big-num.done{color:var(--gold);}
  .score-sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);margin-top:4px;}
  .score-sub button{background:none;border:none;color:var(--grey);text-decoration:underline;cursor:pointer;font:inherit;letter-spacing:inherit;text-transform:inherit;}
  .score-sub button:hover{color:var(--ink);}
  .mini-square{width:26px;height:26px;border:2px solid var(--ink);transition:all .3s ease;}
  .mini-square.done{background:var(--gold);border-color:var(--gold);transform:rotate(90deg);}
  .streak-num{font-family:'Archivo Black',sans-serif;font-size:16px;text-align:right;}
  .streak-num i{font-style:normal;color:var(--gold);}

  .warm{padding:26px 0 0;}
  .warm-title{font-family:'Archivo Black',sans-serif;font-size:16px;text-transform:uppercase;color:var(--gold);}
  .warm-sub{font-size:13px;color:var(--grey);margin:2px 0 12px;}
  .wcard{border:1.5px solid var(--gold);margin-bottom:10px;background:var(--cream);padding:13px 14px;}
  .wname{font-weight:600;font-size:15px;}
  .wmeta{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);margin:3px 0 10px;}
  .wactions{display:flex;gap:8px;flex-wrap:wrap;}
  .wbtn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--ink);background:none;padding:8px 12px;cursor:pointer;color:var(--ink);}
  .wbtn.gold{background:var(--gold);border-color:var(--gold);}
  .wbtn:hover{background:var(--ink);color:var(--cream);}
  .wbtn.quiet{border-color:var(--hairline);color:var(--grey);}
  .wbtn.quiet:hover{background:none;color:var(--ink);border-color:var(--ink);}

  .queue{padding:28px 0 6px;}
  .queue-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .queue-title{font-family:'Archivo Black',sans-serif;font-size:22px;text-transform:uppercase;}
  .queue-sub{font-size:13.5px;color:var(--grey);margin:4px 0 18px;}
  .qcard{border:.5px solid var(--hairline);margin-bottom:10px;background:var(--cream);}
  .qcard.overdue{border-left:3px solid var(--gold);}
  .qmain{display:flex;justify-content:space-between;align-items:center;padding:14px 14px;gap:10px;}
  .qwho{min-width:0;}
  .qname{font-weight:600;font-size:15px;}
  .qmeta{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);margin-top:3px;}
  .qactions{display:flex;gap:8px;flex-shrink:0;align-items:center;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--ink);padding:4px 8px;white-space:nowrap;}
  .chip.step-ch{background:var(--ink);color:var(--cream);}
  .btn-done{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:var(--cream);border:.5px solid var(--ink);padding:10px 14px;cursor:pointer;transition:background .15s,color .15s;}
  .btn-done:hover{background:var(--gold);border-color:var(--gold);color:var(--ink);}
  .btn-script,.btn-replied{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:none;border:.5px solid var(--hairline);padding:10px 10px;cursor:pointer;color:var(--grey);}
  .btn-script:hover,.btn-replied:hover{color:var(--ink);border-color:var(--ink);}
  .btn-replied:hover{color:var(--gold);border-color:var(--gold);}
  .script{display:none;border-top:.5px solid var(--hairline);padding:14px;background:var(--panel);}
  .script.open{display:block;}
  .script .eyebrow{margin-bottom:8px;}
  .script textarea{width:100%;background:var(--cream);border:.5px solid var(--hairline);font-family:'Inter',sans-serif;font-size:13.5px;line-height:1.55;padding:10px;min-height:96px;resize:vertical;color:var(--ink);}
  .script-actions{display:flex;gap:8px;margin-top:8px;}
  .script-actions button{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--hairline);background:none;padding:7px 12px;cursor:pointer;color:var(--grey);}
  .script-actions button:hover{color:var(--ink);border-color:var(--ink);}
  .clear-msg{text-align:center;padding:30px 10px;}
  .clear-msg .big{font-family:'Archivo Black',sans-serif;font-size:20px;text-transform:uppercase;}
  .clear-msg .big span{color:var(--gold);}
  .clear-msg p{color:var(--grey);font-size:13.5px;margin-top:6px;}

  details.section{border-top:.5px solid var(--hairline);margin-top:26px;}
  details.section summary{list-style:none;cursor:pointer;padding:16px 0;display:flex;justify-content:space-between;align-items:center;}
  details.section summary::-webkit-details-marker{display:none;}
  .sum-title{font-family:'Archivo Black',sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:.02em;}
  .sum-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--grey);letter-spacing:.1em;}

  .form-full{margin-bottom:8px;}
  .form-full input,.form-full textarea{width:100%;background:var(--cream);border:.5px solid var(--hairline);font-family:'Inter',sans-serif;font-size:14px;padding:11px 12px;color:var(--ink);}
  .hint{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--grey);margin:4px 0 10px;line-height:1.5;}
  .btn-primary{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;background:var(--ink);color:var(--cream);border:.5px solid var(--ink);padding:12px 20px;cursor:pointer;width:100%;}
  .btn-primary:hover{background:var(--gold);border-color:var(--gold);color:var(--ink);}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .btn-mini{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:none;border:.5px solid var(--hairline);color:var(--grey);padding:9px 12px;cursor:pointer;}
  .btn-mini:hover{border-color:var(--ink);color:var(--ink);}
  .btn-mini.danger:hover{border-color:var(--gold);color:var(--gold);}

  .acct{margin-bottom:16px;}
  .acct-name{font-family:'Archivo Black',sans-serif;font-size:13px;text-transform:uppercase;padding:8px 0 4px;display:flex;justify-content:space-between;align-items:baseline;}
  .acct-roll{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);padding-bottom:8px;border-bottom:.5px solid var(--hairline);}
  .acct-roll b{color:var(--gold);font-weight:500;}
  .contact-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid var(--hairline);font-size:13.5px;gap:8px;}
  .contact-row .nm{font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .contact-row .st{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);white-space:nowrap;}
  .contact-row .st.gold{color:var(--gold);font-weight:500;}
  .tiny-x{background:none;border:none;color:var(--grey);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;padding:2px 6px;}
  .tiny-x:hover{color:var(--ink);}

  .cadence-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 0 14px;}
  .cad-step{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;border:.5px solid var(--hairline);padding:6px 9px;}
  .cad-arrow{color:var(--grey);font-size:11px;}

  .day-row{display:flex;gap:5px;padding:14px 0 4px;}
  .day-sq{flex:1;aspect-ratio:1/1;max-width:30px;border:1.5px solid var(--hairline);position:relative;}
  .day-sq.hit{background:var(--gold);border-color:var(--gold);}
  .day-sq.partial{background:linear-gradient(to top,var(--gold) 45%,transparent 45%);border-color:var(--gold);}
  .day-sq.today-marker::after{content:"";position:absolute;left:0;right:0;bottom:-7px;height:2px;background:var(--ink);}

  .foot{text-align:center;margin-top:40px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey);}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:var(--ink);color:var(--cream);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;padding:10px 18px;opacity:0;pointer-events:none;transition:opacity .25s;text-transform:uppercase;z-index:90;}
  .toast.show{opacity:1;}

  /* lock screen (passkey) — ANYWAY styling */
  .lock{position:fixed;inset:0;z-index:80;background:var(--cream);display:flex;align-items:center;justify-content:center;padding:24px;}
  .lock-card{max-width:400px;width:100%;text-align:center;border:.5px solid var(--hairline);padding:40px 30px;background:var(--cream);}
  .lock .mark{font-family:'Archivo Black',sans-serif;font-size:34px;}
  .lock .sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin:8px 0 26px;}
  .lock-card p{color:var(--grey);font-size:14px;line-height:1.55;margin:0 0 20px;}
  .lock-ico{display:none;}
  .btn{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;background:var(--ink);color:var(--cream);border:.5px solid var(--ink);padding:14px 20px;cursor:pointer;width:100%;display:block;}
  .btn:hover{background:var(--gold);border-color:var(--gold);color:var(--ink);}
  .btn.ghost{background:none;color:var(--ink);border:.5px solid var(--hairline);}
  .btn.ghost:hover{background:none;border-color:var(--ink);color:var(--ink);}
  .lock-alt{margin-top:18px;font-size:12.5px;color:var(--grey);}
  .lock-alt a{color:var(--gold);font-weight:600;cursor:pointer;text-decoration:underline;}
  .lock-rec{margin-top:16px;display:none;}
  .lock-rec.show{display:block;}
  .lock-rec input{width:100%;text-align:center;font-family:'JetBrains Mono',monospace;letter-spacing:.12em;margin-bottom:10px;background:var(--cream);border:.5px solid var(--hairline);padding:11px;color:var(--ink);}
  .lock-err{color:#A5341F;font-size:13px;margin-top:14px;min-height:16px;font-weight:500;}
  .reccode{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.1em;color:var(--ink);background:var(--panel);border:.5px solid var(--hairline);padding:14px;margin:14px 0;word-break:break-all;font-weight:500;}

  /* import / manage forms (existing import logic, ANYWAY skin) */
  .form{border:.5px solid var(--hairline);padding:16px;margin:12px 0;background:var(--cream);}
  .form .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .form label{display:block;}
  .form .lbl{display:block;margin-bottom:5px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);}
  .form input,.form select,.form textarea{width:100%;background:var(--cream);border:.5px solid var(--hairline);font-family:'Inter',sans-serif;font-size:14px;padding:10px 11px;color:var(--ink);}
  .form .full{grid-column:1 / -1;}
  .form-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:6px;}
  .form-actions .btn{width:auto;padding:11px 16px;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);}
  /* ANY / WAY. stacked lockup (lock screen) */
  .logo-lockup{margin-bottom:26px;}
  .ll-any,.ll-way{font-family:'Archivo Black',sans-serif;font-size:54px;line-height:.92;letter-spacing:-.02em;color:var(--ink);}
  .ll-way{display:flex;align-items:flex-end;justify-content:center;gap:9px;}
  .ll-dot{width:.30em;height:.30em;background:var(--gold);display:inline-block;margin-bottom:.14em;}
  .ll-rule{width:34px;height:3px;background:var(--ink);margin:18px auto 12px;}
  .ll-tag{font-family:'Inter',sans-serif;font-size:18px;color:var(--ink);font-weight:500;}
  .ll-domain{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--grey);margin-top:26px;}
  @media (prefers-reduced-motion:reduce){.mini-square,.toast{transition:none;}}
  @media (max-width:430px){.qmain{flex-wrap:wrap;}.qactions{width:100%;justify-content:flex-end;}}

</style>

<div class="app hide" id="appMain"></div>

<div class="lock hide" id="lockScreen">
  <div class="lock-card">
    <div class="logo-lockup">
      <div class="ll-any">ANY</div>
      <div class="ll-way">WAY<span class="ll-dot"></span></div>
      <div class="ll-rule"></div>
      <div class="ll-tag">We got you.</div>
    </div>
    <div id="lockBody"></div>
    <div class="lock-err" id="lockErr"></div>
    <div class="ll-domain">ANYWAYIDID.COM</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@simplewebauthn/browser@13/dist/bundle/index.umd.min.js"></script>
<script>
(function(){
  "use strict";

  // ---------- storage wrapper ----------
  // Order: window.storage (inside Claude) -> localStorage (real website) -> in-memory (last resort).
  var mem = {};
  var hasStore = (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function");
  var hasLS = (function(){ try{ window.localStorage.setItem("__t","1"); window.localStorage.removeItem("__t"); return true; }catch(e){ return false; } })();
  async function sGet(k){
    if(hasStore){ try{ var r = await window.storage.get(k); return r ? r.value : null; }catch(e){} }
    if(hasLS){ try{ var v = window.localStorage.getItem(k); return v===null ? null : v; }catch(e){} }
    return (k in mem) ? mem[k] : null;
  }
  async function sSet(k,v){
    if(hasStore){ try{ await window.storage.set(k,v); return; }catch(e){} }
    if(hasLS){ try{ window.localStorage.setItem(k,v); return; }catch(e){} }
    mem[k]=v;
  }

  // ---------- model ----------
  var CADENCE = [
    {off:0,  ch:"li",   label:"LinkedIn"},
    {off:3,  ch:"em",   label:"Email"},
    {off:6,  ch:"li",   label:"LinkedIn"},
    {off:9,  ch:"em",   label:"Email"},
    {off:12, ch:"call", label:"Call"}
  ];
  var PERSONA_ENTRY = { "Champion":1, "Technical Evaluator":3, "Economic Buyer":5, "Additional":8, "Blocker":0 };
  var PERSONAS = ["Champion","Technical Evaluator","Economic Buyer","Additional","Blocker"];

  var state = { accounts:[], done:{}, notes:{}, activeId:null, view:"today", seeded:false, sheetUrl:"", dailyGoal:50, handoffNote:"", extra:{} };
  var MODE = { api:false }; // api=true once the Vercel /api + KV backend is detected
  var ALL = "__all__"; // sentinel activeId meaning "show every account combined"

  // ---------- date helpers (local, no tz drift) ----------
  function todayStr(){ var d=new Date(); return iso(d); }
  function iso(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function pad(n){ return (n<10?"0":"")+n; }
  function parse(s){ var p=s.split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
  function addDays(s,n){ var d=parse(s); d.setDate(d.getDate()+n); return d; }
  function shiftWeekend(d){ var g=d.getDay(); if(g===6)d.setDate(d.getDate()+2); else if(g===0)d.setDate(d.getDate()+1); return d; }
  function fmtLong(s){ var d=parse(s); return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
  function fmtShort(s){ var d=parse(s); return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
  function daysBetween(a,b){ return Math.round((parse(b)-parse(a))/86400000); }

  // ---------- schedule build ----------
  function buildTouches(acct){
    var out=[];
    (acct.threads||[]).forEach(function(t){
      if(t.persona==="Blocker") return; // blocker not sequenced
      var entry = t.entryDay || PERSONA_ENTRY[t.persona] || 1;
      CADENCE.forEach(function(c,i){
        var d = addDays(acct.start, (entry-1)+c.off);
        d = shiftWeekend(d);
        out.push({
          id: acct.id+"|"+t.id+"|"+i,
          acctId: acct.id, threadId:t.id, company:acct.company,
          who:t.name, title:t.title, persona:t.persona,
          li:t.linkedin, email:t.email, angle:t.angle,
          ch:c.ch, chLabel:c.label, touchNo:i+1, date:iso(d)
        });
      });
    });
    return out;
  }
  function activeAcct(){ return state.accounts.find(function(a){return a.id===state.activeId;}); }
  function allTouches(){ var out=[]; state.accounts.forEach(function(a){ out=out.concat(buildTouches(a)); }); return out; }
  function byDateThenCompany(a,b){
    if(a.date!==b.date) return a.date<b.date?-1:1;
    var ca=a.company||"", cb=b.company||"";
    if(ca!==cb) return ca<cb?-1:1;
    return a.touchNo-b.touchNo;
  }

  // ---------- persistence ----------
  async function load(){
    var a = await sGet("tracker:accounts");
    var d = await sGet("tracker:done");
    var n = await sGet("tracker:notes");
    var act = await sGet("tracker:active");
    var seeded = await sGet("tracker:seeded");
    state.sheetUrl = (await sGet("tracker:sheetUrl")) || "";
    state.dailyGoal = parseInt(await sGet("tracker:dailyGoal"), 10) || 50;
    state.handoffNote = (await sGet("tracker:handoffNote")) || "";
    try{ state.extra = JSON.parse(await sGet("tracker:extra")) || {}; }catch(e){ state.extra = {}; }
    if(a){ try{ state.accounts = JSON.parse(a); }catch(e){} }
    if(d){ try{ state.done = JSON.parse(d); }catch(e){} }
    if(n){ try{ state.notes = JSON.parse(n); }catch(e){} }
    state.seeded = !!seeded;
    if(!state.seeded && (!state.accounts || state.accounts.length===0)){
      seed();
      state.seeded = true;
      localSave();
    }
    if(act===ALL || (act && state.accounts.some(function(x){return x.id===act;}))) state.activeId = act;
    if(!state.activeId && state.accounts.length) state.activeId = state.accounts[0].id;
  }

  // ---------- save layer (local keys OR Vercel KV via /api/entries) ----------
  var saveTimer=null;
  function localSave(){
    sSet("tracker:accounts", JSON.stringify(state.accounts));
    sSet("tracker:active", state.activeId||"");
    sSet("tracker:done", JSON.stringify(state.done));
    sSet("tracker:notes", JSON.stringify(state.notes));
    sSet("tracker:seeded", state.seeded?"1":"");
    sSet("tracker:sheetUrl", state.sheetUrl||"");
    sSet("tracker:dailyGoal", String(state.dailyGoal||50));
    sSet("tracker:handoffNote", state.handoffNote||"");
    sSet("tracker:extra", JSON.stringify(state.extra||{}));
  }
  function apiSave(){
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer=setTimeout(function(){
      fetch("/api/entries",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"same-origin",
        body:JSON.stringify({accounts:state.accounts,done:state.done,notes:state.notes,active:state.activeId,seeded:!!state.seeded,sheetUrl:state.sheetUrl||"",dailyGoal:state.dailyGoal||50,handoffNote:state.handoffNote||"",extra:state.extra||{}})})
        .then(function(r){ if(!r.ok) throw new Error("save"); })
        .catch(function(){ toast("Save failed — check connection"); });
    },300);
  }
  function scheduleSave(){ if(MODE.api) apiSave(); else localSave(); }
  // optimistic: update UI now, persist in the background
  function persistAccounts(){ scheduleSave(); return Promise.resolve(); }
  function persistDone(){ scheduleSave(); return Promise.resolve(); }
  function persistNotes(){ scheduleSave(); return Promise.resolve(); }

  function seed(){
    var t = todayStr();
    state.accounts = [{

  function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function extUrl(u){
    u=(u||"").trim();

  // ---------- Engine 7 CSV import ----------
  function parseCSV(text){
    var rows=[], row=[], cur="", q=false;
    for(var i=0;i<text.length;i++){
      var c=text[i];
      if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
      else {
        if(c==='"')q=true;
        else if(c===','){ row.push(cur); cur=""; }
        else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(cur); rows.push(row); row=[]; cur=""; }
        else cur+=c;
      }
    }
    if(cur!=="" || row.length){ row.push(cur); rows.push(row); }
    return rows.filter(function(r){ return r.some(function(c){return (c||"").trim()!=="";}); });
  }
  function colMap(header){
    var m={}, lower=[];
    header.forEach(function(h,i){ var k=(h||"").trim().toLowerCase(); m[k]=i; lower[i]=k; });
    function find(){ for(var a=0;a<arguments.length;a++){ if(arguments[a] in m) return m[arguments[a]]; } return -1; }
    // findC: first column whose header contains ALL given substrings
    function findC(){ var t=[].slice.call(arguments); for(var i=0;i<lower.length;i++){ var h=lower[i]; if(t.every(function(s){return h.indexOf(s)>-1;})) return i; } return -1; }
    // pick: first index that is >= 0 (find/findC return -1 when not found)
    function pick(){ for(var a=0;a<arguments.length;a++){ if(arguments[a]>=0) return arguments[a]; } return -1; }
    return {
      first:find("first name","firstname","first"),
      last:find("last name","lastname","last"),
      name:find("name","full name","contact"),
      email:find("email","email address"),
      company:find("company","company name","account"),
      title:find("job title","title"),
      li:find("linkedin url","linkedin","linkedin profile"),
      thread:find("outreach thread","thread","persona"),
      seq:find("sequence day","entry day","day"),
      chan:find("first touch channel","channel","first channel"),
      angle:find("outreach angle","angle","why this person"),
      status:find("lead status","status"),
      t1:pick(find("touch 1 copy","touch 1","touch1 copy","linkedin 1","touch 1 message"), findC("outreach 1"), findC("linkedin","day 1")),
      t2subj:pick(find("touch 2 subject","email 1 subject","touch2 subject"), findC("email","subject")),
      t2:pick(find("touch 2 copy","touch 2","touch2 copy","email 1 body","touch 2 message"), findC("outreach 2","body"), findC("email","body")),
      t3:pick(find("touch 3 copy","touch 3","touch3 copy","linkedin 2","touch 3 message"), findC("outreach 3","linkedin"), findC("linkedin 2")),
      t4subj:pick(find("touch 4 subject","email 2 subject","touch4 subject"), findC("email 2","subject")),
      t4:pick(find("touch 4 copy","touch 4","touch4 copy","email 2 body","touch 4 message"), findC("email 2","body")),
      t5:pick(find("touch 5 copy","touch 5","touch5 copy","call script","touch 5 message"), findC("call/vm"), findC("call"))
    };
  }
  function personaFrom(thread, status){
    var s=((thread||"")+" "+(status||"")).toLowerCase();
    if(s.indexOf("blocker")>-1 || s.indexOf("hold")>-1) return "Blocker";
    if(s.indexOf("champion")>-1) return "Champion";
    if(s.indexOf("evaluat")>-1 || s.indexOf("technical")>-1 || s.indexOf("tech")>-1) return "Technical Evaluator";
    if(s.indexOf("buyer")>-1 || s.indexOf("economic")>-1) return "Economic Buyer";
    return "Additional";
  }
  function channelFrom(s){ s=(s||"").toLowerCase(); if(s.indexOf("email")>-1)return"em"; if(s.indexOf("call")>-1)return"call"; return "li"; }
  function dayFrom(s, persona){ var m=(s||"").match(/\d+/); if(m) return parseInt(m[0],10); return PERSONA_ENTRY[persona]||1; }

  function importEngine7(text){
    var rows=parseCSV(text);
    if(rows.length<2) return {ok:false,msg:"No data rows found"};
    var cm=colMap(rows[0]);
    if(cm.name<0 && cm.first<0) return {ok:false,msg:"No Name column found — include a header row with Name and Company"};
    var byCompany={};
    var imported=0;
    for(var i=1;i<rows.length;i++){
      var r=rows[i];
      var get=function(idx){ return idx>=0 && idx<r.length ? (r[idx]||"").trim() : ""; };
      var name = cm.name>=0 ? get(cm.name) : (get(cm.first)+" "+get(cm.last)).trim();
      if(!name) continue;
      var company = get(cm.company) || "Imported account";
      var persona = personaFrom(get(cm.thread), get(cm.status));
      var thread={
        id:"t"+Date.now()+"_"+i+"_"+Math.floor(Math.random()*999),
        name:name, title:get(cm.title), persona:persona,
        entryDay: persona==="Blocker"?0:dayFrom(get(cm.seq), persona),
        channel:channelFrom(get(cm.chan)),
        linkedin:get(cm.li), email:get(cm.email),
        angle:get(cm.angle)
      };
      // capture per-touch message copy (maps to the 5-touch cadence i=0..4)
      function withSubj(subj, body){ subj=(subj||"").trim(); body=(body||"").trim(); if(!body && !subj) return ""; return subj ? ("Subject: "+subj+"\n\n"+body) : body; }
      thread._msgs = {
        0: get(cm.t1),
        1: withSubj(get(cm.t2subj), get(cm.t2)),
        2: get(cm.t3),
        3: withSubj(get(cm.t4subj), get(cm.t4)),
        4: get(cm.t5)
      };
      (byCompany[company]=byCompany[company]||[]).push(thread);
      imported++;
    }
    var lastId=null;
    Object.keys(byCompany).forEach(function(company){
      var existing=state.accounts.find(function(a){return a.company.toLowerCase()===company.toLowerCase();});
      var acctId, threadsToAdd=byCompany[company];
      if(existing){ existing.threads=(existing.threads||[]).concat(threadsToAdd); acctId=existing.id; }
      else { acctId="a"+Date.now()+"_"+Math.floor(Math.random()*999); state.accounts.push({id:acctId, company:company, start:todayStr(), threads:threadsToAdd}); }
      // now that account id is known, drop any captured message copy into the matching touch slots
      threadsToAdd.forEach(function(t){
        if(t._msgs){
          for(var k=0;k<5;k++){ var v=(t._msgs[k]||"").trim(); if(v) state.notes[acctId+"|"+t.id+"|"+k]=v; }
          delete t._msgs;
        }
      });
      lastId=acctId;
    });
    if(lastId) state.activeId=lastId;
    return {ok:true, count:imported, accounts:Object.keys(byCompany).length};
  }

  // ---------- shared upsert import (used by Google Sheet sync) ----------
  function withSubjG(subj, body){ subj=(subj||"").trim(); body=(body||"").trim(); if(!body && !subj) return ""; return subj ? ("Subject: "+subj+"\n\n"+body) : body; }
  function importRows(rows, upsert){
    if(!rows || rows.length<2) return {ok:false,msg:"No data rows found (need a header row + at least one contact)"};
    var cm=colMap(rows[0]);
    if(cm.name<0 && cm.first<0) return {ok:false,msg:"No Name column found — check the header row"};
    var added=0, updated=0, lastAcctId=null;
    for(var i=1;i<rows.length;i++){
      var r=rows[i];
      var get=function(idx){ return idx>=0 && idx<r.length ? (r[idx]||"").trim() : ""; };
      var name = cm.name>=0 ? get(cm.name) : (get(cm.first)+" "+get(cm.last)).trim();
      if(!name) continue;
      var company = get(cm.company) || "Imported account";
      var persona = personaFrom(get(cm.thread), get(cm.status));
      var fields = {
        name:name, title:get(cm.title), persona:persona,
        entryDay: persona==="Blocker"?0:dayFrom(get(cm.seq), persona),
        channel:channelFrom(get(cm.chan)), linkedin:get(cm.li), email:get(cm.email), angle:get(cm.angle)
      };
      var msgs = { 0:get(cm.t1), 1:withSubjG(get(cm.t2subj),get(cm.t2)), 2:get(cm.t3), 3:withSubjG(get(cm.t4subj),get(cm.t4)), 4:get(cm.t5) };
      var acct = state.accounts.find(function(a){ return normCompany(a.company)===normCompany(company); });
      if(!acct){ acct={ id:"a"+Date.now()+"_"+i+"_"+Math.floor(Math.random()*999), company:company, start:todayStr(), threads:[] }; state.accounts.push(acct); }
      acct.threads=acct.threads||[];
      var thread=null;
      if(upsert){ var key=normContact(fields); if(key) thread=acct.threads.find(function(t){ return normContact(t)===key; }); }
      if(thread){
        thread.name=fields.name; thread.title=fields.title; thread.persona=fields.persona; thread.entryDay=fields.entryDay;
        thread.channel=fields.channel; thread.linkedin=fields.linkedin; thread.email=fields.email; thread.angle=fields.angle;
        updated++;
      } else {
        thread={ id:"t"+Date.now()+"_"+i+"_"+Math.floor(Math.random()*999) };
        for(var f in fields) thread[f]=fields[f];
        acct.threads.push(thread); added++;
      }
      for(var k=0;k<5;k++){ var v=(msgs[k]||"").trim(); if(v) state.notes[acct.id+"|"+thread.id+"|"+k]=v; }
      lastAcctId=acct.id;
    }
    if(lastAcctId) state.activeId=lastAcctId;
    return {ok:true, added:added, updated:updated};
  }

  // turn any Google Sheets link into an anonymously-fetchable CSV URL.
  // Use the gviz endpoint for /edit links — it works with "anyone with the
  // link" sharing, unlike /export which often 401s for anonymous requests.
  function sheetCsvUrl(u){
    u=(u||"").trim();
    if(/output=csv/i.test(u) || /tqx=out:csv/i.test(u)) return u;
    var mE=u.match(/\/spreadsheets\/d\/e\/([^/]+)\/pub/);
    if(mE){ var g=(u.match(/[?&]gid=(\d+)/)||[])[1]; return "https://docs.google.com/spreadsheets/d/e/"+mE[1]+"/pub?output=csv"+(g?("&gid="+g):""); }
    var mId=u.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    if(mId){ var g2=(u.match(/[#&?]gid=(\d+)/)||[])[1]; return "https://docs.google.com/spreadsheets/d/"+mId[1]+"/gviz/tq?tqx=out:csv"+(g2?("&tq=&gid="+g2):""); }
    return u;
  }

  // ---------- duplicate detection / cleanup ----------
  function normCompany(s){
    return (s||"").toLowerCase().trim()
      .replace(/[.,/&]/g," ")
      .replace(/\b(inc|llc|ltd|limited|corp|corporation|co|company|gmbh|sa|sas|srl|plc|the)\b/g," ")
      .replace(/\s+/g," ").trim();
  }
  function normContact(t){
    var e=(t.email||"").toLowerCase().trim();
    if(e) return "e:"+e;
    var li=(t.linkedin||"").toLowerCase().trim().replace(/\/+$/,"");
    if(li) return "l:"+li;
    var n=(t.name||"").toLowerCase().replace(/\s+/g," ").trim();
    return n ? "n:"+n : "";
  }
  function migrateKey(map, from, to){
    if(from===to) return;
    if(map[from]!=null){ if(map[to]==null) map[to]=map[from]; delete map[from]; }
  }
  function dedupeThreads(acct){
    var seen={}, kept=[], removed=0;
    (acct.threads||[]).forEach(function(t){
      var k=normContact(t);
      if(!k){ kept.push(t); return; }
      if(seen[k]){
        var keep=seen[k];
        ["title","email","linkedin","angle"].forEach(function(f){ if(!((keep[f]||"").trim()) && (t[f]||"").trim()) keep[f]=t[f]; });
        for(var c=0;c<5;c++){
          migrateKey(state.done, acct.id+"|"+t.id+"|"+c, acct.id+"|"+keep.id+"|"+c);
          migrateKey(state.notes, acct.id+"|"+t.id+"|"+c, acct.id+"|"+keep.id+"|"+c);
        }
        removed++;
      } else { seen[k]=t; kept.push(t); }
    });
    acct.threads=kept;
    return removed;
  }
  function countDuplicates(){
    var groups={}, dupAccts=0, dupThreads=0;
    state.accounts.forEach(function(a){ var k=normCompany(a.company)||("id:"+a.id); (groups[k]=groups[k]||[]).push(a); });
    Object.keys(groups).forEach(function(k){
      dupAccts += groups[k].length-1;
      var seen={};
      groups[k].forEach(function(a){ (a.threads||[]).forEach(function(t){ var ck=normContact(t); if(!ck) return; if(seen[ck]) dupThreads++; else seen[ck]=1; }); });
    });
    return { accounts:dupAccts, threads:dupThreads };
  }
  function runDedupe(){
    var groups={};
    state.accounts.forEach(function(a){ var k=normCompany(a.company)||("id:"+a.id); (groups[k]=groups[k]||[]).push(a); });
    var newAccounts=[], removedAccts=0, removedThreads=0;
    Object.keys(groups).forEach(function(k){
      var list=groups[k].slice().sort(function(a,b){ return (a.start||"").localeCompare(b.start||""); });
      var keep=list[0]; keep.threads=keep.threads||[];
      for(var i=1;i<list.length;i++){
        var b=list[i];
        (b.threads||[]).forEach(function(t){
          for(var c=0;c<5;c++){
            migrateKey(state.done, b.id+"|"+t.id+"|"+c, keep.id+"|"+t.id+"|"+c);
            migrateKey(state.notes, b.id+"|"+t.id+"|"+c, keep.id+"|"+t.id+"|"+c);
          }
          keep.threads.push(t);
        });
        removedAccts++;
      }
      removedThreads += dedupeThreads(keep);
      newAccounts.push(keep);
    });
    state.accounts=newAccounts;
    if(!state.accounts.some(function(a){return a.id===state.activeId;})) state.activeId=state.accounts.length?state.accounts[0].id:null;
    return { accounts:removedAccts, threads:removedThreads };
  }

  async function afterAuthLoad(){
    try{
      var r=await fetch("/api/entries",{credentials:"same-origin"});
      if(r.ok){
        var d=await r.json();
        state.accounts=d.accounts||[]; state.done=d.done||{}; state.notes=d.notes||{}; state.seeded=!!d.seeded; state.sheetUrl=d.sheetUrl||""; state.dailyGoal=parseInt(d.dailyGoal,10)||50; state.handoffNote=d.handoffNote||""; state.extra=d.extra||{};
        state.activeId=((d.active===ALL && state.accounts.length) || (d.active && state.accounts.some(function(a){return a.id===d.active;})))?d.active:((state.accounts[0]&&state.accounts[0].id)||null);
        if(!state.seeded && state.accounts.length===0){ seed(); state.seeded=true; apiSave(); }
      }
    }catch(e){}
  }
  async function logout(){
    try{ await fetch("/api/auth?action=logout",{method:"POST",credentials:"same-origin"}); }catch(e){}
    showApp(false); renderUnlock();
  }
  async function boot(){
    // Sign-in temporarily disabled — load straight from KV, no lock screen.
    var live=false;
    try{
      var r=await fetch("/api/entries",{credentials:"same-origin"});
      if(r.ok){
        var d=await r.json();
        state.accounts=d.accounts||[]; state.done=d.done||{}; state.notes=d.notes||{};
        state.seeded=!!d.seeded; state.sheetUrl=d.sheetUrl||""; state.dailyGoal=parseInt(d.dailyGoal,10)||50;
        state.handoffNote=d.handoffNote||""; state.extra=d.extra||{};
        MODE.api=true; live=true;
      }
    }catch(e){}
    if(!live){ MODE.api=false; await load(); }
    showApp(true); render();
  }

  // ================= ANYWAY UI (wired to existing accounts/threads/KV) =================
  var CH_LABEL = { li:"LinkedIn", em:"Email", call:"Call" };
  var DOW=["SUN","MON","TUE","WED","THU","FRI","SAT"], MON=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  var TEMPLATES = {
    li: "Hi {first} — saw your work leading {account}'s team and wanted to connect. I work with mid-market brands on engineering and data hiring (onshore + nearshore). No pitch — just building my corner of the industry. — Marcos",
    em: "Subject: {account} — quick one\n\nHi {first},\n\nReaching out because {account} keeps coming up in my world — I help teams like yours add engineering and data talent without the big-firm overhead, onshore or nearshore.\n\nWorth 15 minutes to compare notes? If not now, no sweat — I'll be around.\n\nMarcos",
    call: "CALL NOTES — {first}, {title} @ {account}\n• Open: referenced my LinkedIn + email touches\n• One question: \"How is the team handling [engineering/data] hiring right now?\"\n• Listen > pitch. Goal = book 15 min.\n• No answer? Leave a 20-second voicemail and mark done anyway."
  };
  function firstName(n){ return (n||"").split(" ")[0] || "there"; }
  function fillTemplate(tpl, c){
    return (tpl||"").split("{first}").join(firstName(c.name)).split("{account}").join(c.account||"your company").split("{title}").join(c.title||"");
  }

  // ---- daily total / goal / streak (derived from state.done + state.extra) ----
  function goalVal(){ return state.dailyGoal || 10; }
  function sentOnDate(ds){ var n=0; for(var k in state.done){ if(state.done[k]===ds) n++; } return n; }
  function dayTotal(k){ state.extra=state.extra||{}; return sentOnDate(k) + (state.extra[k]||0); }
  function sentToday(){ return dayTotal(todayStr()); }
  function keyForOff(off){ return iso(addDays(todayStr(), -off)); }
  function streakWithBend(){
    var goal=goalVal(), streak=0, misses=0, off = dayTotal(todayStr())>=goal ? 0 : 1;
    while(off<366){ if(dayTotal(keyForOff(off))>=goal){ streak++; misses=0; } else { misses++; if(misses>=2) break; } off++; }
    return streak;
  }

  // ---- adapter: flatten accounts/threads into cadence contacts ----
  function asContacts(){
    var out=[];
    state.accounts.forEach(function(a){ (a.threads||[]).forEach(function(t){
      if(t.persona==="Blocker") return; // held, not in cadence
      var touches=buildTouches({id:a.id, start:a.start, threads:[t]});
      var step=0; while(step<touches.length && state.done[touches[step].id]) step++;
      out.push({ a:a, t:t, name:t.name, title:t.title, account:a.company, status:t.status||"active", step:step, touches:touches, complete:step>=touches.length });
    }); });
    return out;
  }
  function lastDoneDate(c){ var m=""; c.touches.forEach(function(x){ var d=state.done[x.id]; if(d && d>m) m=d; }); return m; }
  function dueInfo(c){
    if(c.complete || c.status!=="active") return null;
    var cur=c.touches[c.step], due;
    if(c.step===0) due=cur.date;                                   // first touch on schedule
    else { var gap=CADENCE[c.step].off - CADENCE[c.step-1].off; due=iso(addDays(lastDoneDate(c), gap)); } // reschedule from last completion
    return { ch:cur.ch, stepNum:c.step+1, touch:cur, overdueDays:daysBetween(due, todayStr()), dueKey:due };
  }
  function statusLabel(c){
    if(c.status==="warm") return {txt:"replied — your move", gold:true};
    if(c.status==="meeting") return {txt:"meeting booked", gold:true};
    if(c.status==="lost") return {txt:"not interested", gold:false};
    if(c.complete) return {txt:"cadence complete", gold:false};
    var i=dueInfo(c);
    if(i.overdueDays>=0) return {txt:"due: "+CH_LABEL[i.ch]+" today", gold:false};
    return {txt:"next: "+CH_LABEL[i.ch]+" in "+(-i.overdueDays)+"d", gold:false};
  }

  // ---- actions ----
  function completeTouch(c){
    var info=dueInfo(c); if(!info) return;
    var goal=goalVal(), was=dayTotal(todayStr())>=goal;
    state.done[info.touch.id]=todayStr();
    persistDone(); render();
    var now=dayTotal(todayStr())>=goal;
    if(now && !was) toast("GOAL HIT. ANYWAY.");
    else if(c.step+1>=c.touches.length) toast(firstName(c.name)+": cadence complete");
    else toast("+1 "+CH_LABEL[info.ch]);
  }
  function setStatus(c, status, msg){ c.t.status=status; persistAccounts(); render(); toast(msg); }
  function logWarmTouch(c){
    state.extra=state.extra||{}; var tk=todayStr(), goal=goalVal(), was=dayTotal(tk)>=goal;
    state.extra[tk]=(state.extra[tk]||0)+1; scheduleSave(); render();
    if(dayTotal(tk)>=goal && !was) toast("GOAL HIT. ANYWAY."); else toast("+1 reply touch");
  }
  function removeContact(c){ if(confirm("Remove "+c.name+"?")) deleteThread(c.a.id, c.t.id); }
  function editGoal(){
    var v=prompt("Daily touch goal:", goalVal()); if(v===null) return;
    var n=parseInt(v,10); if(isNaN(n)||n<1||n>500){ toast("1–500 only"); return; }
    state.dailyGoal=n; scheduleSave(); render(); toast("Goal: "+n);
  }

  // ---- add contacts (quick bulk-add into existing account model) ----
  function addQuick(acctVal, bulkVal){
    var acct=(acctVal||"").trim(), bulk=(bulkVal||"").trim();
    if(!acct){ toast("Account name first"); return false; }
    if(!bulk){ toast("Add at least one person"); return false; }
    var a=state.accounts.find(function(x){ return normCompany(x.company)===normCompany(acct); });
    if(!a){ a={ id:"a"+Date.now(), company:acct, start:todayStr(), threads:[] }; state.accounts.push(a); }
    a.threads=a.threads||[];
    var entry=Math.max(1, daysBetween(a.start, todayStr())+1); // day 1 = today
    var added=0;
    bulk.split("\n").forEach(function(line){
      line=line.trim(); if(!line) return;
      var p=line.split(","), name=(p[0]||"").trim(), title=p.slice(1).join(",").trim();
      if(!name) return;
      a.threads.push({ id:"t"+Date.now()+"_"+added+"_"+Math.floor(Math.random()*999), name:name, title:title, persona:"Additional", entryDay:entry, channel:"li", linkedin:"", email:"", angle:"", status:"active" });
      added++;
    });
    if(!added){ toast("No valid lines"); return false; }
    persistAccounts(); render(); toast(added+" added to cadence");
    return true;
  }

  // ---- backup / restore / cleanup ----
  function doExport(){
    if(!state.accounts.length){ toast("Nothing to back up"); return; }
    var data={ app:"anyway", version:1, exportedAt:new Date().toISOString(), accounts:state.accounts, done:state.done, notes:state.notes, extra:state.extra||{} };
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob); var a=document.createElement("a"); a.href=url; a.download="anyway-backup-"+todayStr()+".json";
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){ URL.revokeObjectURL(url); },1000); toast("Backup downloaded");
  }
  function doRestore(file){
    var reader=new FileReader();
    reader.onload=function(){
      var data; try{ data=JSON.parse(reader.result); }catch(e){ toast("Not a valid backup"); return; }
      if(!data || !Array.isArray(data.accounts)){ toast("Not an ANYWAY backup"); return; }
      if(!confirm("Restore this backup? Replaces current accounts, touches and messages.")) return;
      state.accounts=data.accounts||[]; state.done=data.done||{}; state.notes=data.notes||{}; state.extra=data.extra||{}; state.seeded=true;
      persistAccounts(); render(); toast("Backup restored");
    };
    reader.readAsText(file);
  }
  function doDedupe(){
    var c=countDuplicates();
    if(!c.accounts && !c.threads){ toast("No duplicates found"); return; }
    if(!confirm("Found "+c.accounts+" duplicate account(s) and "+c.threads+" duplicate contact(s). Merge them?")) return;
    var r=runDedupe(); persistAccounts(); render(); toast("Removed "+r.accounts+" acct / "+r.threads+" contact");
  }
  function doClear(){
    if(!state.accounts.length){ toast("Nothing to clear"); return; }
    if(!confirm("Clear ALL accounts, contacts, touches and messages? Cannot be undone. Login stays.")) return;
    if(!confirm("Really wipe everything and start over?")) return;
    state.accounts=[]; state.done={}; state.notes={}; state.extra={}; state.activeId=null; state.seeded=true;
    persistAccounts(); render(); toast("All cleared");
  }

  // ---- render ----
  function render(){
    var m=document.getElementById("appMain"); if(!m) return;
    state.extra=state.extra||{};
    m.innerHTML="";
    var contacts=asContacts();
    var tk=todayStr(), total=sentToday(), goal=goalVal(), done=total>=goal, now=new Date();

    // TOP
    var top=el('<div class="top"><div class="mark">ANYWAY<span>.</span></div><div class="top-right"><span class="date">'+DOW[now.getDay()]+" "+MON[now.getMonth()]+" "+now.getDate()+'</span><button class="lockbtn" id="lockBtn">Lock</button></div></div>');
    top.querySelector("#lockBtn").addEventListener("click", function(){ logout(); });
    m.appendChild(top);

    // SCORE
    var score=el('<div class="score"><div class="score-left"><div><div class="big-num'+(done?" done":"")+'">'+total+'</div><div class="score-sub">of <span>'+goal+'</span> touches · <button id="editGoal">change</button></div></div><div class="mini-square'+(done?" done":"")+'"></div></div><div><div class="streak-num"><i>'+streakWithBend()+'</i> day streak</div><div class="score-sub" style="text-align:right;">bends, doesn’t break</div></div></div>');
    score.querySelector("#editGoal").addEventListener("click", editGoal);
    m.appendChild(score);

    // WARM
    var warm=contacts.filter(function(c){ return c.status==="warm"; });
    if(warm.length){
      var ws=el('<section class="warm"><h2 class="warm-title">Warm — your move</h2><p class="warm-sub">They answered. This beats every cold touch on the list.</p><div id="warmList"></div></section>');
      var wl=ws.querySelector("#warmList");
      warm.forEach(function(c){
        var card=el('<div class="wcard"><div class="wname">'+esc(c.name)+'</div><div class="wmeta">'+esc(c.title||"")+(c.title?" · ":"")+esc(c.account)+' · cadence paused</div><div class="wactions"><button class="wbtn gold" data-a="meeting">Meeting booked</button><button class="wbtn" data-a="touch">Log a reply touch</button><button class="wbtn quiet" data-a="lost">Not interested</button></div></div>');
        card.querySelector('[data-a="meeting"]').addEventListener("click", function(){ setStatus(c,"meeting","Meeting booked. ANYWAY."); });
        card.querySelector('[data-a="touch"]').addEventListener("click", function(){ logWarmTouch(c); });
        card.querySelector('[data-a="lost"]').addEventListener("click", function(){ setStatus(c,"lost","Marked not interested"); });
        wl.appendChild(card);
      });
      m.appendChild(ws);
    }

    // QUEUE
    var due=[];
    contacts.forEach(function(c){ var i=dueInfo(c); if(i && i.overdueDays>=0) due.push({c:c,i:i}); });
    due.sort(function(x,y){ return y.i.overdueDays - x.i.overdueDays; });
    var q=el('<section class="queue"><div class="queue-head"><h1 class="queue-title">Start here<span style="color:var(--gold)">.</span></h1><span class="sum-count">'+(due.length?due.length+" due":"")+'</span></div><p class="queue-sub">Everyone due for a touch today, most overdue first. Script, send, done.</p><div id="queueList"></div></section>');
    var ql=q.querySelector("#queueList");
    if(!due.length && !warm.length){
      ql.appendChild(el('<div class="clear-msg"><p class="big">Queue clear<span>.</span></p><p>Nobody’s due. Add contacts below or take the win.</p></div>'));
    }
    due.forEach(function(item){
      var c=item.c, i=item.i;
      var over = i.overdueDays>0 ? " · "+i.overdueDays+"d overdue" : "";
      var scriptVal = state.notes[i.touch.id] || fillTemplate(TEMPLATES[i.ch], c);
      var card=el('<div class="qcard'+(i.overdueDays>0?" overdue":"")+'">'+
        '<div class="qmain"><div class="qwho"><div class="qname">'+esc(c.name)+'</div><div class="qmeta">'+esc(c.title||"")+(c.title?" · ":"")+esc(c.account)+" · touch "+i.stepNum+"/"+c.touches.length+over+'</div></div>'+
        '<div class="qactions"><span class="chip step-ch">'+CH_LABEL[i.ch]+'</span><button class="btn-replied" title="They answered — pause cadence">Replied</button><button class="btn-script">Script</button><button class="btn-done">Done</button></div></div>'+
        '<div class="script"><p class="eyebrow">'+CH_LABEL[i.ch]+' script — use it or write your own</p><textarea>'+esc(scriptVal)+'</textarea><div class="script-actions"><button class="copy-btn">Copy</button></div></div>');
      var scr=card.querySelector(".script"), ta=card.querySelector("textarea");
      card.querySelector(".btn-script").addEventListener("click", function(){ scr.classList.toggle("open"); });
      ta.addEventListener("change", function(){ state.notes[i.touch.id]=ta.value; persistNotes(); });
      card.querySelector(".copy-btn").addEventListener("click", function(){ copy(ta.value||""); });
      card.querySelector(".btn-done").addEventListener("click", function(){ completeTouch(c); });
      card.querySelector(".btn-replied").addEventListener("click", function(){ setStatus(c,"warm", firstName(c.name)+" moved to WARM"); });
      ql.appendChild(card);
    });
    m.appendChild(q);

    // ADD CONTACTS
    var accts={}; state.accounts.forEach(function(a){ accts[a.company]=1; });
    var opts=Object.keys(accts).map(function(x){ return '<option value="'+esc(x)+'">'; }).join("");
    var add=el('<details class="section" id="addSection"><summary><span class="sum-title">+ Add contacts</span><span class="sum-count">account &rarr; people</span></summary>'+
      '<div class="form-full"><input id="acctInput" list="acctList" placeholder="Account (e.g., Skechers)"><datalist id="acctList">'+opts+'</datalist></div>'+
      '<div class="form-full"><textarea id="bulkInput" rows="5" placeholder="One person per line:&#10;Jane Smith, VP Merchandising&#10;Luis Ortega, Sr Manager DTC"></textarea></div>'+
      '<p class="hint">Name, Title — one per line. Each person starts the cadence today.</p>'+
      '<button class="btn-primary" id="addBtn" type="button">Add to cadence</button>'+
      '<div class="btn-row"><button class="btn-mini" id="csvBtn">Paste CSV</button><button class="btn-mini" id="sheetBtn">Google Sheet</button></div>'+
      '<div id="importHost"></div></details>');
    add.querySelector("#addBtn").addEventListener("click", function(){
      if(addQuick(add.querySelector("#acctInput").value, add.querySelector("#bulkInput").value)) add.open=true;
    });
    add.querySelector("#csvBtn").addEventListener("click", function(){ showImportForm(add.querySelector("#importHost")); });
    add.querySelector("#sheetBtn").addEventListener("click", function(){ showSheetForm(add.querySelector("#importHost")); });
    m.appendChild(add);

    // PIPELINE (grouped by account, with rollups)
    var groups={}; contacts.forEach(function(c){ (groups[c.account]=groups[c.account]||[]).push(c); });
    var totalC=contacts.length, acctN=Object.keys(groups).length;
    var pipe=el('<details class="section"><summary><span class="sum-title">Pipeline</span><span class="sum-count">'+(totalC?totalC+" contacts · "+acctN+" accounts":"empty")+'</span></summary><div class="cadence-row" id="cadRow"></div><p class="hint" style="margin-top:0;">The cadence every contact runs. Replies pause it automatically.</p><div id="pipeList"></div></details>');
    var cr=pipe.querySelector("#cadRow");
    CADENCE.forEach(function(s,idx){
      cr.appendChild(el('<span class="cad-step">Day '+(s.off+1)+" "+CH_LABEL[s.ch]+'</span>'));
      if(idx<CADENCE.length-1) cr.appendChild(el('<span class="cad-arrow">→</span>'));
    });
    var pl=pipe.querySelector("#pipeList");
    Object.keys(groups).sort().forEach(function(acct){
      var list=groups[acct], warmN=0,meetN=0,lostN=0,activeN=0,compN=0;
      list.forEach(function(c){ if(c.status==="warm")warmN++; else if(c.status==="meeting")meetN++; else if(c.status==="lost")lostN++; else if(c.complete)compN++; else activeN++; });
      var wrap=el('<div class="acct"></div>');
      wrap.appendChild(el('<div class="acct-name"><span>'+esc(acct)+'</span><span class="sum-count">'+list.length+' people</span></div>'));
      var parts=[];
      if(meetN) parts.push("<b>"+meetN+" meeting"+(meetN>1?"s":"")+"</b>");
      if(warmN) parts.push("<b>"+warmN+" warm</b>");
      if(activeN) parts.push(activeN+" in cadence");
      if(compN) parts.push(compN+" complete");
      if(lostN) parts.push(lostN+" out");
      wrap.appendChild(el('<div class="acct-roll">'+(parts.join(" · ")||"nothing yet")+'</div>'));
      list.forEach(function(c){
        var s=statusLabel(c);
        var row=el('<div class="contact-row"><span class="nm">'+esc(c.name)+(c.title?' <span style="color:var(--grey);font-weight:400;">· '+esc(c.title)+'</span>':"")+'</span><span style="display:flex;align-items:center;gap:6px;flex-shrink:0;"><span class="st'+(s.gold?" gold":"")+'">'+s.txt+'</span><button class="tiny-x" title="Remove">×</button></span></div>');
        row.querySelector(".tiny-x").addEventListener("click", function(){ removeContact(c); });
        wrap.appendChild(row);
      });
      pl.appendChild(wrap);
    });
    m.appendChild(pipe);

    // LAST 14 DAYS
    var fort=el('<details class="section"><summary><span class="sum-title">Last 14 days</span><span class="sum-count" id="fortCount"></span></summary><div class="day-row" id="dayRow"></div></details>');
    var dr=fort.querySelector("#dayRow"), hit=0;
    for(var i2=13;i2>=0;i2--){ var k=keyForOff(i2), t=dayTotal(k), cls="day-sq"; if(t>=goal){cls+=" hit";hit++;} else if(t>0)cls+=" partial"; if(i2===0)cls+=" today-marker"; var sq=el('<div class="'+cls+'"></div>'); sq.title=k+" — "+t+" touches"; dr.appendChild(sq); }
    fort.querySelector("#fortCount").textContent=hit+" gold";
    m.appendChild(fort);

    // MANAGE + FOOT
    var manage=el('<details class="section"><summary><span class="sum-title">Manage</span><span class="sum-count">backup · cleanup</span></summary><div class="btn-row"><button class="btn-mini" id="expBtn">Export backup</button><button class="btn-mini" id="resBtn">Restore</button><button class="btn-mini" id="dupBtn">Delete duplicates</button><button class="btn-mini danger" id="clrBtn">Clear all</button></div><input type="file" id="resFile" accept="application/json,.json" style="display:none"></details>');
    manage.querySelector("#expBtn").addEventListener("click", doExport);
    manage.querySelector("#dupBtn").addEventListener("click", doDedupe);
    manage.querySelector("#clrBtn").addEventListener("click", doClear);
    var rf=manage.querySelector("#resFile");
    manage.querySelector("#resBtn").addEventListener("click", function(){ rf.click(); });
    rf.addEventListener("change", function(){ if(rf.files&&rf.files[0]) doRestore(rf.files[0]); rf.value=""; });
    m.appendChild(manage);

    m.appendChild(el('<p class="foot">We got you.</p>'));
  }

  boot();

})();
</script>
