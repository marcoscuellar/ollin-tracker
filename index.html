  .upgrade-card .up-list li::before{content:"\2713";position:absolute;left:0;top:0;color:var(--blue);font-weight:700;}
  .upgrade-card .up-fine{font-size:11.5px;color:var(--grey2);margin:12px 0 0;text-align:center;}
  .reccode{font-family:'Geist Mono',monospace;font-size:18px;letter-spacing:.1em;color:var(--ink);background:var(--panel);border:.5px solid var(--hairline);padding:14px;margin:14px 0;word-break:break-all;font-weight:500;}

  /* import / manage forms (existing import logic, VAMOS skin) */
  .form{border:.5px solid var(--hairline);padding:16px;margin:12px 0;background:var(--cream);}
  .form .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .form label{display:block;}
  .form .lbl{display:block;margin-bottom:5px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);}
  .form input,.form select,.form textarea{width:100%;background:var(--cream);border:.5px solid var(--hairline);font-family:'Geist',sans-serif;font-size:14px;padding:10px 11px;color:var(--ink);}
  .form .full{grid-column:1 / -1;}
  .form-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:6px;}
  .form-actions .btn{width:auto;padding:11px 16px;}
  .imp-file-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .imp-file-row .btn{width:auto;padding:11px 16px;}
  .imp-file-name{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--grey);}
  .form.drag{outline:2px dashed var(--gold);outline-offset:3px;}
  .uploadzone{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;border:1.5px dashed var(--navy);background:rgba(10,31,61,.05);padding:13px 16px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:12px;border-radius:10px;}
  .uploadzone:hover{border-color:var(--navy-2);background:rgba(10,31,61,.09);}
  .uploadzone.drag{border-color:var(--navy-2);background:rgba(10,31,61,.14);}
  .uz-plus{font-family:'Geist',sans-serif;font-weight:900;font-size:18px;color:var(--navy);line-height:1;}
  .uz-title{font-family:'Geist',sans-serif;font-weight:800;font-size:13.5px;letter-spacing:-.01em;}
  .uz-sub{font-size:12px;color:var(--grey);}
  .mini-add{margin-top:14px;border-top:.5px solid var(--hairline);padding-top:6px;}
  .mini-add>summary{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);cursor:pointer;list-style:none;padding:6px 0;}
  .mini-add>summary::-webkit-details-marker{display:none;}
  .mini-add>summary:hover{color:var(--ink);}
  .mono{font-family:'Geist Mono',monospace;}
  .lbl{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);}
  /* ANY / WAY. stacked lockup (lock screen) */
  .logo-lockup{margin-bottom:26px;}
  .ll-word{font-family:'Geist',sans-serif;font-weight:900;font-size:46px;line-height:1;letter-spacing:-.03em;color:var(--ink);}
  .ll-way{color:var(--honey);}
  .ll-rule{width:44px;height:3px;background:var(--honey);margin:18px auto 12px;}
  .ll-tag{font-family:'Geist',sans-serif;font-size:18px;color:var(--ink);font-weight:500;}
  .ll-domain{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--grey);margin-top:26px;}
  .upload-note{border-top:.5px solid var(--hairline);margin-top:16px;padding-top:14px;}
  .upload-note .eyebrow{margin-bottom:8px;}
  .upload-fields{font-size:13px;color:var(--ink);line-height:1.7;}
  .upload-fields b{font-weight:600;}
  .upload-dim{color:var(--grey);}
  @media (prefers-reduced-motion:reduce){.mini-square{transition:none;}}
  @media (max-width:430px){.qmain{flex-wrap:wrap;}.qactions{width:100%;justify-content:flex-end;}}

  /* ===================== REFRESHED DESKTOP FACE ===================== */
  :root{ --radius:12px; --shadow:0 2px 5px rgba(17,17,17,.06),0 14px 40px rgba(17,17,17,.14); }
  .app{max-width:1180px;padding:0 24px 90px;}
  /* top nav */
  .pipe-tools{display:flex;gap:8px;margin-bottom:12px;}
  .pc-check{width:18px;height:18px;border:1.5px solid var(--hairline);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .pc-check.on{background:var(--ink);border-color:var(--ink);}
  .pc-check.on::after{content:"\2713";color:var(--cream);font-size:11px;line-height:1;}
  .pc-wrap .pcard.selectable{cursor:pointer;}
  .pc-wrap .pcard.selected{border-color:var(--ink);background:var(--panel);}
  .brandmark{display:inline-flex;align-items:center;gap:8px;}
  .brandmark svg{display:block;flex-shrink:0;}
  .brandmark .bm-word{font-family:'Sora',sans-serif;font-weight:800;letter-spacing:-.04em;color:var(--ollin-ink);}
  .brandmark .bm-tag{font-family:var(--mono, 'Geist Mono', monospace);font-weight:600;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ollin-maroon);margin-left:2px;}
  /* Motion is landing-page only — the in-app nav and login modal keep a static mark */
  .gl-mark svg .mv-dot{transform-box:view-box;transform-origin:36px 36px;animation:mv-orbit 7s linear infinite;}
  @keyframes mv-orbit{from{transform:rotate(120deg);}to{transform:rotate(480deg);}}
  @media (prefers-reduced-motion: reduce){ .gl-mark svg .mv-dot{animation:none;} }
  /* ===================================================================
     ŌLLIN TRACKER — monochrome editorial redesign (global chrome + Today)
     Design tokens: --o2-ink/graphite/slate/mute/hairline/navidle/paper/hoverbg/accent
     Fonts: Archivo, Archivo Expanded, IBM Plex Mono. Radius: 0 everywhere.
     =================================================================== */
  .o2-head{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--o2-ink);font-family:'Archivo',sans-serif;}
  .o2-lockup{display:inline-flex;flex-direction:column;align-items:flex-start;line-height:.86;}
  .o2-lockup .o2-word{font-family:'Archivo Expanded',sans-serif;font-weight:800;font-size:17px;letter-spacing:.5px;color:var(--o2-ink);}
  .o2-lockup .o2-sub{font-family:'IBM Plex Mono',monospace;font-size:6.5px;letter-spacing:3.5px;color:var(--o2-mute);margin-top:2px;}
  .o2-navlinks{display:flex;align-items:center;gap:28px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;}
  .o2-nav-item{background:none;border:none;padding:0 0 3px;cursor:pointer;font:inherit;color:var(--o2-slate);border-bottom:2px solid transparent;transition:color .18s,border-color .18s,transform .16s;}
  .o2-nav-item.active{color:var(--o2-ink);border-bottom-color:var(--o2-ink);}
  .o2-nav-item:hover{color:var(--o2-accent);border-bottom-color:var(--o2-accent);transform:translateX(3px);}
  .o2-nav-item.has-caret::after{content:"▾";font-size:9px;margin-left:4px;opacity:.6;}
  .o2-headright{display:flex;align-items:center;gap:16px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--o2-slate);}
  .o2-ava{width:26px;height:26px;border:1px solid var(--o2-ink);color:var(--o2-ink);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;}

  /* ledger strip (Today only) */
  .o2-ledger{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--o2-ink);}
  .o2-ledger>div{padding:20px 26px;border-right:1px solid var(--o2-hairline);}
  .o2-ledger>div:first-child{padding-left:40px;}
  .o2-ledger>div:last-child{border-right:none;padding-right:40px;display:flex;align-items:center;justify-content:flex-end;gap:10px;}
  .o2-lnum{font-family:'Archivo Expanded',sans-serif;font-weight:900;font-size:38px;line-height:1;color:var(--o2-ink);}
  .o2-llbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--o2-mute);margin-top:6px;}
  .o2-lbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;background:var(--o2-paper);border:1px solid var(--o2-ink);color:var(--o2-ink);padding:10px 14px;cursor:pointer;white-space:nowrap;}
  .o2-lbtn.on{background:var(--o2-ink);color:#fff;}
  .o2-lbtn.quiet{border-color:var(--o2-hairline);color:var(--o2-slate);}

  /* two-column Today grid */
  .o2-today{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,380px);min-height:calc(100vh - 158px);font-family:'Archivo',sans-serif;}
  .o2-left{border-right:1px solid var(--o2-ink);padding:44px 48px 48px;}
  .o2-startrow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:36px;}
  .o2-starthere{display:flex;align-items:baseline;gap:14px;}
  .o2-starthere span:first-child{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--o2-mute);}
  .o2-starthere span:last-child{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--o2-ink);}
  .o2-arrows{display:flex;}
  .o2-arrow{width:34px;height:34px;border:1px solid var(--o2-ink);background:#fff;color:var(--o2-ink);font-family:'IBM Plex Mono',monospace;font-size:14px;cursor:pointer;}
  .o2-arrow+.o2-arrow{border-left:none;}
  .o2-arrow:disabled{opacity:.35;cursor:default;}

  .o2-stage-top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;}
  .o2-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--o2-mute);margin-bottom:10px;}
  .o2-name{font-family:'Archivo Expanded',sans-serif;font-weight:900;font-size:clamp(40px,5.4vw,88px);line-height:.92;letter-spacing:-3px;margin:0;overflow-wrap:break-word;color:var(--o2-ink);}
  .o2-title{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--o2-slate);margin-top:14px;}
  .o2-overdue{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;padding:6px 10px;white-space:nowrap;flex:none;border:1px solid var(--o2-hairline);background:#fff;color:var(--o2-slate);}
  .o2-overdue.urgent{background:var(--o2-ink);border-color:var(--o2-ink);color:#fff;}

  .o2-intel-head{display:flex;justify-content:space-between;align-items:baseline;margin-top:34px;padding-bottom:8px;}
  .o2-intel-head span{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--o2-mute);}
  .o2-intel{border-top:1px solid var(--o2-ink);}
  .o2-intel-row{display:flex;gap:16px;align-items:baseline;padding:13px 0;border-bottom:1px solid var(--o2-hairline);}
  .o2-intel-row:last-child{border-bottom:none;}
  .o2-intel-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--o2-mute);width:78px;flex:none;}
  .o2-intel-fact{font-size:15px;flex:1;color:var(--o2-ink);}
  .o2-intel-fact.quiet{color:var(--o2-slate);}
  .o2-intel-src{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--o2-slate);border:1px solid var(--o2-hairline);padding:3px 7px;flex:none;}

  .o2-stepper{display:flex;gap:6px;margin-top:30px;}
  .o2-step{flex:1;}
  .o2-step-bar{height:6px;background:var(--o2-hairline);}
  .o2-step-bar.done{background:var(--o2-ink);opacity:.45;}
  .o2-step-bar.active{background:var(--o2-ink);opacity:1;}
  .o2-step-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;margin-top:8px;color:var(--o2-mute);}
  .o2-step-label.active{color:var(--o2-ink);font-weight:600;}

  .o2-bottom{margin-top:38px;}
  .o2-bottom.composer-open{display:grid;grid-template-columns:minmax(0,4fr) minmax(0,1fr);gap:18px;align-items:stretch;}
  .o2-composer{border:1px solid var(--o2-ink);display:flex;flex-direction:column;min-width:0;}
  .o2-composer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--o2-ink);padding:10px 12px;}
  .o2-composer-head-l{display:flex;align-items:center;gap:12px;}
  .o2-composer-hint{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--o2-mute);}
  .o2-composer-x{background:none;border:none;color:var(--o2-mute);font-family:'IBM Plex Mono',monospace;font-size:15px;cursor:pointer;}
  .o2-composer textarea{width:100%;flex:1;min-height:210px;border:none;outline:none;resize:vertical;padding:18px;font-family:'Archivo',sans-serif;font-size:15px;line-height:1.65;color:var(--o2-ink);background:#fff;display:block;}
  .o2-composer-foot{display:flex;align-items:center;gap:14px;padding:11px 14px;border-top:1px solid var(--o2-hairline);flex-wrap:wrap;}
  .o2-composer-foot span{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--o2-mute);}
  .o2-reset{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;background:none;border:none;color:var(--o2-ink);cursor:pointer;padding:0;text-decoration:underline;white-space:nowrap;}
  .o2-ai-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;background:none;border:1px solid var(--o2-accent);color:var(--o2-graphite);padding:8px 12px;cursor:pointer;}
  .o2-ai-btn:hover{background:var(--o2-accent);color:#fff;}
  .o2-ai-btn[disabled]{opacity:.5;cursor:default;}
  .o2-ai-hint{display:none;margin:10px 14px 0;font-size:11px;line-height:1.4;color:var(--o2-slate);border-left:2px solid var(--o2-accent);padding:6px 10px;}
  .o2-ai-hint.show{display:block;}
  .o2-ai-steer{display:none;margin:0 14px 14px;border:1px solid var(--o2-accent);padding:12px;}
  .o2-ai-steer.open{display:block;}
  .o2-ai-lead{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--o2-graphite);margin:0 0 8px;}
  .o2-ai-row{display:flex;gap:8px;}
  .o2-ai-row input{flex:1;min-width:0;border:1px solid var(--o2-hairline);padding:9px 10px;font-family:'Archivo',sans-serif;font-size:13px;color:var(--o2-ink);}
  .o2-ai-draft{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;background:var(--o2-accent);color:#fff;border:1px solid var(--o2-accent);padding:9px 14px;cursor:pointer;white-space:nowrap;}
  .o2-ai-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .o2-ai-chip{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--o2-hairline);background:#fff;color:var(--o2-slate);padding:5px 9px;cursor:pointer;}
  .o2-ai-chip:hover{border-color:var(--o2-accent);color:var(--o2-graphite);}

  /* ---- Contacts: command-bar search (phase 2) ---- */
  .o2-view{font-family:'Archivo',sans-serif;display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,400px);min-height:calc(100vh - 158px);}
  .o2-view-left{padding:44px 44px 60px;border-right:1px solid var(--o2-ink);}
  .o2-view-title{font-family:'Archivo Expanded',sans-serif;font-weight:900;font-size:64px;letter-spacing:-2px;line-height:1;margin:0 0 10px;color:var(--o2-ink);}
  .o2-view-sub{font-size:17px;line-height:1.5;color:var(--o2-slate);margin:0 0 26px;max-width:520px;}
  .o2-cmdwrap{max-width:560px;}
  .o2-cmdbar{border:1.5px solid var(--o2-ink);display:flex;align-items:center;gap:14px;padding:18px 20px;}
  .o2-cmdbar.focused{border-color:var(--o2-accent);}
  .o2-cmd-caret{font-family:'IBM Plex Mono',monospace;font-size:19px;color:var(--o2-mute);line-height:1;}
  .o2-cmdbar.focused .o2-cmd-caret{color:var(--o2-accent);animation:o2-blink 1s step-end infinite;}
  .o2-cmd-input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:'Archivo',sans-serif;font-size:21px;font-weight:600;color:var(--o2-ink);}
  .o2-cmd-clear{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;background:none;border:1px solid var(--o2-hairline);color:var(--o2-slate);padding:7px 11px;cursor:pointer;white-space:nowrap;flex:none;}
  .o2-cmd-count{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--o2-mute);white-space:nowrap;flex:none;}
  .o2-cmd-panel{border:1.5px solid var(--o2-ink);border-top:none;}
  .o2-cmd-panel-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--o2-mute);padding:14px 20px 9px;}
  .o2-crow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 20px;border-top:1px solid var(--o2-hairline);cursor:pointer;background:#fff;}
  .o2-crow:hover{background:var(--o2-hoverbg);}
  .o2-crow-l{display:flex;align-items:center;gap:13px;min-width:0;}
  .o2-crow-key{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--o2-mute);flex:none;width:15px;}
  .o2-crow-label{font-family:'Archivo',sans-serif;font-weight:600;font-size:17px;color:var(--o2-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .o2-crow-hint{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--o2-mute);white-space:nowrap;}
  .o2-crow-arrow{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--o2-ink);flex:none;}
  .o2-cresult-name{font-family:'Archivo',sans-serif;font-weight:700;font-size:19px;color:var(--o2-ink);min-width:0;}
  .o2-cresult-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--o2-mute);margin-top:4px;}
  .o2-cresult-state{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--o2-slate);white-space:nowrap;flex:none;}
  .o2-cresult-state.done{color:var(--o2-ink);font-weight:600;}
  .o2-noresults{padding:32px 16px;text-align:center;}
  .o2-noresults .glyph{font-family:'IBM Plex Mono',monospace;font-size:17px;letter-spacing:2px;margin-bottom:8px;color:var(--o2-mute);}
  .o2-noresults .msg{font-weight:700;font-size:15px;color:var(--o2-ink);}

  /* ---- shared right rail: TODAY'S LIST (Contacts + Pipeline) ---- */
  .o2-todo-row{display:flex;gap:12px;align-items:center;padding:14px 24px;border-bottom:1px solid var(--o2-hairline);}
  .o2-todo-box{width:20px;height:20px;flex:none;border:1.5px solid var(--o2-ink);background:#fff;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .o2-todo-box.on{background:var(--o2-ink);}
  .o2-todo-label{font-family:'Archivo',sans-serif;font-size:15px;line-height:1.35;color:var(--o2-ink);flex:1;}
  .o2-todo-label.done{color:var(--o2-mute);text-decoration:line-through;}
  .o2-todo-x{background:none;border:none;color:var(--o2-navidle);font-family:'IBM Plex Mono',monospace;font-size:15px;cursor:pointer;padding:0 2px;flex:none;}
  .o2-todo-add{border-top:1px solid var(--o2-ink);padding:14px 24px;display:flex;gap:10px;align-items:center;}
  .o2-todo-add span{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--o2-mute);flex:none;}
  .o2-todo-add input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:'Archivo',sans-serif;font-size:15px;color:var(--o2-ink);}

  .o2-tab{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;padding:9px 16px;border:1px solid var(--o2-ink);cursor:pointer;background:#fff;color:var(--o2-slate);}
  .o2-tab.on{background:var(--o2-ink);color:#fff;}
  .o2-tab.linkedin{border-left:none;}

  .o2-actioncol{display:flex;flex-direction:column;gap:12px;min-width:0;}
  .o2-actioncol.boxed{gap:14px;border:1px solid var(--o2-hairline);padding:18px;}
  .o2-channelrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .o2-channelrow.hidden{display:none;}
  .o2-channellbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--o2-mute);}
  .o2-tabgroup{display:inline-flex;}
  .o2-actionrow{display:flex;flex-wrap:wrap;gap:10px;}
  .o2-actionrow.stacked{flex-direction:column;}
  .o2-btn{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.5px;padding:15px 10px;cursor:pointer;white-space:nowrap;flex:1 1 0;transition:transform .16s;}
  .o2-btn:hover{transform:translateY(-3px);}
  .o2-btn-primary{background:var(--o2-ink);border:1px solid var(--o2-ink);color:#fff;font-weight:600;}
  .o2-btn-secondary{background:#fff;border:1px solid var(--o2-ink);color:var(--o2-ink);}
  .o2-btn-quiet{background:#fff;border:1px solid var(--o2-hairline);color:var(--o2-slate);}
  .o2-btn-done{background:#fff;border:1.5px solid var(--o2-ink);color:var(--o2-ink);font-weight:600;}

  .o2-right{display:flex;flex-direction:column;}
  .o2-rail-head{padding:22px 24px 14px;border-bottom:1px solid var(--o2-ink);display:flex;justify-content:space-between;align-items:baseline;}
  .o2-rail-head span:first-child{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--o2-mute);}
  .o2-rail-head span:last-child{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--o2-slate);}
  .o2-track{height:2px;background:var(--o2-hairline);}
  .o2-track-fill{height:100%;background:var(--o2-ink);transition:width .62s cubic-bezier(.22,1,.28,1);}
  .o2-rail-scroll{flex:1;overflow-y:auto;min-height:0;}
  .o2-qrow{padding:16px 24px;border-bottom:1px solid var(--o2-hairline);border-left:3px solid transparent;background:#fff;cursor:pointer;}
  .o2-qrow.active{border-left-color:var(--o2-ink);background:var(--o2-hoverbg);}
  .o2-qrow.cleared{opacity:.45;}
  .o2-qrow-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  .o2-qname{font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;color:var(--o2-ink);}
  .o2-qrow.cleared .o2-qname{text-decoration:line-through;}
  .o2-qstate{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--o2-mute);flex:none;}
  .o2-qmeta{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--o2-mute);margin-top:5px;}
  .o2-bfyg{border-top:1px solid var(--o2-ink);padding:20px 24px 24px;}
  .o2-bfyg-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--o2-mute);margin-bottom:10px;}
  .o2-bfyg textarea{width:100%;min-height:88px;border:1px solid var(--o2-ink);outline:none;resize:vertical;padding:12px;font-family:'Archivo',sans-serif;font-size:14px;line-height:1.55;color:var(--o2-ink);background:#fff;display:block;}
  .o2-bfyg-save{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--o2-mute);margin-top:9px;}
  .o2-cursor{display:inline-block;width:7px;height:11px;background:var(--o2-ink);animation:o2-blink 1s step-end infinite;}
  @keyframes o2-blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  @media (prefers-reduced-motion:reduce){ .o2-cursor{animation:none;} .o2-nav-item{transition:none;} .o2-btn{transition:none;} }

  /* notification stack — replaces the old single #toast */
  .o2-stack{position:fixed;right:24px;bottom:24px;display:flex;flex-direction:column;gap:10px;align-items:flex-end;z-index:200;pointer-events:none;}
  .o2-note{display:flex;align-items:center;gap:10px;background:var(--o2-ink);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.2px;padding:13px 18px;white-space:nowrap;transform-origin:right bottom;transition:transform .3s cubic-bezier(.16,1,.3,1),filter .3s ease,opacity .3s ease;}
  .o2-note .dot{width:7px;height:7px;background:var(--o2-accent);flex:none;}

  .nav-menu{position:fixed;z-index:200;background:var(--card);border:.5px solid var(--hairline);border-radius:12px;box-shadow:var(--shadow);padding:6px;min-width:190px;}
  .nav-menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;font-family:inherit;font-size:13.5px;color:var(--ink);padding:9px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;}
  .nm-ic{display:inline-flex;color:var(--grey);}
  .ic{width:15px;height:15px;flex-shrink:0;display:inline-block;}
  .strip-btn .ic{width:14px;height:14px;}
  .nav-menu button:hover{background:rgba(45,45,45,.05);}
  .nav-menu button.danger{color:#A5341F;}
  .nav-menu .nm-sep{height:.5px;background:var(--hairline);margin:5px 4px;}
  /* view header + segmented control (Contacts / Pipeline / Dashboard / etc.) */
  .view-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin:4px 0 18px;flex-wrap:wrap;}
  .view-title{font-family:'Geist',sans-serif;font-weight:900;font-size:22px;letter-spacing:-.02em;}
  .seg{display:inline-flex;gap:2px;background:var(--panel);border:.5px solid var(--hairline);border-radius:10px;padding:3px;}
  .seg-btn{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);background:none;border:none;cursor:pointer;padding:8px 14px;border-radius:8px;}
  .seg-btn.on{color:var(--ink);background:var(--card);box-shadow:var(--shadow);}
  .cv-list{display:flex;flex-direction:column;gap:8px;}
  .cv-list .pc-wrap .pcard.clickable{cursor:pointer;transition:box-shadow .15s,transform .1s,border-color .15s;}
  .cv-list .pc-wrap .pcard.clickable:hover{box-shadow:0 8px 24px rgba(10,31,61,.12);transform:translateY(-2px);border-color:var(--navy);}
  .cv-list .pc-wrap .pcard.expanded{border-color:var(--navy);}
  /* BRB — the comeback as a full navy-fill popup card (GLVE) */
  .cb-modal{position:fixed;inset:0;z-index:150;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(10,10,10,.55);}
  .cb-card{position:relative;max-width:480px;width:100%;background:var(--navy);color:#fff;border-radius:20px;box-shadow:0 30px 80px rgba(10,31,61,.5);padding:40px 36px;}
  .cb-card h2{font-family:'Geist',sans-serif;font-weight:900;font-size:26px;letter-spacing:-.02em;margin:0 0 10px;color:#fff;}
  .cb-card .cbm-sub{font-size:14.5px;line-height:1.6;color:rgba(255,255,255,.72);margin:0 0 20px;}
  .cb-card .cbm-note{font-family:'Geist',sans-serif;font-size:16px;line-height:1.55;color:#fff;border-left:2px solid var(--honey);padding-left:14px;margin:18px 0;}
  .cb-card .cbm-meta{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:22px;}
  .cb-card .cbm-back{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:var(--cream);color:var(--navy);border:none;border-radius:10px;padding:14px 22px;cursor:pointer;font-weight:600;}
  .cb-card .cbm-back:hover{background:#fff;}
  .cb-card .cbm-close{position:absolute;top:16px;right:18px;background:none;border:none;color:rgba(255,255,255,.6);font-size:22px;line-height:1;cursor:pointer;}
  .cb-card .cbm-close:hover{color:#fff;}
  .cb-card .cbm-note-head{font-family:'Geist',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.01em;color:#fff;margin:6px 0 4px;}
  .cb-card .cbm-note-sub{font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.6);margin:0 0 10px;}
  .cb-card .cbm-note-in{width:100%;background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;font-family:'Geist',sans-serif;font-size:15px;line-height:1.5;padding:12px 14px;margin-bottom:20px;resize:vertical;}
  .cb-card .cbm-note-in:focus{outline:none;border-color:rgba(255,255,255,.5);}
  .cb-card .cbm-note-in::placeholder{color:rgba(255,255,255,.4);}
  /* Contacts › Add — manual single-contact form */
  .cadd{background:var(--card);border:.5px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 22px;margin-bottom:16px;}
  .cadd h3{font-family:'Geist',sans-serif;font-weight:800;font-size:16px;margin:0 0 16px;}
  .cadd-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;}
  .cadd .fld{margin-bottom:0;}
  .cadd .fld.full{grid-column:1 / -1;}
  .cadd label{display:block;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);margin:0 0 6px;}
  .cadd label .opt{color:var(--grey2);text-transform:none;letter-spacing:0;}
  .cadd .auth-input{margin-bottom:0;}
  .cadd textarea.auth-input{min-height:52px;resize:vertical;}
  .cadd select.auth-input{cursor:pointer;}
  .cadd .cadd-err{color:#A5341F;font-size:12.5px;min-height:16px;margin:10px 0 4px;}
  .cadd .btn-primary{margin-top:6px;}
  .cadd-or{display:flex;align-items:center;gap:12px;margin:6px 0 14px;color:var(--grey);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
  .cadd-or::before,.cadd-or::after{content:"";flex:1;height:.5px;background:var(--hairline);}
  @media(max-width:620px){.cadd-grid{grid-template-columns:1fr;}}
  .importbox{background:rgba(10,31,61,.04);border:.5px solid rgba(10,31,61,.22);}
  /* Dashboard — Today/Week/Month counts + CSV export */
  .dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
  .dash-stat{background:var(--card);border:.5px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 20px;text-align:center;}
  .dash-stat .ds-num{font-family:'Geist',sans-serif;font-weight:800;font-size:38px;letter-spacing:-.03em;line-height:1;color:var(--ink);}
  .dash-stat .ds-lbl{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-top:8px;}
  .dash-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
  .dash-total{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);}
  @media(max-width:620px){.dash-stat{padding:16px 8px;}.dash-stat .ds-num{font-size:28px;}}
  /* Manage — account page cards */
  .mg-card{background:var(--card);border:.5px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:14px;}
  .mg-card h3{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);margin:0 0 14px;}
  .mg-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .mg-row + .mg-row{margin-top:12px;padding-top:12px;border-top:.5px solid var(--hairline);}
  .mg-label{font-size:14px;color:var(--ink);font-weight:500;}
  .mg-label .mg-sub{display:block;font-size:12px;color:var(--grey);margin-top:2px;font-weight:400;}
  .mg-soon{font-family:'Geist Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);border:.5px solid var(--hairline);border-radius:6px;padding:5px 9px;white-space:nowrap;}
  /* ADHD moment — button, pomodoro, just-do-one, breathe */
  .strip-btn.adhd{border-color:var(--navy);color:var(--navy);}
  .strip-btn.adhd:hover{background:var(--navy);color:#fff;}
  .pomo{position:fixed;right:20px;bottom:20px;z-index:160;background:var(--navy);color:#fff;border-radius:16px;box-shadow:0 20px 50px rgba(10,31,61,.4);padding:16px 18px;width:184px;text-align:center;}
  .pomo.brk{background:var(--green-d);}
  .pomo .pomo-mode{font-family:'Geist Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.65);}
  .pomo .pomo-time{font-family:'Geist',sans-serif;font-weight:800;font-size:40px;letter-spacing:-.03em;line-height:1.1;margin:2px 0 10px;}
  .pomo .pomo-row{display:flex;gap:6px;justify-content:center;}
  .pomo .pomo-row button{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:7px;padding:7px 10px;cursor:pointer;}
  .pomo .pomo-row button:hover{background:rgba(255,255,255,.26);}
  .jo-modal{position:fixed;inset:0;z-index:150;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(10,10,10,.55);}
  .jo-card{max-width:440px;width:100%;background:var(--card);border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.3);padding:32px 30px;text-align:left;}
  .jo-card .jo-eyebrow{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);margin-bottom:6px;}
  .jo-card h2{font-family:'Geist',sans-serif;font-weight:900;font-size:26px;letter-spacing:-.02em;margin:0 0 14px;}
  .jo-card .jo-who{font-size:15px;color:var(--ink);}
  .jo-card .jo-touch{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);margin:4px 0 12px;}
  .jo-card .jo-script{width:100%;min-height:120px;background:var(--bg);border:.5px solid var(--hairline);border-radius:10px;padding:12px;font-family:'Geist',sans-serif;font-size:14px;line-height:1.5;color:var(--ink);resize:vertical;}
  .jo-card .jo-actions{display:flex;gap:10px;margin:14px 0 10px;}
  .jo-card .jo-copy{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:none;border:.5px solid var(--hairline);color:var(--grey);border-radius:9px;padding:12px 16px;cursor:pointer;}
  .jo-card .jo-copy:hover{border-color:var(--ink);color:var(--ink);}
  .jo-card .jo-done{flex:1;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:var(--ink);color:var(--cream);border:none;border-radius:9px;padding:12px;cursor:pointer;font-weight:600;}
  .jo-card .jo-done:hover{background:var(--hover);}
  .jo-card .jo-exit{background:none;border:none;color:var(--grey);font-size:12.5px;cursor:pointer;padding:6px 0;width:100%;text-align:center;}
  .jo-card .jo-exit:hover{color:var(--ink);}
  .br-card{text-align:center;color:#fff;}
  .br-ring{width:120px;height:120px;border-radius:50%;border:2px solid rgba(255,255,255,.25);margin:0 auto 22px;display:flex;align-items:center;justify-content:center;animation:breathe 8s ease-in-out infinite;}
  .br-dot{width:54px;height:54px;border-radius:50%;background:var(--navy-soft,#8FA3B8);}
  @keyframes breathe{0%,100%{transform:scale(.72)}50%{transform:scale(1.18)}}
  .br-word{font-family:'Geist',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.01em;}
  .br-left{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.6);margin:8px 0 18px;}
  /* stat strip + momentum gauge */
  .statstrip{display:flex;align-items:center;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 24px;margin-bottom:34px;}
  .stat{display:flex;flex-direction:column;gap:4px;}
  .stat b{font-family:'Geist',sans-serif;font-weight:900;font-size:22px;line-height:1;}
  .stat .lbl2{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);}
  .stat-sep{color:var(--grey2);margin:0 26px;}
  .meter-stat{cursor:pointer;user-select:none;}
  .meter{display:flex;gap:3px;align-items:flex-end;height:22px;}
  .meter i{width:5px;height:100%;background:var(--hairline);border-radius:1px;transition:background .2s;}
  .meter i.on{background:var(--blue);}
  .meter.full i{background:var(--blue);}
  .meter-num{font-family:'Geist',sans-serif;font-weight:900;font-size:22px;line-height:1;}
  .strip-right{margin-left:auto;display:flex;gap:10px;}
  .strip-btn{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink);background:var(--card);border:.5px solid var(--hairline);border-radius:9px;padding:9px 15px;cursor:pointer;font-family:inherit;}
  .strip-btn:hover{border-color:var(--ink);}
  .strip-btn.on{background:var(--ink);color:var(--card);border-color:var(--ink);}
  /* start here */
  .starthead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;}
  .start-title{font-family:'Geist',sans-serif;font-weight:900;font-size:24px;text-transform:uppercase;letter-spacing:-.01em;}
  .start-sub{font-size:13.5px;color:var(--grey);margin-top:5px;}
  .start-due{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--grey);white-space:nowrap;}
  /* deck / carousel */
  .deck{position:relative;display:flex;justify-content:center;min-height:320px;margin-bottom:36px;}
  .deckcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);}
  .dc.active{width:100%;max-width:840px;padding:30px 34px;z-index:2;}
  .dc.peek{position:absolute;top:24px;width:290px;padding:22px;opacity:.5;z-index:1;overflow:hidden;cursor:pointer;}
  .dc.peek.left{left:0;} .dc.peek.right{right:0;}
  .dc.peek:hover{opacity:.85;}
  @media(max-width:1080px){.dc.peek{display:none;} .dc.active{max-width:100%;}}
  .dc-head{display:flex;align-items:center;gap:16px;margin-bottom:22px;}
  .dc-ava{width:54px;height:54px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-family:'Geist',sans-serif;font-weight:900;font-size:16px;flex-shrink:0;}
  .dc-name{font-family:'Geist',sans-serif;font-weight:900;font-size:23px;letter-spacing:-.01em;}
  .dc-meta{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-top:4px;}
  .dc-due{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink);background:var(--honey);border:.5px solid var(--honey);border-radius:20px;padding:7px 14px;white-space:nowrap;}
  .dc-due.over{color:var(--cream);background:var(--ink);border-color:var(--ink);}
  .dc-navrow{display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .tl-row{display:flex;align-items:flex-start;gap:8px;margin:6px 0 22px;}
  .tl-row .timeline{flex:1;margin:0;}
  .tl-arrow{height:30px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--grey);font-size:28px;line-height:1;cursor:pointer;padding:0 4px;font-family:inherit;flex-shrink:0;}
  .tl-arrow:hover{color:var(--ink);}
  .tl-arrow:disabled{opacity:.22;cursor:default;}
  .dc-touch{text-align:center;}
  .dc-touch b{font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;}
  .dc-touch span{display:block;font-size:12.5px;color:var(--grey);margin-top:3px;}
  /* client intel — the outreach angle, surfaced right on the card */
  .dc-angle{border:.5px solid var(--hairline);border-radius:10px;background:var(--panel);padding:12px 14px;margin-bottom:16px;}
  .dc-angle .eyebrow{color:var(--ollin-maroon);margin-bottom:5px;}
  .dc-angle p:last-child{font-size:14px;font-weight:600;line-height:1.4;color:var(--ink);}
  .dc-btn{display:flex;align-items:center;gap:8px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:none;border:.5px solid var(--hairline);border-radius:9px;padding:10px 16px;cursor:pointer;color:var(--ink);}
  .dc-btn.dark{background:var(--ink);color:var(--card);border-color:var(--ink);}
  .dc-btn:disabled{opacity:.3;cursor:default;}
  .dc-btn:not(:disabled):hover{border-color:var(--ink);}
  /* timeline */
  .timeline{display:flex;align-items:flex-start;justify-content:space-between;margin:6px 0 22px;}
  .tl-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
  .tl-node{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--hairline);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:var(--card);color:var(--grey);z-index:2;}
  .tl-step.done .tl-node,.tl-step.active .tl-node{background:var(--ink);border-color:var(--ink);color:var(--card);}
  .tl-step.active .tl-node{background:var(--blue);border-color:var(--blue);}
  .tl-line{position:absolute;top:15px;left:50%;width:100%;height:1.5px;background:var(--hairline);z-index:1;}
  .tl-step:last-child .tl-line{display:none;}
  .tl-step.done .tl-line{background:var(--ink);}
  .tl-label{font-size:11.5px;color:var(--grey);margin-top:9px;text-align:center;line-height:1.2;}
  .tl-step.active .tl-label{color:var(--ink);font-weight:600;}
  /* mid row */
  .dc-mid{display:flex;border-top:.5px solid var(--hairline);border-bottom:.5px solid var(--hairline);padding:16px 4px;margin-bottom:20px;}
  .dc-mid .mi{display:flex;align-items:flex-start;gap:11px;flex:1;cursor:pointer;background:none;border:none;text-align:left;font-family:inherit;color:var(--ink);}
  .dc-mid .mi:hover .mi-t{color:var(--gold);}
  .mi-t{font-size:14px;}
  .mi-s{font-size:12px;color:var(--grey);margin-top:2px;}
  /* bottom actions */
  .dc-actions{display:flex;gap:10px;}
  .dc-act{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;background:var(--card);border:.5px solid var(--hairline);border-radius:9px;padding:14px;cursor:pointer;color:var(--ink);font-family:inherit;}
  .dc-act:hover{border-color:var(--ink);}
  .dc-act.done{background:var(--ink);color:var(--card);border-color:var(--ink);}
  .dc-act.done:hover{background:var(--hover);border-color:var(--hover);color:var(--cream);}
  .dc-script{display:none;margin-top:18px;border-top:.5px solid var(--hairline);padding-top:16px;}
  .dc-script.open{display:block;}
  .dc-script textarea{width:100%;background:var(--bg);border:.5px solid var(--hairline);border-radius:8px;font-family:'Geist',sans-serif;font-size:14px;line-height:1.55;padding:12px;min-height:110px;resize:vertical;color:var(--ink);}
  .ai-steer{display:none;margin-top:12px;border:1.5px solid var(--blue);border-radius:10px;padding:14px;background:rgba(27,46,82,.05);}
  .ai-steer.open{display:block;}
  .ai-steer-lead{font-size:12.5px;color:var(--blue);font-weight:500;margin-bottom:10px;}
  .ai-steer .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .ai-chip{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;border:.5px solid var(--hairline);background:var(--card);border-radius:20px;padding:6px 11px;cursor:pointer;color:var(--grey);}
  .ai-chip:hover{border-color:var(--blue);color:var(--blue);}
  .ai-steer-row{display:flex;gap:8px;}
  .ai-steer-row input{flex:1;min-width:0;background:var(--card);border:.5px solid var(--hairline);border-radius:7px;font-family:'Geist',sans-serif;font-size:13.5px;padding:11px 12px;color:var(--ink);}
  .ai-steer-row input:focus{outline:2px solid var(--blue);outline-offset:0;border-color:var(--blue);}
  .ai-draft{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:var(--blue);color:#fff;border:.5px solid var(--blue);border-radius:7px;padding:11px 16px;cursor:pointer;white-space:nowrap;}
  .ai-draft:hover{background:#12203C;border-color:#12203C;}
  .ai-draft[disabled]{opacity:.55;cursor:default;}
  /* peek mini */
  .pk-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .pk-ava{width:38px;height:38px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-family:'Geist',sans-serif;font-weight:900;font-size:12px;flex-shrink:0;}
  .pk-name{font-family:'Geist',sans-serif;font-weight:900;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pk-meta{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);margin-top:2px;}
  .pk-due{font-size:11px;color:var(--grey);border:.5px solid var(--hairline);border-radius:20px;padding:4px 10px;display:inline-block;}
  /* section rows as floating cards */
  details.section{border-top:none;margin-top:12px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2px 22px;}
  details.section[open]{padding-bottom:20px;}
  details.section summary{padding:17px 0;justify-content:flex-start;gap:12px;}
  details.section summary .sum-title{margin-right:auto;}
  details.section > summary::after{content:"\203A";color:var(--grey2);font-size:17px;line-height:1;transition:transform .2s;}
  details.section[open] > summary::after{transform:rotate(90deg);}
  .warm,.comeback,.handoff,.verifybar{max-width:840px;margin-left:auto;margin-right:auto;border-radius:var(--radius);}
  .foot{margin-top:44px;}
  /* pipeline / history contact cards */
  .pcard{display:flex;align-items:center;gap:13px;background:var(--bg);border:.5px solid var(--hairline);border-radius:10px;padding:12px 14px;margin-bottom:8px;transition:border-color .15s;}
  .pcard:hover{border-color:var(--ink);}
  .pc-ava{width:38px;height:38px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-family:'Geist',sans-serif;font-weight:900;font-size:12px;flex-shrink:0;}
  .pc-main{flex:1;min-width:0;}
  .pc-name{font-family:'Geist',sans-serif;font-weight:900;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pc-meta{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pc-status{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);white-space:nowrap;flex-shrink:0;}
  .pc-status.gold{color:var(--gold);}
  .pc-x{background:none;border:none;color:var(--grey2);font-size:16px;cursor:pointer;flex-shrink:0;line-height:1;padding:0 2px;}
  .pc-x:hover{color:var(--ink);}
  /* pipeline: collapsible companies + expandable contacts */
  .acct-det{border-bottom:.5px solid var(--hairline);}
  .acct-det:last-of-type{border-bottom:none;}
  .acct-det>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:15px 2px;}
  .acct-det>summary::-webkit-details-marker{display:none;}
  .acct-nm{font-family:'Geist',sans-serif;font-weight:900;font-size:15px;}
  .acct-sub{margin-left:auto;font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);}
  .acct-sub b{color:var(--ink);font-weight:600;}
  .acct-det>summary::after{content:"\203A";color:var(--grey2);font-size:16px;line-height:1;transition:transform .2s;}
  .acct-det[open]>summary::after{transform:rotate(90deg);}
  .acct-body{padding:2px 0 14px;}
  .pc-wrap{margin-bottom:8px;}
  .pc-wrap .pcard{cursor:pointer;}
  .pc-wrap .pcard.expanded{border-color:var(--blue);}
  .pc-exec{display:none;margin-top:8px;}
  .pc-exec.open{display:block;}
  /* focus mode — collapse everything but today's work */
  .app.focus .section,.app.focus .handoff,.app.focus .foot{display:none;}

  /* ============ VAMOS rebrand: ink headlines, honey accent, navy = AI-only ============ */
  /* Wordmark + headlines are single-ink Geist 800 (inherit --ink) — no navy, no accent period.
     Navy (--blue) stays scoped to in-app AI-assist affordances (.ai-steer / .ai-draft).
     Honey is the one accent: primary CTAs, underlines/strikethroughs, section-closing periods. */
  /* Primary CTA hover inverts: honey fill -> ink fill, ink text -> honey text. */
  .btn:hover{background:var(--ink);border-color:var(--ink);color:var(--honey);}
  /* Work card: Review/Skip is a filled navy section; navy Done button (inverts on hover) */
  .dc-mid{background:var(--blue);border:none;border-radius:10px;padding:18px 20px;margin-bottom:20px;}
  .dc-mid .mi{color:#fff;}
  .dc-mid .mi-t{color:#fff;font-weight:600;}
  .dc-mid .mi-s{color:rgba(255,255,255,.68);}
  .dc-mid .mi:hover .mi-t{color:var(--honey);}
  .dc-act.done{background:var(--blue);border-color:var(--blue);color:#fff;}
  .dc-act.done:hover{background:#fff;border-color:var(--blue);color:var(--blue);}

  /* ============ landing page (logged-out) ============ */
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
  .mkt-head{border-bottom:.5px solid var(--hairline);position:sticky;top:0;background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);z-index:10;box-shadow:0 1px 0 var(--hairline),0 6px 20px rgba(17,17,17,.04);}
  .bar{display:flex;justify-content:space-between;align-items:center;padding:16px 0;}
  .bar-mark{font-family:'Geist',sans-serif;font-weight:900;font-size:18px;letter-spacing:.02em;}
  .bar-mark span{color:var(--honey);}
  .bar-login{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);background:none;border:.5px solid var(--ink);border-radius:9px;padding:9px 18px;cursor:pointer;}
  .bar-login:hover{background:var(--ink);color:var(--cream);}
  .hero{position:relative;padding:88px 0 64px;text-align:center;overflow:hidden;}
  /* soft honey glow behind the wordmark */
  .hero::before{content:"";position:absolute;top:8%;left:50%;transform:translateX(-50%);width:min(720px,88vw);height:340px;background:radial-gradient(ellipse at center,rgba(168,50,70,.16),rgba(168,50,70,0) 70%);pointer-events:none;z-index:0;}
  .hero>*{position:relative;z-index:1;}
  .wordmark{font-family:'Geist',sans-serif;font-weight:900;font-size:clamp(72px,17vw,180px);line-height:.92;letter-spacing:.01em;text-transform:uppercase;}
  .wordmark .dot{color:var(--honey);}
  .hero-rule{width:44px;height:3px;background:var(--honey);margin:38px auto 26px;border-radius:2px;}
  .hero-tag{font-size:clamp(20px,3vw,26px);font-weight:500;}
  .hero-sub{max-width:460px;margin:20px auto 0;color:var(--grey);font-size:15.5px;line-height:1.65;}
  .hero-cta{display:inline-block;margin-top:38px;font-family:'Geist Mono',monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);background:var(--honey);padding:17px 36px;border:.5px solid var(--honey);border-radius:var(--radius);cursor:pointer;font-weight:600;box-shadow:0 2px 6px rgba(168,50,70,.28),0 14px 34px rgba(168,50,70,.22);transition:transform .12s ease,box-shadow .12s ease,background .15s;}
  .hero-cta:hover{background:var(--honey-d);border-color:var(--honey-d);color:var(--ink);transform:translateY(-1px);box-shadow:0 4px 10px rgba(168,50,70,.3),0 18px 42px rgba(168,50,70,.26);}
  .hero-free{display:inline-block;margin-top:18px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);}
  .hero-free b{color:var(--ink);font-weight:600;}
  .mkt-eyebrow{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin-bottom:26px;}
  .said{border-top:.5px solid var(--hairline);border-bottom:.5px solid var(--hairline);padding:60px 0;}
  .said-list{list-style:none;}
  .said-list li{font-family:'Geist',sans-serif;font-weight:900;font-size:clamp(18px,4.4vw,42px);line-height:1.35;text-transform:uppercase;color:var(--ink);position:relative;width:fit-content;}
  .said-list li+li{margin-top:10px;}
  .said-list li::after{content:"";position:absolute;left:0;top:54%;height:3px;width:100%;background:var(--honey);}
  .said-answer{margin-top:38px;}
  .how,.mkt-comeback,.quotes,.faq{border-top:.5px solid var(--hairline);}
  .how,.product,.mkt-comeback,.quotes,.faq{padding:70px 0;}
  .how h2,.product h2,.mkt-comeback h2,.quotes h2,.faq h2{font-family:'Geist',sans-serif;font-weight:900;font-size:clamp(26px,4vw,38px);text-transform:uppercase;line-height:1.15;}
  .how h2 span,.product h2 span,.mkt-comeback h2 span,.quotes h2 span,.faq h2 span{color:var(--honey);}
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px;}
  .q-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:32px;}
  .step,.feat,.q-card{border-radius:var(--radius);background:#fff;box-shadow:0 6px 16px rgba(17,17,17,.18),0 22px 50px rgba(17,17,17,.34);padding:28px 24px;}
  .step-num{font-family:'Geist',sans-serif;font-weight:900;font-size:15px;color:var(--honey);}
  .step h3,.feat h3{font-family:'Geist',sans-serif;font-weight:900;font-size:17px;text-transform:uppercase;margin:10px 0 8px;}
  .step p,.feat p{font-size:14px;color:var(--grey);line-height:1.55;}
  .step p b,.feat p b{color:var(--ink);font-weight:600;}
  .nt-badge{display:inline-block;margin-top:20px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey);border:.5px solid var(--hairline);padding:8px 14px;}
  .feat-grid{margin-top:36px;display:grid;gap:16px;}
  .feat-label{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--honey);}
  /* flagship feature cards — honey background, white text */
  .feat.hl{background:var(--honey);box-shadow:0 6px 16px rgba(17,17,17,.22),0 22px 50px rgba(17,17,17,.38);}
  .feat.hl .feat-label{color:rgba(255,255,255,.82);}
  .feat.hl h3{color:#fff;}
  .feat.hl p{color:rgba(255,255,255,.92);}
  .feat.hl p b{color:#fff;}
  .mkt-comeback-grid{display:flex;gap:40px;align-items:center;}
  .mkt-comeback-copy{flex:1;}
  .mkt-comeback-copy p{font-size:15.5px;color:var(--grey);margin-top:16px;max-width:440px;}
  .mkt-comeback-copy p b{color:var(--ink);font-weight:600;}
  .cb-quote{border-left:3px solid var(--honey);padding:2px 0 2px 18px;margin-bottom:20px;}
  .cb-quote p{font-size:16px;font-weight:500;font-style:italic;max-width:440px;}
  /* faithful match to the app's real Welcome-back card (.comeback) */
  .wyo-card{flex:1;max-width:380px;width:100%;border:.5px solid var(--hairline);border-left:3px solid var(--ink);border-radius:var(--radius);background:var(--cream);box-shadow:0 6px 16px rgba(17,17,17,.18),0 22px 50px rgba(17,17,17,.34);padding:22px 24px;}
  .wyo-h{font-family:'Geist',sans-serif;font-weight:900;font-size:17px;letter-spacing:-.01em;text-transform:uppercase;}
  .wyo-h span{color:var(--honey);}
  .wyo-sub{font-size:13.5px;color:var(--grey);line-height:1.5;margin:7px 0 0;}
  .wyo-note{font-family:'Geist',sans-serif;font-size:15.5px;line-height:1.5;color:var(--ink);border-left:2px solid var(--ink);padding-left:13px;margin:15px 0;}
  .wyo-meta{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);margin-bottom:16px;}
  .wyo-cta{display:block;width:100%;text-align:center;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:var(--cream);padding:12px;border:.5px solid var(--ink);border-radius:9px;cursor:pointer;transition:background .15s,border-color .15s;}
  .wyo-cta:hover{background:var(--hover);border-color:var(--hover);color:var(--cream);}
  .q-card p{font-size:14.5px;line-height:1.55;font-weight:500;}
  .q-card p b{color:var(--honey);font-weight:600;}
  .q-card .who{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);margin-top:14px;}
  .faq h2{margin-bottom:24px;}
  .faq details{border-bottom:.5px solid var(--hairline);background:#fff;border-radius:var(--radius);padding:0 20px;margin-bottom:8px;box-shadow:0 6px 16px rgba(17,17,17,.18),0 22px 50px rgba(17,17,17,.34);}
  .faq summary{list-style:none;cursor:pointer;padding:18px 0;font-weight:600;font-size:15.5px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .faq summary::-webkit-details-marker{display:none;}
  .faq summary::after{content:"+";font-family:'Geist',sans-serif;font-weight:900;color:var(--honey);font-size:18px;}
  .faq details[open] summary::after{content:"\2013";}
  .faq .a{font-size:14.5px;color:var(--grey);padding:0 0 18px;max-width:600px;}
  .faq .a b{color:var(--ink);font-weight:600;}
  .signup{padding:78px 0 88px;text-align:center;}
  .signup h2{font-family:'Geist',sans-serif;font-weight:900;font-size:clamp(30px,5vw,50px);text-transform:uppercase;line-height:1.1;}
  .signup h2 span{color:var(--honey);}
  .signup-form{margin-top:36px;display:flex;justify-content:center;max-width:460px;margin-left:auto;margin-right:auto;}
  .signup-form input{flex:1;font-family:'Geist Mono',monospace;font-size:13px;padding:16px 18px;background:#fff;border:.5px solid var(--ink);border-right:none;border-radius:var(--radius) 0 0 var(--radius);color:var(--ink);}
  .signup-form input:focus{outline:none;border-color:var(--honey);}
  .signup-form button{font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;background:var(--honey);color:var(--ink);border:.5px solid var(--honey);padding:0 28px;cursor:pointer;border-radius:0 var(--radius) var(--radius) 0;transition:background .15s;}
  .signup-form button:hover{background:var(--honey-d);border-color:var(--honey-d);color:var(--ink);}
  .signup-note{margin-top:16px;font-size:12.5px;color:var(--grey);font-family:'Geist Mono',monospace;}
  .mkt-footer{border-top:.5px solid var(--hairline);padding:28px 0 40px;}
  .mkt-foot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);}
  .lp-overlay{position:fixed;inset:0;z-index:90;background:rgba(17,17,17,.45);display:flex;align-items:center;justify-content:center;padding:24px;}
  .lp-overlay.hide{display:none;}
  .lp-overlay .lock-card{position:relative;}
  .lp-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;color:var(--grey2);cursor:pointer;line-height:1;}
  .lp-close:hover{color:var(--ink);}
  @media(max-width:760px){.steps{grid-template-columns:1fr;}.q-grid{grid-template-columns:1fr;}.feat-grid{grid-template-columns:1fr!important;}.mkt-comeback-grid{flex-direction:column;align-items:flex-start;}.wyo-card{max-width:100%;width:100%;}.signup-form{flex-direction:column;}.signup-form input{border-right:.5px solid var(--ink);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;}.signup-form button{padding:16px;border-radius:0 0 var(--radius) var(--radius);}
  /* smaller, tighter cards on mobile */
  .how,.product,.mkt-comeback,.quotes,.faq{padding:46px 0;}
  .steps,.feat-grid,.q-grid{gap:12px;margin-top:24px;}
  .step,.feat,.q-card{padding:20px 18px;}
  .step h3,.feat h3{font-size:15px;margin:8px 0 6px;}
  .step p,.feat p{font-size:13px;line-height:1.5;}
  .q-card p{font-size:13.5px;}
  .wyo-card{padding:18px 18px;}
  .wyo-h{font-size:16px;}
  .wyo-note{font-size:14.5px;margin:12px 0;}
  .faq summary{font-size:14.5px;padding:15px 0;}
  .faq .a{font-size:13.5px;}}


  /* ================= VAMOS marketing landing (logged-out) ================= */
  .vl{
    --font-display:'Geist',sans-serif; --font-body:'Geist',system-ui,sans-serif; --font-mono:'Geist Mono',monospace;
    --blue-900:#1B2E52; --ink-900:#111110; --white:#FFFFFF; --grey-600:#6E6A61;
    --paper:#F2F2F2; --panel:#F5F5F5; --hairline:rgba(17,17,16,.12);
    --honey-500:#A83246; --honey-600:var(--honey-d); --cobalt-500:#3B77C2; --magenta-500:#B8438A; --verde-500:#3E9B4F;
    --accent:#A83246; --text-primary:#111110; --text-secondary:#6E6A61; --text-display:#1B2E52;
    --surface-card:#FFFFFF; --radius-card:12px;
    --shadow-card:0 2px 5px rgba(17,17,17,.06),0 14px 40px rgba(17,17,17,.14);
    background:#FFFFFF; color:var(--text-primary); font-family:var(--font-body); line-height:1.6;
  }
  .vl *{box-sizing:border-box;}
  .vl .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
  .vl .tint{background:color-mix(in srgb, var(--blue-900) 5%, var(--paper));}
  /* header */
  .vl-head{border-bottom:.5px solid var(--hairline);position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(10px);-webkit-backdrop-filter:saturate(180%) blur(10px);z-index:10;}
  .vl-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 0;gap:16px;}
  .vl-mark{font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-.03em;text-transform:uppercase;color:var(--blue-900);}
  .vl-head-tag{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-left:14px;}
  .vl-login{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-900);background:none;border:.5px solid var(--ink-900);border-radius:9px;padding:9px 18px;cursor:pointer;white-space:nowrap;}
  .vl-login:hover{background:var(--ink-900);color:#fff;}
  /* shared type */
  .vl-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-secondary);}
  .vl-h2{font-family:var(--font-display);font-weight:800;text-transform:uppercase;line-height:1.15;color:var(--text-display);}
  .vl-h2 .dot{color:var(--accent);}
  .vl-btn{display:inline-block;font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;background:var(--blue-900);color:#fff;border:.5px solid var(--blue-900);border-radius:9px;padding:16px 32px;cursor:pointer;text-decoration:none;transition:background .15s,border-color .15s;}
  .vl-btn:hover{background:var(--ink-900);border-color:var(--ink-900);color:#fff;}
  /* hero */
  .vl-hero{padding:104px 0 80px;text-align:center;}
  .vl-wordmark{font-family:var(--font-display);font-weight:800;font-size:clamp(74px,18vw,220px);line-height:.92;letter-spacing:-.03em;text-transform:uppercase;color:var(--text-display);}
  .vl-rule{width:40px;height:3px;background:var(--accent);margin:36px auto 26px;border-radius:2px;}
  .vl-hero-tag{font-size:clamp(20px,3vw,26px);font-weight:500;letter-spacing:.01em;margin:0;}
  .vl-hero-sub{max-width:440px;margin:20px auto 0;color:var(--text-secondary);font-size:15.5px;}
  .vl-hero-free{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text-secondary);margin-top:16px;}
  /* sections */
  .vl-sec{padding:80px 0;}
  .vl-sec.hair{border-top:.5px solid var(--hairline);}
  .vl-sec.white{background:#fff;}
  .vl-sub{max-width:480px;margin:22px auto 0;color:var(--text-secondary);font-size:15.5px;}
  /* said */
  .vl-said-grid{display:flex;gap:48px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .vl-said-list{list-style:none;margin:0;padding:0;flex:1;min-width:260px;}
  .vl-said-list li{font-family:var(--font-display);font-weight:800;font-size:clamp(18px,4.6vw,44px);line-height:1.35;text-transform:uppercase;width:fit-content;color:var(--text-display);text-decoration:line-through;text-decoration-color:var(--accent);text-decoration-thickness:3px;font-style:italic;}
  .vl-said-list li+li{margin-top:10px;}
  .vl-said-answer{flex:1;min-width:260px;}
  .vl-said-answer .card{font-size:clamp(16px,2.4vw,20px);font-weight:500;line-height:1.65;margin:0;background:var(--surface-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:28px 26px;color:#1B2E52;}
  .vl-vamos{font-family:var(--font-display);font-weight:800;font-size:clamp(26px,5vw,52px);text-transform:uppercase;line-height:1.2;margin-top:36px;color:#1B2E52;}
  /* step + feature cards */
  .vl-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:56px;text-align:left;}
  .vl-feat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:52px;text-align:left;}
  .vl-card{background:var(--surface-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);}
  .vl-card.dark{background:var(--blue-900);}
  .vl-card.dark h3{color:#fff;} .vl-card.dark p{color:rgba(255,255,255,.86);} .vl-card.dark p b{color:#fff;} .vl-card.dark .vl-label{color:rgba(255,255,255,.72);}
  .vl-step{padding:26px 24px;}
  .vl-step .num{font-family:var(--font-display);font-weight:800;font-size:15px;}
  .vl-step h3,.vl-feat h3{font-family:var(--font-display);font-weight:800;font-size:19px;text-transform:uppercase;margin:12px 0 8px;color:var(--text-display);}
  .vl-step p,.vl-feat p{font-size:14.5px;color:var(--text-secondary);line-height:1.55;}
  .vl-step p b,.vl-feat p b{color:var(--text-primary);font-weight:600;}
  .vl-feat{padding:28px 26px;}
  .vl-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-secondary);}
  .vl-feat.hl .vl-label{color:var(--accent);}
  .vl-nt{display:inline-block;margin-top:26px;font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#fff;border:.5px solid var(--hairline);padding:8px 14px;background:var(--blue-900);border-radius:6px;}
  /* comeback */
  .vl-cb-grid{display:flex;gap:44px;align-items:center;margin-top:56px;text-align:left;}
  .vl-cb-copy{flex:1;}
  .vl-cb-copy p{font-size:15.5px;color:var(--text-secondary);max-width:440px;}
  .vl-cb-copy p+p{margin-top:18px;}
  .vl-cb-copy p b{color:var(--text-primary);font-weight:600;}
  .vl-cb-quote{border-left:3px solid var(--ink-900);padding:2px 0 2px 18px;margin-top:26px;}
  .vl-cb-quote p{font-size:16px;font-weight:500;font-style:italic;margin:0;color:var(--text-primary);}
  .vl-wyo-wrap{flex:1;max-width:340px;width:100%;}
  .vl-wyo{background:#fff;border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:22px 22px;}
  .vl-wyo .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-secondary);}
  .vl-wyo .note{font-size:15px;font-weight:500;margin:12px 0 16px;padding:12px;background:var(--paper);border:.5px solid var(--hairline);border-radius:8px;}
  .vl-wyo .row{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:9px 0;border-bottom:.5px solid var(--hairline);}
  .vl-wyo .row b{color:var(--accent);font-weight:500;}
  .vl-wyo .cta{display:block;width:100%;text-align:center;margin-top:18px;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:var(--blue-900);color:#fff;border:none;border-radius:9px;padding:13px;cursor:pointer;}
  .vl-wyo .cta:hover{background:var(--ink-900);}
  /* manifesto */
  .vl-man-grid{display:flex;gap:32px;align-items:flex-start;margin-top:56px;}
  .vl-man-photo{width:200px;flex-shrink:0;border:.5px solid var(--hairline);aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;background:var(--panel);}
  .vl-man-photo span{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary,#9A9A9A);text-align:center;padding:0 10px;line-height:1.5;}
  .vl-man-body p{font-size:clamp(18px,2.4vw,22px);line-height:1.65;font-weight:500;margin:0;}
  .vl-man-body p+p{margin-top:26px;}
  .vl-man-name{font-family:var(--font-display);font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:.02em;margin-top:26px;color:var(--text-display);}
  .vl-man-name span{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:var(--text-secondary);text-transform:uppercase;margin-top:4px;font-weight:400;}
  /* expansion cells */
  .vl-cells{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:56px;max-width:560px;margin-left:auto;margin-right:auto;}
  .vl-cell{background:#fff;border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:22px 20px;display:flex;flex-direction:column;justify-content:space-between;aspect-ratio:1;}
  .vl-cell .nm{font-family:var(--font-display);font-weight:800;font-size:clamp(17px,2.6vw,22px);text-transform:uppercase;line-height:1.15;color:var(--text-display);}
  .vl-cell .nm em{font-style:normal;display:block;}
  .vl-cell .st{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);}
  /* faq */
  .vl-faq{border-bottom:.5px solid var(--hairline);background:#fff;border-radius:var(--radius-card);padding:0 20px;margin-bottom:8px;box-shadow:var(--shadow-card);}
  .vl-faq summary{list-style:none;cursor:pointer;padding:18px 0;font-weight:600;font-size:15.5px;display:flex;justify-content:space-between;align-items:center;gap:12px;color:var(--text-primary);}
  .vl-faq summary::-webkit-details-marker{display:none;}
  .vl-faq summary::after{content:"+";font-family:var(--font-display);font-weight:800;color:var(--accent);font-size:18px;}
  .vl-faq[open] summary::after{content:"\2013";}
  .vl-faq .a{font-size:14.5px;color:var(--text-secondary);padding:0 0 18px;}
  .vl-faq .a b{color:var(--text-primary);font-weight:600;}
  /* signup */
  .vl-signup{padding:88px 0 96px;text-align:center;}
  .vl-signup-form{margin-top:40px;display:flex;justify-content:center;max-width:460px;margin-left:auto;margin-right:auto;}
  .vl-signup-form input{flex:1;font-family:var(--font-mono);font-size:13px;padding:16px 18px;background:transparent;border:.5px solid var(--ink-900);border-right:none;border-radius:9px 0 0 9px;color:var(--text-primary);}
  .vl-signup-form input:focus{outline:none;}
  .vl-signup-form button{font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;background:var(--blue-900);color:#fff;font-weight:600;border:.5px solid var(--blue-900);padding:0 26px;cursor:pointer;border-radius:0 9px 9px 0;}
  .vl-signup-form button:hover{background:var(--ink-900);border-color:var(--ink-900);}
  .vl-signup-note{margin-top:16px;font-size:12.5px;color:var(--text-secondary);font-family:var(--font-mono);letter-spacing:.04em;}
  /* footer */
  .vl-footer{border-top:.5px solid var(--hairline);padding:28px 0 40px;}
  .vl-foot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary);}
  @media(max-width:760px){
    .vl-steps,.vl-feat-grid,.vl-cells{grid-template-columns:1fr;}
    .vl-said-grid,.vl-cb-grid,.vl-man-grid{flex-direction:column;align-items:flex-start;}
    .vl-wyo-wrap{max-width:100%;}
    .vl-man-photo{width:140px;}
    .vl-sec{padding:60px 0;}
    .vl-hero{padding:72px 0 56px;}
  }


  /* landing: live work-card demo */
  .vl-demo-sec{padding:80px 0;background:#fff;border-top:.5px solid var(--hairline);}
  .vl-demo{max-width:720px;margin:48px auto 0;background:#fff;border-radius:var(--radius-card);box-shadow:0 6px 16px rgba(17,17,17,.18),0 22px 50px rgba(17,17,17,.34);padding:30px 32px;text-align:left;}
  .vl-demo-head{display:flex;align-items:center;gap:16px;margin-bottom:22px;}
  .vl-demo-ava{width:52px;height:52px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:15px;color:var(--blue-900);flex-shrink:0;}
  .vl-demo-name{font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--text-display);}
  .vl-demo-meta{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary);margin-top:4px;}
  .vl-demo-due{margin-left:auto;font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-900);background:var(--honey-500);border-radius:20px;padding:7px 14px;white-space:nowrap;}
  .vl-demo-touch{text-align:center;margin-bottom:16px;}
  .vl-demo-touch b{font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-display);}
  .vl-demo-touch span{display:block;font-size:12.5px;color:var(--text-secondary);margin-top:3px;}
  .vl-tl{display:flex;justify-content:space-between;margin:6px 0 22px;}
  .vl-tl-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
  .vl-tl-node{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--hairline);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:#fff;color:var(--text-secondary);z-index:2;font-family:var(--font-mono);}
  .vl-tl-step.active .vl-tl-node{background:var(--blue-900);border-color:var(--blue-900);color:#fff;}
  .vl-tl-line{position:absolute;top:15px;left:50%;width:100%;height:1.5px;background:var(--hairline);z-index:1;}
  .vl-tl-step:last-child .vl-tl-line{display:none;}
  .vl-tl-label{font-size:11px;color:var(--text-secondary);margin-top:9px;text-align:center;}
  .vl-tl-step.active .vl-tl-label{color:var(--text-primary);font-weight:600;}
  .vl-demo-mid{display:flex;background:var(--blue-900);border-radius:10px;padding:16px 20px;margin-bottom:18px;gap:16px;}
  .vl-demo-mid .m{flex:1;color:#fff;}
  .vl-demo-mid .mt{font-size:14px;font-weight:600;}
  .vl-demo-mid .ms{font-size:12px;color:rgba(255,255,255,.68);margin-top:2px;}
  .vl-demo-acts{display:flex;gap:10px;}
  .vl-demo-act{flex:1;text-align:center;font-size:13px;background:#fff;border:.5px solid var(--hairline);border-radius:9px;padding:14px;color:var(--text-primary);font-family:var(--font-body);}
  .vl-demo-act.done{background:var(--blue-900);border-color:var(--blue-900);color:#fff;}
  /* AI-assist affordance (navy = AI, per the system) */
  .vl-demo-ai{margin-top:18px;border-top:.5px solid var(--hairline);padding-top:18px;}
  .vl-demo-script{font-size:14px;line-height:1.55;color:var(--text-primary);background:var(--panel);border:.5px solid var(--hairline);border-radius:8px;padding:14px 16px;margin:0;}
  .vl-demo-ai-row{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap;}
  .vl-demo-rewrite{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;background:var(--blue-900);color:#fff;border:.5px solid var(--blue-900);border-radius:9px;padding:11px 18px;cursor:pointer;}
  .vl-demo-ai-note{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--blue-900);}
  .vl-demo-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  .vl-demo-chip{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;border:.5px solid var(--blue-900);color:var(--blue-900);background:transparent;border-radius:20px;padding:7px 13px;cursor:pointer;}
  .vl-demo-chip:hover{background:var(--blue-900);color:#fff;}
  @media(max-width:760px){.vl-demo{padding:22px 20px;}.vl-demo-acts{flex-wrap:wrap;}.vl-demo-act{min-width:calc(50% - 5px);}.vl-tl-label{font-size:9px;}.vl-demo-name{font-size:19px;}}


  /* ============ VAMOS app · GLVE accents: amber=AI, navy=comeback, green=status ============ */
  /* AI affordances -> burgundy (no orange anywhere in the Write-with-AI flow) */
  .script-actions button.ai-btn{color:var(--ollin-maroon);border-color:var(--ollin-maroon);}
  .script-actions button.ai-btn:hover{background:var(--ollin-maroon);border-color:var(--ollin-maroon);color:#fff;}
  .script-actions button.ai-btn[disabled]:hover{background:none;color:var(--ollin-maroon);}
  .ai-steer{border-color:var(--ollin-maroon);background:rgba(168,50,70,.06);}
  .ai-steer-lead{color:var(--ollin-maroon);}
  .ai-chip:hover{border-color:var(--ollin-maroon);color:var(--ollin-maroon);}
  .ai-steer-row input:focus{outline-color:var(--ollin-maroon);border-color:var(--ollin-maroon);}
  .ai-draft{background:var(--ollin-maroon);border-color:var(--ollin-maroon);color:#fff;}
  .ai-draft:hover{background:var(--honey-d);border-color:var(--honey-d);color:#fff;}
  /* subtle, non-blocking signal hint under an AI draft (from write.js angleWarning) */
  .ai-hint{display:none;margin-top:10px;font-size:12px;line-height:1.45;color:var(--grey);border-left:2px solid var(--ollin-maroon);background:rgba(168,50,70,.06);padding:8px 11px;border-radius:0 6px 6px 0;}
  .ai-hint.show{display:block;}
  /* Comeback + before-you-go -> navy */
  .comeback{border-left-color:var(--navy);}
  .comeback .cb-note{border-left-color:var(--navy);}
  .comeback .cb-back{background:var(--navy);border-color:var(--navy);}
  .comeback .cb-back:hover{background:#1a3052;border-color:#1a3052;color:var(--cream);}
  .handoff{border-left:3px solid var(--navy);}
  .handoff .saved{color:var(--green-d);}
  /* System status -> green */
  .pc-status.gold{color:var(--green-d);}
  .warm-title{color:var(--green-d);}
  .meter i.on,.meter.full i{background:var(--green);}
  .nav-bell .dot{background:var(--green);}
  .big-num.done{color:var(--green-d);}
  .handoff .saved{color:var(--green-d);}
  /* Primary buttons + work-card neutrals (ink; navy freed for comeback) */
  .btn{background:var(--ink);border-color:var(--ink);color:#fff;}
  .btn:hover{background:var(--hover);border-color:var(--hover);color:#fff;}
  .dc-due{background:var(--panel);color:var(--ink);border-color:var(--hairline);}
  .dc-due.over{background:var(--ink);color:var(--cream);border-color:var(--ink);}
  .tl-step.active .tl-node{background:var(--ollin-maroon);border-color:var(--ollin-maroon);}
  /* Review/Skip: neutral band with a dividing line between the two items */
  .dc-mid{background:var(--panel);border:none;border-radius:12px;padding:4px 8px;}
  .dc-mid .mi{padding:16px 18px;}
  .dc-mid .mi + .mi{border-left:1px solid var(--hairline);}
  .dc-mid .mi-t{color:var(--ink);} .dc-mid .mi-s{color:var(--grey);} .dc-mid .mi:hover .mi-t{color:var(--ink);}
  .dc-act.done{background:var(--ollin-maroon);border-color:var(--ollin-maroon);color:#fff;}
  .dc-act.done:hover{background:var(--honey-d);border-color:var(--honey-d);color:#fff;}
  /* Unlimited / upgrade -> navy (AI, secondary lead); active plan = green status */
  .planbar{border-left-color:var(--navy);}
  .planbar a{color:var(--navy);} .planbar a:hover{color:var(--navy-2);}
  .planbar.founding{border-left-color:var(--green-d);color:var(--ink);}
  .btn-mini.gopro{border-color:var(--navy);color:var(--navy);}
  .btn-mini.gopro:hover{background:var(--navy);border-color:var(--navy);color:#fff;}
  .upgrade-card .up-eyebrow{color:var(--navy);}
  .upgrade-card .up-list li::before{color:var(--navy);}
  .upgrade-card .btn{background:var(--navy);border-color:var(--navy);color:#fff;}
  .upgrade-card .btn:hover{background:var(--navy-2);border-color:var(--navy-2);color:#fff;}

  /* ===================== VAMOS landing · GLVE / Marcos Cuellar system ===================== */
  .site{
    --font:'Geist',-apple-system,BlinkMacSystemFont,sans-serif; --mono:'Geist Mono',ui-monospace,Menlo,monospace;
    --bg:#fff; --ink:#0a0a0a; --ink-2:#525252; --ink-3:#a3a3a3; --ink-4:#d4d4d4;
    --line:#e7e5e4; --line-soft:#ededeb; --paper:#f5f5f4;
    --amber:#f59e0b; --amber-d:#d97706; --amber-ddd:#92400e; --amber-pale:#fef3c7; --amber-bg:#fffbeb;
    --navy:#0A1F3D; --navy-2:#1a3052; --navy-mid:#4B6177; --navy-soft:#8FA3B8; --navy-fade:#B8C5D1; --navy-on:#93c5fd;
    --green:#10b981; --green-d:#059669; --green-on:#4ade80;
    --r-1:4px; --r-2:8px; --r-3:12px; --r-4:14px; --r-5:16px; --r-6:20px; --r-7:28px; --r-8:32px; --r-pill:100px;
    --sh-card:0 12px 32px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04); --sh-hover:0 12px 28px rgba(0,0,0,.18);
    --ease:cubic-bezier(.16,1,.3,1);
    background:#fff; color:var(--ink); font-family:var(--font); font-size:15px; line-height:1.5; letter-spacing:-.01em;
  }
  .site *{box-sizing:border-box;}
  .site .wrap{max-width:1240px;margin:0 auto;padding:0 48px;}
  @keyframes amberPulse{0%,100%{box-shadow:0 0 18px rgba(245,158,11,.14),0 8px 18px rgba(245,158,11,.06);}50%{box-shadow:0 0 30px rgba(245,158,11,.24),0 10px 22px rgba(245,158,11,.09);}}
  @keyframes navyPulse{0%,100%{box-shadow:0 0 18px rgba(10,31,61,.14),0 8px 18px rgba(10,31,61,.06);}50%{box-shadow:0 0 30px rgba(10,31,61,.24),0 10px 22px rgba(10,31,61,.09);}}
  /* --- system text --- */
  .site .eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);}
  .site .mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;}
  /* --- header --- */
  .gl-head{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(10px);-webkit-backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line);}
  .gl-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 0;gap:16px;}
  .gl-mark{font-weight:700;font-size:22px;letter-spacing:-.04em;}
  .gl-mark .m{font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-left:14px;}
  /* minimal splash: logo, login, contact — the entire logged-out landing page */
  .lp-splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;padding:24px;text-align:center;}

  var hasStore = (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function");
  var hasLS = (function(){ try{ window.localStorage.setItem("__t","1"); window.localStorage.removeItem("__t"); return true; }catch(e){ return false; } })();
  async function sGet(k){
    if(hasStore){ try{ var r = await window.storage.get(k); return r ? r.value : null; }catch(e){} }
    if(hasLS){ try{ var v = window.localStorage.getItem(k); return v===null ? null : v; }catch(e){} }
    return (k in mem) ? mem[k] : null;
  }
  async function sSet(k,v){
    if(hasStore){ try{ await window.storage.set(k,v); return; }catch(e){} }
    if(hasLS){ try{ window.localStorage.setItem(k,v); return; }catch(e){} }
    mem[k]=v;
  }
