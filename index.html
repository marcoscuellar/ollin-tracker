  // ---------- date helpers (local, no tz drift) ----------
  function todayStr(){ var d=new Date(); return iso(d); }
  function iso(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function pad(n){ return (n<10?"0":"")+n; }
  function parse(s){ var p=s.split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
  function addDays(s,n){ var d=parse(s); d.setDate(d.getDate()+n); return d; }
  function shiftWeekend(d){ var g=d.getDay(); if(g===6)d.setDate(d.getDate()+2); else if(g===0)d.setDate(d.getDate()+1); return d; }
  function fmtLong(s){ var d=parse(s); return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
  function fmtShort(s){ var d=parse(s); return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }

  // ---------- schedule build ----------
  function buildTouches(acct){
    var out=[];
    (acct.threads||[]).forEach(function(t){
      if(t.persona==="Blocker") return; // blocker not sequenced
      var entry = t.entryDay || PERSONA_ENTRY[t.persona] || 1;
      CADENCE.forEach(function(c,i){
        var d = addDays(acct.start, (entry-1)+c.off);
        d = shiftWeekend(d);
        out.push({
          id: acct.id+"|"+t.id+"|"+i,
          acctId: acct.id, threadId:t.id, company:acct.company,
          who:t.name, title:t.title, persona:t.persona,
          li:t.linkedin, email:t.email, angle:t.angle,
          ch:c.ch, chLabel:c.label, touchNo:i+1, date:iso(d)
        });
      });
    });
    return out;
  }

  function byDateThenCompany(a,b){
    if(a.date!==b.date) return a.date<b.date?-1:1;
    var ca=a.company||"", cb=b.company||"";

  }

  // ---------- notification stack (max 4, newest full-scale, older ones scale/dim behind it) ----------
  function toast(msg){
    var stack=document.getElementById("o2Stack"); if(!stack) return;
    var note=el('<div class="o2-note"><span class="dot"></span><span></span></div>');
    note.lastChild.textContent=msg;
    stack.appendChild(note);
    while(stack.children.length>4) stack.removeChild(stack.firstChild);
    restackNotes();
    setTimeout(function(){
      note.style.opacity="0"; note.style.transform="translateY(-10px)";
      setTimeout(function(){ if(note.parentNode) note.parentNode.removeChild(note); restackNotes(); },200);
    },2600);
  }
  function restackNotes(){
    var stack=document.getElementById("o2Stack"); if(!stack) return;
    var kids=Array.prototype.slice.call(stack.children);
    kids.forEach(function(el,i){
      var depth=kids.length-1-i;
      el.style.transform="scale("+(1-depth*.035)+")";
      el.style.filter=depth?("opacity("+(1-depth*.28)+")"):"none";
    });
  }
  function el(html){ var d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstChild; }
  function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function extUrl(u){
    u=(u||"").trim();
    if(!u) return "";
    if(/^https?:\/\//i.test(u)) return u;
    // reject placeholders / non-URLs like "(verify)", "TBD", a bare name, etc.
    if(/\s/.test(u) || !/[a-z0-9-]+\.[a-z]{2,}/i.test(u)) return "";
    return "https://"+u.replace(/^\/+/,"");
  }

  // ---------- Engine 7 CSV import ----------
  function parseCSV(text){
    var rows=[], row=[], cur="", q=false;
    for(var i=0;i<text.length;i++){
      var c=text[i];
      if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
      else {
        if(c==='"')q=true;
        else if(c===','){ row.push(cur); cur=""; }
        else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(cur); rows.push(row); row=[]; cur=""; }
        else cur+=c;
      }
    }
    if(cur!=="" || row.length){ row.push(cur); rows.push(row); }
    return rows.filter(function(r){ return r.some(function(c){return (c||"").trim()!=="";}); });
  }
  function colMap(header){
    var m={}, lower=[];
    header.forEach(function(h,i){ var k=(h||"").trim().toLowerCase(); m[k]=i; lower[i]=k; });
    function find(){ for(var a=0;a<arguments.length;a++){ if(arguments[a] in m) return m[arguments[a]]; } return -1; }
    // findC: first column whose header contains ALL given substrings
    function findC(){ var t=[].slice.call(arguments); for(var i=0;i<lower.length;i++){ var h=lower[i]; if(t.every(function(s){return h.indexOf(s)>-1;})) return i; } return -1; }
    // pick: first index that is >= 0 (find/findC return -1 when not found)
    function pick(){ for(var a=0;a<arguments.length;a++){ if(arguments[a]>=0) return arguments[a]; } return -1; }
    return {
      first:find("first name","firstname","first"),
      last:find("last name","lastname","last"),
      name:find("name","full name","contact"),
      email:find("email","email address"),
      company:find("company","company name","account"),
      title:find("job title","title"),
      li:find("linkedin url","linkedin","linkedin profile"),
      thread:find("outreach thread","thread","persona"),
      seq:find("sequence day","entry day","day"),
      chan:find("first touch channel","channel","first channel"),
      angle:find("outreach angle","angle","why this person"),
      status:find("lead status","status"),
      t1:pick(find("touch 1 copy","touch 1","touch1 copy","linkedin 1","touch 1 message"), findC("outreach 1"), findC("linkedin","day 1")),
      t2subj:pick(find("touch 2 subject","email 1 subject","touch2 subject"), findC("email","subject")),
      t2:pick(find("touch 2 copy","touch 2","touch2 copy","email 1 body","touch 2 message"), findC("outreach 2","body"), findC("email","body")),
      t3:pick(find("touch 3 copy","touch 3","touch3 copy","linkedin 2","touch 3 message"), findC("outreach 3","linkedin"), findC("linkedin 2")),
      t4subj:pick(find("touch 4 subject","email 2 subject","touch4 subject"), findC("email 2","subject")),
      t4:pick(find("touch 4 copy","touch 4","touch4 copy","email 2 body","touch 4 message"), findC("email 2","body")),
      t5:pick(find("touch 5 copy","touch 5","touch5 copy","call script","touch 5 message"), findC("call/vm"), findC("call"))
    };
  }
  function personaFrom(thread, status){
    var s=((thread||"")+" "+(status||"")).toLowerCase();
    if(s.indexOf("blocker")>-1 || s.indexOf("hold")>-1) return "Blocker";
    if(s.indexOf("champion")>-1) return "Champion";
    if(s.indexOf("evaluat")>-1 || s.indexOf("technical")>-1 || s.indexOf("tech")>-1) return "Technical Evaluator";
    if(s.indexOf("buyer")>-1 || s.indexOf("economic")>-1) return "Economic Buyer";
    return "Additional";
  }
  function channelFrom(s){ s=(s||"").toLowerCase(); if(s.indexOf("email")>-1)return"em"; if(s.indexOf("call")>-1)return"call"; return "li"; }
  function dayFrom(s, persona){ var m=(s||"").match(/\d+/); if(m) return parseInt(m[0],10); return 1; } // no Sequence Day column → start today

  function importEngine7(text){
    var rows=parseCSV(text);
    if(rows.length<2) return {ok:false,msg:"No data rows found"};
    var cm=colMap(rows[0]);
    if(cm.name<0 && cm.first<0) return {ok:false,msg:"No Name column found — include a header row with Name and Company"};
    var byCompany={};
    var imported=0;
    for(var i=1;i<rows.length;i++){
      var r=rows[i];
      var get=function(idx){ return idx>=0 && idx<r.length ? (r[idx]||"").trim() : ""; };
      var name = cm.name>=0 ? get(cm.name) : (get(cm.first)+" "+get(cm.last)).trim();
      if(!name) continue;
      var company = get(cm.company) || "Imported account";
      var persona = personaFrom(get(cm.thread), get(cm.status));
      var thread={
        id:"t"+Date.now()+"_"+i+"_"+Math.floor(Math.random()*999),
        name:name, title:get(cm.title), persona:persona,
        entryDay: persona==="Blocker"?0:dayFrom(get(cm.seq), persona),
        channel:channelFrom(get(cm.chan)),
        linkedin:get(cm.li), email:get(cm.email),
        angle:get(cm.angle)
      };
      // capture per-touch message copy (maps to the 5-touch cadence i=0..4)
      function withSubj(subj, body){ subj=(subj||"").trim(); body=(body||"").trim(); if(!body && !subj) return ""; return subj ? ("Subject: "+subj+"\n\n"+body) : body; }
      thread._msgs = {
        0: get(cm.t1),
        1: withSubj(get(cm.t2subj), get(cm.t2)),
        2: get(cm.t3),
        3: withSubj(get(cm.t4subj), get(cm.t4)),
        4: get(cm.t5)
      };
      (byCompany[company]=byCompany[company]||[]).push(thread);
      imported++;
    }
    var lastId=null;
    Object.keys(byCompany).forEach(function(company){
      var existing=state.accounts.find(function(a){return a.company.toLowerCase()===company.toLowerCase();});
      var acctId, threadsToAdd=byCompany[company];
      if(existing){ existing.threads=(existing.threads||[]).concat(threadsToAdd); acctId=existing.id; }
      else { acctId="a"+Date.now()+"_"+Math.floor(Math.random()*999); state.accounts.push({id:acctId, company:company, start:todayStr(), threads:threadsToAdd}); }
      // now that account id is known, drop any captured message copy into the matching touch slots
      threadsToAdd.forEach(function(t){
        if(t._msgs){
          for(var k=0;k<5;k++){ var v=(t._msgs[k]||"").trim(); if(v) state.notes[acctId+"|"+t.id+"|"+k]=v; }
          delete t._msgs;
        }
      });
      lastId=acctId;
    });
    if(lastId) state.activeId=lastId;
    return {ok:true, count:imported, accounts:Object.keys(byCompany).length};
  }

  // ---------- shared upsert import (used by Google Sheet sync) ----------
  function withSubjG(subj, body){ subj=(subj||"").trim(); body=(body||"").trim(); if(!body && !subj) return ""; return subj ? ("Subject: "+subj+"\n\n"+body) : body; }
  function importRows(rows, upsert){
    if(!rows || rows.length<2) return {ok:false,msg:"No data rows found (need a header row + at least one contact)"};
    var cm=colMap(rows[0]);
    if(cm.name<0 && cm.first<0) return {ok:false,msg:"No Name column found — check the header row"};
    var added=0, updated=0, skipped=0, lastAcctId=null;
    var budget=freeLeft(); // new contacts allowed under the free cap (Infinity if unlimited)
    for(var i=1;i<rows.length;i++){
      var r=rows[i];
      var get=function(idx){ return idx>=0 && idx<r.length ? (r[idx]||"").trim() : ""; };
      var name = cm.name>=0 ? get(cm.name) : (get(cm.first)+" "+get(cm.last)).trim();
      if(!name) continue;
      var company = get(cm.company) || "Imported account";
      var persona = personaFrom(get(cm.thread), get(cm.status));
      var fields = {
        name:name, title:get(cm.title), persona:persona,
        entryDay: persona==="Blocker"?0:dayFrom(get(cm.seq), persona),
        channel:channelFrom(get(cm.chan)), linkedin:get(cm.li), email:get(cm.email), angle:get(cm.angle)
      };
      var msgs = { 0:get(cm.t1), 1:withSubjG(get(cm.t2subj),get(cm.t2)), 2:get(cm.t3), 3:withSubjG(get(cm.t4subj),get(cm.t4)), 4:get(cm.t5) };
      var acct = state.accounts.find(function(a){ return normCompany(a.company)===normCompany(company); });
      if(!acct){ acct={ id:"a"+Date.now()+"_"+i+"_"+Math.floor(Math.random()*999), company:company, start:todayStr(), threads:[] }; state.accounts.push(acct); }
      acct.threads=acct.threads||[];
      var thread=null;
      if(upsert){ var key=normContact(fields); if(key) thread=acct.threads.find(function(t){ return normContact(t)===key; }); }
      if(thread){
        thread.name=fields.name; thread.title=fields.title; thread.persona=fields.persona; thread.entryDay=fields.entryDay;
        thread.channel=fields.channel; thread.linkedin=fields.linkedin; thread.email=fields.email; thread.angle=fields.angle;
        updated++;
      } else {
        if(added>=budget){ skipped++; continue; } // over the free cap — hold this one back
        thread={ id:"t"+Date.now()+"_"+i+"_"+Math.floor(Math.random()*999) };
        for(var f in fields) thread[f]=fields[f];
        acct.threads.push(thread); added++;
      }
      for(var k=0;k<5;k++){ var v=(msgs[k]||"").trim(); if(v) state.notes[acct.id+"|"+thread.id+"|"+k]=v; }
      lastAcctId=acct.id;
    }
    // drop any account left empty because all its rows hit the cap
    state.accounts=state.accounts.filter(function(a){ return (a.threads||[]).length>0; });
    if(lastAcctId && state.accounts.some(function(a){return a.id===lastAcctId;})) state.activeId=lastAcctId;
    return {ok:true, added:added, updated:updated, skipped:skipped};
  }

  // turn any Google Sheets link into an anonymously-fetchable CSV URL.
  // Use the gviz endpoint for /edit links — it works with "anyone with the
  // link" sharing, unlike /export which often 401s for anonymous requests.
  function sheetCsvUrl(u){
    u=(u||"").trim();
    if(/output=csv/i.test(u) || /tqx=out:csv/i.test(u)) return u;
    var mE=u.match(/\/spreadsheets\/d\/e\/([^/]+)\/pub/);
    if(mE){ var g=(u.match(/[?&]gid=(\d+)/)||[])[1]; return "https://docs.google.com/spreadsheets/d/e/"+mE[1]+"/pub?output=csv"+(g?("&gid="+g):""); }
    var mId=u.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    if(mId){ var g2=(u.match(/[#&?]gid=(\d+)/)||[])[1]; return "https://docs.google.com/spreadsheets/d/"+mId[1]+"/gviz/tq?tqx=out:csv"+(g2?("&tq=&gid="+g2):""); }
    return u;
  }

  // Lazy-load the Excel reader only when someone actually uploads an .xlsx.
  var _xlsxP=null;
  function loadXLSX(){
    if(window.XLSX) return Promise.resolve(window.XLSX);
    if(_xlsxP) return _xlsxP;
    _xlsxP=new Promise(function(resolve,reject){
      var s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
      s.onload=function(){ window.XLSX ? resolve(window.XLSX) : reject(new Error("Excel reader failed to load")); };
      s.onerror=function(){ reject(new Error("Couldn\u2019t load the Excel reader \u2014 check your connection")); };
      document.head.appendChild(s);
    });
    return _xlsxP;
  }
  function applyImportRows(rows){
    rows=(rows||[]).map(function(row){ return (row||[]).map(function(c){ return c==null?"":String(c); }); });
    if(rows.length<2){ toast("That file has no contact rows"); return; }
    var res=importRows(rows, true);
    if(!res.ok){ toast(res.msg); return; }
    state.seeded=true; persistAccounts(); render();
    toast("Imported: "+res.added+" added, "+res.updated+" updated");
    if(res.skipped) openUpgrade(res.skipped+" contact"+(res.skipped>1?"s":"")+" didn’t fit your "+FREE_CONTACT_CAP+" free slots.");
  }
  function handleImportFile(file){
    if(!file) return;
    var nm=(file.name||"").toLowerCase(), ty=(file.type||"").toLowerCase();
    var isXlsx=/\.(xlsx|xls)$/.test(nm) || ty.indexOf("sheet")>-1 || ty.indexOf("excel")>-1;
    if(isXlsx){
      toast("Reading Excel\u2026");
      loadXLSX().then(function(XLSX){
        var rd=new FileReader();
        rd.onload=function(){
          try{
            var wb=XLSX.read(new Uint8Array(rd.result), {type:"array"});
            var sh=wb.Sheets[wb.SheetNames[0]];
            applyImportRows(XLSX.utils.sheet_to_json(sh, {header:1, blankrows:false, defval:""}));
          }catch(e){ toast("Couldn\u2019t read that Excel file"); }
        };
        rd.onerror=function(){ toast("Couldn\u2019t read that file"); };
        rd.readAsArrayBuffer(file);
      }).catch(function(e){ toast(e.message||"Excel reader failed to load"); });
    } else {
      var rd=new FileReader();
      rd.onload=function(){ applyImportRows(parseCSV(String(rd.result||""))); };
      rd.onerror=function(){ toast("Couldn\u2019t read that file"); };
      rd.readAsText(file);
    }
  }

  // ---------- duplicate detection / cleanup ----------
  function normCompany(s){
    return (s||"").toLowerCase().trim()
      .replace(/[.,/&]/g," ")
      .replace(/\b(inc|llc|ltd|limited|corp|corporation|co|company|gmbh|sa|sas|srl|plc|the)\b/g," ")
      .replace(/\s+/g," ").trim();
  }
  function normContact(t){
    var e=(t.email||"").toLowerCase().trim();
    if(e) return "e:"+e;
    var li=(t.linkedin||"").toLowerCase().trim().replace(/\/+$/,"");
    if(li) return "l:"+li;
    var n=(t.name||"").toLowerCase().replace(/\s+/g," ").trim();
    return n ? "n:"+n : "";
  }
  function migrateKey(map, from, to){
    if(from===to) return;
    if(map[from]!=null){ if(map[to]==null) map[to]=map[from]; delete map[from]; }
  }
  function dedupeThreads(acct){
    var seen={}, kept=[], removed=0;
    (acct.threads||[]).forEach(function(t){
      var k=normContact(t);
      if(!k){ kept.push(t); return; }
      if(seen[k]){
        var keep=seen[k];
        ["title","email","linkedin","angle"].forEach(function(f){ if(!((keep[f]||"").trim()) && (t[f]||"").trim()) keep[f]=t[f]; });
        for(var c=0;c<5;c++){
          migrateKey(state.done, acct.id+"|"+t.id+"|"+c, acct.id+"|"+keep.id+"|"+c);
          migrateKey(state.notes, acct.id+"|"+t.id+"|"+c, acct.id+"|"+keep.id+"|"+c);
        }
        removed++;
      } else { seen[k]=t; kept.push(t); }
    });
    acct.threads=kept;
    return removed;
  }
  function countDuplicates(){
    var groups={}, dupAccts=0, dupThreads=0;
    state.accounts.forEach(function(a){ var k=normCompany(a.company)||("id:"+a.id); (groups[k]=groups[k]||[]).push(a); });
    Object.keys(groups).forEach(function(k){
      dupAccts += groups[k].length-1;
      var seen={};
      groups[k].forEach(function(a){ (a.threads||[]).forEach(function(t){ var ck=normContact(t); if(!ck) return; if(seen[ck]) dupThreads++; else seen[ck]=1; }); });
    });
    return { accounts:dupAccts, threads:dupThreads };
  }
  function runDedupe(){
    var groups={};
    state.accounts.forEach(function(a){ var k=normCompany(a.company)||("id:"+a.id); (groups[k]=groups[k]||[]).push(a); });
    var newAccounts=[], removedAccts=0, removedThreads=0;
    Object.keys(groups).forEach(function(k){
      var list=groups[k].slice().sort(function(a,b){ return (a.start||"").localeCompare(b.start||""); });
      var keep=list[0]; keep.threads=keep.threads||[];
      for(var i=1;i<list.length;i++){
        var b=list[i];
        (b.threads||[]).forEach(function(t){
          for(var c=0;c<5;c++){
            migrateKey(state.done, b.id+"|"+t.id+"|"+c, keep.id+"|"+t.id+"|"+c);
            migrateKey(state.notes, b.id+"|"+t.id+"|"+c, keep.id+"|"+t.id+"|"+c);
          }
          keep.threads.push(t);
        });
        removedAccts++;
      }
      removedThreads += dedupeThreads(keep);
      newAccounts.push(keep);
    });
    state.accounts=newAccounts;
    if(!state.accounts.some(function(a){return a.id===state.activeId;})) state.activeId=state.accounts.length?state.accounts[0].id:null;
    return { accounts:removedAccts, threads:removedThreads };
  }

    }

    var scriptVal = state.notes[i.touch.id] || fillTemplate(TEMPLATES[i.ch], c);

    var wrap=el('<div class="o2-left"></div>');

    if(hasWhy || lastTouch){
      stage.appendChild(el('<div class="o2-intel-head"><span>CLIENT INTELLIGENCE</span><span>ACCOUNT NOTES</span></div>'));

      intel.appendChild(el('<div class="o2-intel-row"><span class="o2-intel-label">LAST TOUCH</span><span class="o2-intel-fact quiet">'+(lastTouch?esc(fmtLong(lastTouch)+" · "+CH_LABEL[i.ch]):"Never contacted")+'</span><span class="o2-intel-src">CADENCE</span></div>'));

    var stepper=el('<div class="o2-stepper"></div>');

    var composerOpen = !!oneMoveComposer;

    var tabsHtml='<div class="o2-tabgroup"><button class="o2-tab'+(oneMoveChannel==="em"?" on":"")+'" id="omEmail">EMAIL</button><button class="o2-tab linkedin'+(oneMoveChannel==="li"?" on":"")+'" id="omLinkedin">LINKEDIN</button></div>';

    var bottom=el('<div class="o2-bottom'+(composerOpen?" composer-open":"")+'"></div>');
    if(composerOpen){
      var composer=el('<div class="o2-composer">'+
        '<div class="o2-composer-head"><div class="o2-composer-head-l">'+tabsHtml+'<span class="o2-composer-hint">'+channelHint+'</span></div><button class="o2-composer-x" id="omClose">×</button></div>'+
        '<textarea>'+esc(scriptVal)+'</textarea>'+
        '<div class="o2-composer-foot"><span>ŌLLIN DREW THE FIRST PASS — YOURS TO REWRITE</span><button class="o2-reset" id="omResetDraft">RESET DRAFT</button>'+
        '<button class="o2-ai-btn" id="omAiBtn">✦ REWRITE WITH OLLIN</button><button class="o2-reset" id="omCopy">COPY</button></div>'+
        '<div class="o2-ai-hint" id="omAiHint"></div>'+
        '<div class="o2-ai-steer" id="omAiSteer">'+
          '<p class="o2-ai-lead">TELL OLLIN HOW TO WRITE IT</p>'+
          '<div class="o2-ai-row"><input id="omAiInput" placeholder="e.g. mention their new store openings…" maxlength="240"><button class="o2-ai-draft" id="omAiDraft">DRAFT IT</button></div>'+
          '<div class="o2-ai-chips">'+
            '<button class="o2-ai-chip" data-s="Lean into our nearshore capabilities">Push nearshore</button>'+
            '<button class="o2-ai-chip" data-s="Make it more conversational and human">More conversational</button>'+
            '<button class="o2-ai-chip" data-s="Make it shorter and punchier">Shorter</button>'+
            '<button class="o2-ai-chip" data-s="Make it warmer and more personal">Warmer</button>'+
            '<button class="o2-ai-chip" data-s="Try a completely different angle">Different angle</button>'+
          '</div>'+
        '</div>'+
      '</div>');
      bottom.appendChild(composer);
    }
    var actioncol=el('<div class="o2-actioncol'+(composerOpen?" boxed":"")+'"></div>');
    actioncol.appendChild(el('<div class="o2-channelrow'+(composerOpen?" hidden":"")+'"><span class="o2-channellbl">CHANNEL</span>'+tabsHtml+'<span class="o2-composer-hint">'+channelHint+'</span></div>'));
    var actionrow=el('<div class="o2-actionrow'+(composerOpen?" stacked":"")+'">'+
      '<button class="o2-btn o2-btn-primary" id="omPrimary">'+primaryLabel+'</button>'+
      '<button class="o2-btn o2-btn-secondary" id="omScript">SCRIPT</button>'+
      '<button class="o2-btn o2-btn-quiet" id="omReplied">REPLIED</button>'+
      '<button class="o2-btn o2-btn-quiet" id="omSkip">SKIP</button>'+

    '</div>');
    actioncol.appendChild(actionrow);
    bottom.appendChild(actioncol);
    stage.appendChild(bottom);
    wrap.appendChild(stage);

    // ---- wire it up ----
    var prev=wrap.querySelector("#omPrev"), next=wrap.querySelector("#omNext");
    prev.disabled = focusIdx<=0; next.disabled = focusIdx>=dueList.length-1;
    prev.addEventListener("click", function(){ if(focusIdx>0){ focusIdx--; render(); } });
    next.addEventListener("click", function(){ if(focusIdx<dueList.length-1){ focusIdx++; render(); } });
    function setChannel(ch){ oneMoveChannel=ch; oneMoveComposer = ch==="em" ? "draft" : null; render(); }
    Array.prototype.forEach.call(wrap.querySelectorAll("#omEmail"), function(b){ b.addEventListener("click", function(){ setChannel("em"); }); });
    Array.prototype.forEach.call(wrap.querySelectorAll("#omLinkedin"), function(b){ b.addEventListener("click", function(){ setChannel("li"); }); });
    var closeBtn=wrap.querySelector("#omClose"); if(closeBtn) closeBtn.addEventListener("click", function(){ oneMoveComposer=null; render(); });
    wrap.querySelector("#omScript").addEventListener("click", function(){ oneMoveComposer = oneMoveComposer ? null : "draft"; render(); });
    wrap.querySelector("#omReplied").addEventListener("click", function(){ setStatus(c,"warm", firstName(c.name)+" moved to WARM"); });
    wrap.querySelector("#omSkip").addEventListener("click", function(){ if(focusIdx<dueList.length-1){ focusIdx++; render(); } else toast("That’s the last one due."); });
    wrap.querySelector("#omDone").addEventListener("click", function(){ completeTouch(c); });
    wrap.querySelector("#omPrimary").addEventListener("click", function(){
      if(oneMoveChannel==="li"){
        var li=((c.t&&c.t.linkedin)||"").trim();
        window.open(isLinkedInUrl(li)?normUrl(li):liSearch(c), "_blank", "noopener");
        toast("Opening "+firstName(c.name)+" on LinkedIn ↗");
      } else if(oneMoveComposer==="draft"){
        completeTouch(c);
      } else {
        oneMoveComposer="draft"; render();
      }
    });
    var ta=wrap.querySelector("textarea");
    if(ta){
      ta.addEventListener("change", function(){ state.notes[i.touch.id]=ta.value; persistNotes(); });
      wrap.querySelector("#omResetDraft").addEventListener("click", function(){ delete state.notes[i.touch.id]; persistNotes(); render(); toast("Draft reset to Ōllin’s first pass"); });
      wrap.querySelector("#omCopy").addEventListener("click", function(){ copy(ta.value||""); });
      (function(){
        var aiBtn=wrap.querySelector("#omAiBtn"), steer=wrap.querySelector("#omAiSteer"),
            steerInput=wrap.querySelector("#omAiInput"), draftBtn=wrap.querySelector("#omAiDraft"),
            hint=wrap.querySelector("#omAiHint");
        aiBtn.addEventListener("click", function(){ steer.classList.toggle("open"); if(steer.classList.contains("open")) steerInput.focus(); });
        function setHint(msg){ if(msg){ hint.textContent=msg; hint.classList.add("show"); } else { hint.textContent=""; hint.classList.remove("show"); } }
        function generate(steerText){
          setHint("");
          draftBtn.disabled=true; aiBtn.disabled=true;
          var dl=draftBtn.textContent; draftBtn.textContent="WRITING…";
          fetch("/api/write",{method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({name:c.name,title:c.title||"",company:c.account||"",angle:(c.t&&c.t.angle)||"",channel:i.ch,step:i.stepNum,steer:steerText||""})})
            .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); })
            .then(function(res){ if(!res.ok||!res.d||!res.d.text){ toast((res.d&&res.d.error)||"Ollin couldn’t draft that — try again"); return; }
              ta.value=res.d.text; state.notes[i.touch.id]=res.d.text; persistNotes();
              setHint(res.d.angleWarning||"");
              toast(steerText?"Redrafted with your direction.":"Drafted. Yours to edit."); })
            .catch(function(){ toast("Network hiccup — try again"); })
            .then(function(){ draftBtn.disabled=false; aiBtn.disabled=false; draftBtn.textContent=dl; });
        }
        draftBtn.addEventListener("click", function(){ generate(steerInput.value.trim()); });
        steerInput.addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); generate(steerInput.value.trim()); } });
        Array.prototype.forEach.call(wrap.querySelectorAll(".o2-ai-chip"), function(chip){
          chip.addEventListener("click", function(){ var s=chip.getAttribute("data-s"); steerInput.value=s; generate(s); });
        });
      })();
    }
    return wrap;
  }
  // ---- Today: "the queue" (right column) ----
  function buildQueueRail(dueList){
    var wrap=el('<div class="o2-right"></div>');
    // "cleared" = touches actually completed today (real data); the denominator is
    // that plus what's still left in the live queue — dueList itself only ever
    // holds pending items, since completed touches drop out of it on the next render.
    var clearedToday=dayTotal(todayStr()), totalToday=clearedToday+dueList.length;
    wrap.appendChild(el('<div class="o2-rail-head"><span>THE QUEUE</span><span>'+clearedToday+' / '+totalToday+' CLEARED</span></div>'));
    var track=el('<div class="o2-track"><div class="o2-track-fill" style="width:'+(totalToday?(clearedToday/totalToday*100):0)+'%"></div></div>');
    wrap.appendChild(track);
    var scroller=el('<div class="o2-rail-scroll"></div>');
    dueList.forEach(function(item,idx){
      var c=item.c, active=idx===focusIdx;
      var row=el('<div class="o2-qrow'+(active?" active":"")+'"><div class="o2-qrow-top"><span class="o2-qname">'+esc(c.name)+'</span><span class="o2-qstate">'+esc(duePill(item.i).toUpperCase())+'</span></div><div class="o2-qmeta">'+esc((c.account||"").toUpperCase())+' · TOUCH '+item.i.stepNum+' OF 5</div></div>');
      row.addEventListener("click", function(){ focusIdx=idx; render(); });
      scroller.appendChild(row);
    });
    wrap.appendChild(scroller);
    // before you go
    var bfyg=el('<div class="o2-bfyg"><div class="o2-bfyg-lbl">BEFORE YOU GO</div>'+
      '<textarea id="omNote" maxlength="140" placeholder="One line to your future self — the first thing you’ll see when you’re back.">'+esc(state.handoffNote||"")+'</textarea>'+
      '<div class="o2-bfyg-save"><span class="o2-cursor"></span><span id="omNoteHint">SAVES AUTOMATICALLY</span></div></div>');
    var noteEl=bfyg.querySelector("#omNote"), hintEl=bfyg.querySelector("#omNoteHint");
    function saveNote(){ var v=noteEl.value.trim(); if(v===(state.handoffNote||"")) return; state.handoffNote=v; scheduleSave(); hintEl.textContent="SAVED. SEE YOU TOMORROW."; }
    noteEl.addEventListener("change", saveNote);
    noteEl.addEventListener("blur", saveNote);
    wrap.appendChild(bfyg);
    return wrap;
  }
  // ---- shared right rail: TODAY'S LIST (Contacts + Pipeline) — a small,
  // account-agnostic checklist, separate from the contact cadence itself.
  function buildTodayList(){
    var wrap=el('<div class="o2-right"></div>');
    var todos=state.todos||[];
    var doneN=todos.filter(function(t){ return t.done; }).length;
    wrap.appendChild(el('<div class="o2-rail-head"><span>TODAY’S LIST</span><span>'+doneN+' / '+todos.length+' DONE</span></div>'));
    wrap.appendChild(el('<div class="o2-track"><div class="o2-track-fill" style="width:'+(todos.length?(doneN/todos.length*100):0)+'%"></div></div>'));
    var scroller=el('<div class="o2-rail-scroll"></div>');
    todos.forEach(function(t){
      var row=el('<div class="o2-todo-row"><button class="o2-todo-box'+(t.done?" on":"")+'">'+(t.done?"✓":"")+'</button><span class="o2-todo-label'+(t.done?" done":"")+'">'+esc(t.text)+'</span><button class="o2-todo-x">×</button></div>');
      row.querySelector(".o2-todo-box").addEventListener("click", function(){ t.done=!t.done; scheduleSave(); render(); });
      row.querySelector(".o2-todo-x").addEventListener("click", function(){ state.todos=(state.todos||[]).filter(function(x){ return x!==t; }); scheduleSave(); render(); });
      scroller.appendChild(row);
    });
    wrap.appendChild(scroller);
    var addRow=el('<div class="o2-todo-add"><span>+</span><input placeholder="Add a move — Enter to save"></div>');
    var addInput=addRow.querySelector("input");
    addInput.addEventListener("keydown", function(e){
      if(e.key==="Enter"){
        e.preventDefault();
        var text=addInput.value.trim(); if(!text) return;
        state.todos=state.todos||[]; state.todos.push({id:"td"+Date.now()+Math.floor(Math.random()*999), text:text, done:false});
        scheduleSave(); render();
      }
    });
    wrap.appendChild(addRow);
    return wrap;
  }
  function activeCard(item, host, dueList, warm){
    var c=item.c, i=item.i;
    var over = i.overdueDays>0 ? " over" : "";
    var scriptVal = state.notes[i.touch.id] || fillTemplate(TEMPLATES[i.ch], c);
    var sub = i.stepNum===1 ? "First outreach due — script, send, done." : "Touch "+i.stepNum+" — script, send, done.";
    var card=el('<div class="dc deckcard active">'+
      '<div class="dc-head"><div class="dc-ava">'+esc(initials(c.name))+'</div><div><div class="dc-name">'+esc(c.name)+'</div><div class="dc-meta">'+esc((c.title||"")+(c.title&&c.account?" · ":"")+(c.account||""))+'</div></div><div class="dc-due'+over+'">'+duePill(i)+'</div></div>'+
      '<div class="dc-navrow"><div class="dc-touch"><b>Touch '+i.stepNum+' of '+c.touches.length+'</b><span>'+sub+'</span></div></div>'+
      ((c.t&&c.t.angle) ? '<div class="dc-angle"><p class="eyebrow">The angle</p><p>'+esc(c.t.angle)+'</p></div>' : '')+
      '<div class="tl-row"><button class="tl-arrow" id="dcBack" title="Previous contact">‹</button>'+timelineHTML(c,false)+'<button class="tl-arrow" id="dcNext" title="Next contact">›</button></div>'+
      '<div class="dc-mid"><button class="mi" id="miReview"><div><div class="mi-t">Review / Verify</div><div class="mi-s">Check the script before you send</div></div></button><button class="mi" id="miSkip"><div><div class="mi-t">Skip for now</div><div class="mi-s">Come back to this one later</div></div></button></div>'+
      '<div class="dc-actions"><button class="dc-act" id="aChan">'+CH_LABEL[i.ch]+'</button><button class="dc-act" id="aReplied">Replied</button><button class="dc-act" id="aScript">Script</button><button class="dc-act done" id="aDone">✓ Done</button></div>'+
      '<div class="dc-script" id="dcScript"><p class="eyebrow" style="margin-bottom:8px">'+CH_LABEL[i.ch]+' script — use it, or let VAMOS write it</p><textarea>'+esc(scriptVal)+'</textarea>'+
        '<div class="script-actions"><button class="ai-btn">✦ Write with AI</button><button class="copy-btn">Copy</button></div>'+
        '<div class="ai-hint" id="aiHint"></div>'+
        '<div class="ai-steer" id="aiSteer">'+
          '<p class="ai-steer-lead">Tell VAMOS how to write it — type a direction, or tap a nudge below.</p>'+
          '<div class="ai-steer-row"><input id="aiSteerInput" placeholder="e.g. mention their new store openings, keep it under 3 sentences…" maxlength="240"><button class="ai-draft" id="aiDraft">Draft it</button></div>'+
          '<div class="chips">'+
            '<button class="ai-chip" data-s="Lean into our nearshore capabilities">Push nearshore</button>'+
            '<button class="ai-chip" data-s="Make it more conversational and human">More conversational</button>'+
            '<button class="ai-chip" data-s="Make it shorter and punchier">Shorter</button>'+
            '<button class="ai-chip" data-s="Make it warmer and more personal">Warmer</button>'+
            '<button class="ai-chip" data-s="Try a completely different angle">Different angle</button>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>');
    var scr=card.querySelector("#dcScript"), ta=card.querySelector("textarea");
    var back=card.querySelector("#dcBack"), next=card.querySelector("#dcNext");
    // Local carousel index into THIS dueList — decoupled from Today's global focusIdx,
    // since this card is now also reused standalone (Contacts inline-expand, always a
    // single-item list).
    var localIdx=dueList.indexOf(item); if(localIdx<0) localIdx=0;
    back.disabled = localIdx<=0; next.disabled = localIdx>=dueList.length-1;
    back.addEventListener("click", function(){ if(localIdx>0){ host.innerHTML=""; host.appendChild(activeCard(dueList[localIdx-1],host,dueList,warm)); } });
    next.addEventListener("click", function(){ if(localIdx<dueList.length-1){ host.innerHTML=""; host.appendChild(activeCard(dueList[localIdx+1],host,dueList,warm)); } });

    card.querySelector("#miReview").addEventListener("click", function(){ scr.classList.toggle("open"); });
    card.querySelector("#aScript").addEventListener("click", function(){ scr.classList.toggle("open"); });
    card.querySelector("#aChan").addEventListener("click", function(){
      scr.classList.add("open");
      var li=((c.t&&c.t.linkedin)||"").trim(), em=((c.t&&c.t.email)||"").trim();
      if(i.ch==="li"){ window.open(isLinkedInUrl(li)?normUrl(li):liSearch(c), "_blank", "noopener"); }
      else if(i.ch==="em"){ if(em) window.open("mailto:"+em, "_blank"); }

    ta.addEventListener("change", function(){ state.notes[i.touch.id]=ta.value; persistNotes(); });
    card.querySelector(".copy-btn").addEventListener("click", function(){ copy(ta.value||""); });

    card.querySelector("#aReplied").addEventListener("click", function(){ setStatus(c,"warm", firstName(c.name)+" moved to WARM"); });

      function setHint(msg){ if(msg){ hint.textContent=msg; hint.classList.add("show"); } else { hint.textContent=""; hint.classList.remove("show"); } }
      function generate(steerText){

        draftBtn.disabled=true; aiBtn.disabled=true;
        var dl=draftBtn.textContent; draftBtn.textContent="Writing…";

            ta.value=res.d.text; state.notes[i.touch.id]=res.d.text; persistNotes();
            setHint(res.d.angleWarning||""); // non-blocking nudge, never inside the draft
            toast(steerText?"Redrafted with your direction.":"Drafted. Yours to edit."); })
          .catch(function(){ toast("Network hiccup — try again"); })
          .then(function(){ draftBtn.disabled=false; aiBtn.disabled=false; draftBtn.textContent=dl; });
      }
      draftBtn.addEventListener("click", function(){ generate(steerInput.value.trim()); });
      steerInput.addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); generate(steerInput.value.trim()); } });
      Array.prototype.forEach.call(card.querySelectorAll(".ai-chip"), function(chip){
        chip.addEventListener("click", function(){ var s=chip.getAttribute("data-s"); steerInput.value=s; generate(s); });
      });

  // For pipeline contacts with no live "next touch" (warm/meeting/lost/complete)

  // ---------- app navigation: real page router (one view at a time) ----------
  function setView(v){ navView=v; closeNavMenu(); try{ window.scrollTo({top:0,behavior:"smooth"}); }catch(e){ window.scrollTo(0,0); } render(); }
  function closeNavMenu(){ var x=document.getElementById("navMenu"); if(x) x.remove(); document.removeEventListener("click", navMenuOutside, true); }
  function navMenuOutside(e){ var x=document.getElementById("navMenu"); if(x && !x.contains(e.target)) closeNavMenu(); }
  function openMenu(anchor, items){
    closeNavMenu();
    var r=anchor.getBoundingClientRect();
    var menu=el('<div class="nav-menu" id="navMenu"></div>');

  // Add a single contact from the manual form. Returns an error string, or
  // null on success. Cap enforcement is handled by the caller.
  function addOneContact(f){
    if(!f.name) return "Add the contact’s name.";
    if(!f.company) return "Add the company.";
    var a=state.accounts.find(function(x){ return normCompany(x.company)===normCompany(f.company); });
    if(!a){ a={ id:"a"+Date.now(), company:f.company, start:todayStr(), threads:[] }; state.accounts.push(a); }
    a.threads=a.threads||[];
    var entry=Math.max(1, daysBetween(a.start, todayStr())+1); // day 1 = today
    a.threads.push({ id:"t"+Date.now()+"_"+Math.floor(Math.random()*9999), name:f.name, title:f.title||"", persona:"Additional", entryDay:entry, channel:f.channel||"li", linkedin:f.linkedin||"", email:f.email||"", angle:f.angle||"", status:"active" });
    persistAccounts();
    return null;
  }

  // ---------- HOME: the daily tracker deck ----------
  function renderHome(m){
    var contacts=asContacts();
    // PLAN — free users see where they stand + the path to unlimited.
    if(ACCOUNT && !isUnlimited()){
      var used=contactCount(), left=Math.max(0,FREE_CONTACT_CAP-used), near=used>=FREE_CONTACT_CAP;
      var pb=el('<div class="planbar'+(near?" full":"")+'"><span class="pb-count">'+used+' / '+FREE_CONTACT_CAP+' free contacts'+(near?" — full":(left<=5?" — "+left+" left":""))+'</span><a id="pbGo">Get unlimited</a></div>');
      pb.querySelector("#pbGo").addEventListener("click", function(){ openUpgrade(); });
      m.appendChild(pb);
    }

    var dueList=[];
    contacts.forEach(function(c){ var i=dueInfo(c); if(i && i.overdueDays>=0) dueList.push({c:c,i:i}); });
    dueList.sort(function(x,y){ return y.i.overdueDays - x.i.overdueDays; });
    var deckList = todayOnly ? dueList.filter(function(x){ return x.i.overdueDays===0; }) : dueList;
    var inCadence=contacts.filter(function(c){ return c.status==="active" && !c.complete; }).length;
    var overdueCount=dueList.filter(function(x){ return x.i.overdueDays>0; }).length;

    // LEDGER STRIP (Today only, per the redesign spec)

    ledger.appendChild(el('<div><div class="o2-lnum">'+dayTotal(todayStr())+'</div><div class="o2-llbl">CLEARED</div></div>'));
    ledger.appendChild(el('<div><div class="o2-lnum">'+inCadence+'</div><div class="o2-llbl">IN CADENCE</div></div>'));
    var lastZone=el('<div></div>');

    fmBtn.addEventListener("click", function(){ focusMode=!focusMode; document.getElementById("appMain").classList.toggle("focus",focusMode); render(); });
    var goalBtn=el('<button class="o2-lbtn quiet" id="goalBtn" title="Change your daily touch goal">GOAL '+goalVal()+'</button>');
    goalBtn.addEventListener("click", editGoal);

      lastZone.appendChild(restoreBtn);
    }
    ledger.appendChild(lastZone);
    m.appendChild(ledger);

    // WARM — restyled in place via CSS, same markup/behavior

      var ws=el('<section class="warm"><h2 class="warm-title">Warm — your move</h2><p class="warm-sub">They answered. This beats every cold touch on the list.</p><div id="warmList"></div></section>');
      var wl=ws.querySelector("#warmList");

        var card=el('<div class="wcard"><div class="wname">'+esc(c.name)+'</div><div class="wmeta">'+esc(c.title||"")+(c.title?" · ":"")+esc(c.account)+' · cadence paused</div><div class="wactions"><button class="wbtn gold" data-a="meeting">Meeting booked</button><button class="wbtn" data-a="touch">Log a reply touch</button><button class="wbtn quiet" data-a="lost">Not interested</button></div></div>');
        card.querySelector('[data-a="meeting"]').addEventListener("click", function(){ setStatus(c,"meeting","Meeting booked. Ollin."); });
        card.querySelector('[data-a="touch"]').addEventListener("click", function(){ logWarmTouch(c); });
        card.querySelector('[data-a="lost"]').addEventListener("click", function(){ setStatus(c,"lost","Marked not interested"); });
        wl.appendChild(card);

  // ---------- CONTACTS: command-bar search (list) / add / delete ----------

  // Loads a contact into Today if they're actually due; otherwise sends the
  // rep to Pipeline, since Today's queue only ever holds due/overdue people.
  function goToContactFromSearch(c){
    var dueList=[]; asContacts().forEach(function(cc){ var ii=dueInfo(cc); if(ii && ii.overdueDays>=0) dueList.push({c:cc,i:ii}); });
    var idx=dueList.findIndex(function(x){ return x.c.a.id===c.a.id && x.c.t.id===c.t.id; });
    if(idx>=0){ focusIdx=idx; setView("home"); }
    else { toast(c.complete ? (firstName(c.name)+"’s cadence is complete") : "Not due yet — see Pipeline for status"); setView("pipeline"); }
  }
  function renderContactsSearch(m, contacts){
    var grid=el('<div class="o2-view"></div>');
    var left=el('<div class="o2-view-left"></div>');
    left.appendChild(el('<h1 class="o2-view-title">Contacts</h1>'));
    left.appendChild(el('<p class="o2-view-sub">Everyone Ōllin tracks. Search a name, or run a command.</p>'));
    var cmdwrap=el('<div class="o2-cmdwrap"></div>');
    var bar=el('<div class="o2-cmdbar" id="cmdBar"><span class="o2-cmd-caret">&gt;</span><input class="o2-cmd-input" id="cmdInput" placeholder="Search or run a command…" autocomplete="off"><button class="o2-cmd-clear" id="cmdClear" style="display:none">CLEAR ×</button><span class="o2-cmd-count" id="cmdCount"></span></div>');
    cmdwrap.appendChild(bar);
    var panelHost=el('<div id="cmdPanelHost"></div>');
    cmdwrap.appendChild(panelHost);
    left.appendChild(cmdwrap);
    grid.appendChild(left);
    grid.appendChild(buildTodayList());
    m.appendChild(grid);

    var input=bar.querySelector("#cmdInput"), clearBtn=bar.querySelector("#cmdClear"), countEl=bar.querySelector("#cmdCount");
    var query="", focused=false;
    // Updates only the dropdown panel — never calls the app-wide render(),
    // since that would rebuild the DOM and drop focus out of the input on
    // every keystroke.
    function updatePanel(){
      panelHost.innerHTML="";
      clearBtn.style.display=query?"inline-flex":"none";
      var q=query.trim().toLowerCase();
      var matches=contacts.filter(function(c){ return !q || (c.name+" "+c.account+" "+(c.title||"")).toLowerCase().indexOf(q)>-1; });
      countEl.textContent=matches.length+" OF "+contacts.length;
      if(!q){
        countEl.textContent="";
        if(!focused) return;
        var panel=el('<div class="o2-cmd-panel"><div class="o2-cmd-panel-lbl">QUICK ACTIONS</div></div>');
        [
          {key:"+", label:"Add contact", hint:"ONE PERSON, STRAIGHT INTO A CADENCE", go:function(){ contactsMode="add"; setView("contacts"); }},
          {key:"⇪", label:"Add a group of contacts", hint:"IMPORT FROM CSV", go:function(){ contactsMode="add"; setView("contacts"); }},
          {key:"−", label:"Remove contacts", hint:"PULL PEOPLE OUT OF CADENCE", go:function(){ contactsMode="delete"; pipeSel={}; setView("contacts"); }},
          {key:"▤", label:"See pipeline", hint:"EVERY DEAL BY STAGE", go:function(){ setView("pipeline"); }}
        ].forEach(function(a){
          var row=el('<div class="o2-crow"><div class="o2-crow-l"><span class="o2-crow-key">'+a.key+'</span><span class="o2-crow-label">'+esc(a.label)+'</span><span class="o2-crow-hint">'+a.hint+'</span></div><span class="o2-crow-arrow">→</span></div>');
          row.addEventListener("mousedown", function(e){ e.preventDefault(); a.go(); });
          panel.appendChild(row);
        });
        panelHost.appendChild(panel);
        return;
      }
      var panel=el('<div class="o2-cmd-panel"></div>');
      if(!matches.length){
        panel.appendChild(el('<div class="o2-noresults"><div class="glyph">▚ ▚ ▚</div><div class="msg">Nothing matches.</div></div>'));
      } else {
        matches.forEach(function(c){
          var s=statusLabel(c);
          var row=el('<div class="o2-crow"><div style="min-width:0"><div class="o2-cresult-name">'+esc(c.name)+'</div><div class="o2-cresult-meta">'+esc((c.account||"").toUpperCase())+' · '+esc((c.title||"").toUpperCase())+'</div></div><span class="o2-cresult-state'+(c.complete?" done":"")+'">'+esc(s.txt.toUpperCase())+'</span></div>');
          row.addEventListener("mousedown", function(e){ e.preventDefault(); goToContactFromSearch(c); });
          panel.appendChild(row);
        });
      }
      panelHost.appendChild(panel);
    }
    input.addEventListener("input", function(){ query=input.value; updatePanel(); });
    input.addEventListener("focus", function(){ focused=true; bar.classList.add("focused"); updatePanel(); });
    input.addEventListener("blur", function(){ focused=false; bar.classList.remove("focused"); updatePanel(); });
    clearBtn.addEventListener("mousedown", function(e){ e.preventDefault(); query=""; input.value=""; input.focus(); updatePanel(); });

  // ---------- ADHD moment: pomodoro · just-do-one · breathe ----------
  var POMO=null;
  function fmtClock(s){ var m=Math.floor(s/60), ss=s%60; return m+":"+(ss<10?"0":"")+ss; }
  function pomoRender(){
    var w=document.getElementById("pomo"); if(!w||!POMO) return;
    w.querySelector(".pomo-time").textContent=fmtClock(POMO.remaining);
    w.querySelector(".pomo-mode").textContent=POMO.mode==="work"?"Focus block":"Break";
    w.classList.toggle("brk", POMO.mode==="break");
    w.querySelector(".pomo-toggle").textContent=POMO.running?"Pause":"Start";
  }
  function pomoTick(){
    if(!POMO||!POMO.running) return;
    POMO.remaining--;
    if(POMO.remaining<=0){
      var wasWork=POMO.mode==="work";
      POMO.mode=wasWork?"break":"work";
      POMO.remaining=wasWork?5*60:25*60;
      POMO.running=false; // wait for them to choose to start the next block
      toast(wasWork?"Time. Take 5 — step away.":"Break’s over. One block, that’s it.");
    }
    pomoRender();
  }
  function closePomodoro(){ if(POMO&&POMO.id) clearInterval(POMO.id); POMO=null; var w=document.getElementById("pomo"); if(w) w.remove(); }
  function openPomodoro(){
    if(document.getElementById("pomo")){ return; }
    POMO={remaining:25*60, running:true, mode:"work", id:setInterval(pomoTick,1000)};
    var w=el('<div class="pomo" id="pomo"><div class="pomo-mode">Focus block</div><div class="pomo-time">25:00</div><div class="pomo-row"><button class="pomo-toggle">Pause</button><button class="pomo-reset">Reset</button><button class="pomo-close">✕</button></div></div>');
    w.querySelector(".pomo-toggle").addEventListener("click", function(){ POMO.running=!POMO.running; pomoRender(); });
    w.querySelector(".pomo-reset").addEventListener("click", function(){ POMO.mode="work"; POMO.remaining=25*60; POMO.running=true; pomoRender(); });
    w.querySelector(".pomo-close").addEventListener("click", closePomodoro);
    document.body.appendChild(w);
    pomoRender();
  }

      '<button class="sc-close" id="daClose" aria-label="Close">&times;</button>'+
      '<h2>Delete account</h2>'+
      '<p class="sc-help">This permanently deletes your account, contacts, drafts, and history. It cannot be undone.</p>'+
      '<div class="fld"><label>Type DELETE to confirm</label><input class="auth-input" id="daType" placeholder="DELETE" autocomplete="off"></div>'+
      '<div class="fld"><label>Password</label><input class="auth-input" id="daPw" type="password"></div>'+
      '<div class="sc-err" id="daErr"></div>'+
      '<button class="btn" id="daGo" style="background:#A5341F;border-color:#A5341F">Delete my account</button>'+
    '</div></div>');
    ov.querySelector("#daClose").addEventListener("click", function(){ ov.remove(); });
    ov.querySelector("#daGo").addEventListener("click", async function(){
      var err=ov.querySelector("#daErr"); err.textContent="";
      var typed=(ov.querySelector("#daType").value||"").trim(), pw=ov.querySelector("#daPw").value||"";
      if(typed!=="DELETE"){ err.textContent="Type DELETE to confirm."; return; }
      if(!pw){ err.textContent="Enter your password."; return; }
      var btn=ov.querySelector("#daGo"), bl=btn.textContent; btn.disabled=true; btn.textContent="Deleting…";
      try{
        var r=await fetch("/api/auth?action=delete-account",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"same-origin",body:JSON.stringify({password:pw})});
        var d=await r.json().catch(function(){ return {}; });
        if(!r.ok||!d.ok) throw new Error(d.error||"Couldn’t delete — try again.");
        ov.remove(); ACCOUNT=null; clearState(); comebackDismissed=false; navView="home"; closeComeback(); showApp(false); toast("Your account was deleted.");
      }catch(e){ err.textContent=(e&&e.message)||"Couldn’t delete — try again."; btn.disabled=false; btn.textContent=bl; }
    });
    document.body.appendChild(ov);
    ov.querySelector("#daType").focus();
  }

  wireLanding();
  boot();

})();
</script>
