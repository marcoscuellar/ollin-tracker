<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>öllin movement — Tracker</title>
<link rel="icon" type="image/svg+xml" href="assets/ollin-mark.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&family=Sora:wght@500;700;800&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0a0a; --cream:#FFFFFF; --card:#FFFFFF; --gold:#0a0a0a; --blue:#1B2E52; --blue900:#1B2E52; --honey:#A83246; --honey-d:#7A2536; --grey:#6B6B6B; --tint:#E9EBF1;
    --amber:#f59e0b; --amber-d:#d97706; --navy:#0A1F3D; --green:#10b981; --green-d:#059669;
    --bg:#F2F2F2; --grey2:#A6A6A6; --hover:#2A2A2A;
    --hairline:rgba(17,17,16,.12); --panel:#F5F5F5;
    /* vertical accents (reserved for future) */
    --cobalt:#3B77C2; --magenta:#B8438A; --verde:#3E9B4F;
    /* öllin movement brand mark */
    --ollin-ink:#16130F; --ollin-teal:#1E9DA8; --ollin-maroon:#A83246; --ollin-gold:#F5B700;
    /* Ōllin Tracker monochrome-editorial redesign (Today screen + global chrome) */
    --o2-ink:#0A0A0A; --o2-graphite:#2A2A2A; --o2-slate:#767676; --o2-mute:#A3A3A3;
    --o2-hairline:#E6E6E6; --o2-navidle:#C9C9C9; --o2-paper:#FFFFFF; --o2-hoverbg:#FAFAFA;
    --o2-accent:#C9A227;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg);color:var(--ink);}
  body{font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;font-size:16px;}
  .hide{display:none !important;}
  button{-webkit-tap-highlight-color:transparent;font-family:inherit;}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  input,textarea{border-radius:0;}

  .app{max-width:560px;margin:0 auto;padding:0 20px 90px;}

  .top{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:.5px solid var(--hairline);}
  .mark{font-family:'Geist',sans-serif;font-weight:900;font-size:20px;letter-spacing:-.01em;}
  .mark span{color:var(--gold);}
  .top-right{display:flex;align-items:center;gap:14px;}
  .date{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);}
  .lockbtn{background:none;border:.5px solid var(--hairline);color:var(--grey);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 9px;cursor:pointer;}
  .lockbtn:hover{border-color:var(--ink);color:var(--ink);}
  .eyebrow{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);}

  .score{display:flex;justify-content:space-between;align-items:center;padding:22px 0 18px;border-bottom:.5px solid var(--hairline);}
  .score-left{display:flex;align-items:center;gap:16px;}
  .big-num{font-family:'Geist',sans-serif;font-weight:900;font-size:44px;line-height:1;}
  .big-num.done{color:var(--gold);}
  .score-sub{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);margin-top:4px;}
  .score-sub button{background:none;border:none;color:var(--grey);text-decoration:underline;cursor:pointer;font:inherit;letter-spacing:inherit;text-transform:inherit;}
  .score-sub button:hover{color:var(--ink);}
  .mini-square{width:26px;height:26px;border:2px solid var(--ink);transition:all .3s ease;}
  .mini-square.done{background:var(--gold);border-color:var(--gold);transform:rotate(90deg);}
  .streak-num{font-family:'Geist',sans-serif;font-weight:900;font-size:16px;text-align:right;}
  .streak-num i{font-style:normal;color:var(--gold);}

  .warm{padding:26px 0 0;}
  .warm-title{font-family:'Geist',sans-serif;font-weight:900;font-size:16px;text-transform:uppercase;color:var(--honey);}
  .warm-sub{font-size:13px;color:var(--grey);margin:2px 0 12px;}
  .wcard{border:1.5px solid var(--honey);margin-bottom:10px;background:var(--cream);padding:13px 14px;}
  .wname{font-weight:600;font-size:15px;}
  .wmeta{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);margin:3px 0 10px;}
  .wactions{display:flex;gap:8px;flex-wrap:wrap;}
  .wbtn{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--ink);background:none;padding:8px 12px;cursor:pointer;color:var(--ink);}
  .wbtn.gold{background:var(--honey);border-color:var(--honey);color:var(--ink);}
  .wbtn:hover{background:var(--ink);color:var(--cream);}
  .wbtn.quiet{border-color:var(--hairline);color:var(--grey);}
  .wbtn.quiet:hover{background:none;color:var(--ink);border-color:var(--ink);}

  .queue{padding:28px 0 6px;}
  .queue-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .queue-title{font-family:'Geist',sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;}
  .queue-sub{font-size:13.5px;color:var(--grey);margin:4px 0 18px;}
  .qcard{border:.5px solid var(--hairline);margin-bottom:10px;background:var(--cream);}
  .qcard.overdue{border-left:3px solid var(--gold);}
  .qmain{display:flex;justify-content:space-between;align-items:center;padding:14px 14px;gap:10px;}
  .qwho{min-width:0;}
  .qname{font-weight:600;font-size:15px;}
  .qmeta{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);margin-top:3px;}
  .qactions{display:flex;gap:8px;flex-shrink:0;align-items:center;}
  .chip{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--ink);padding:4px 8px;white-space:nowrap;}
  .chip.step-ch{background:var(--ink);color:var(--cream);}
  .btn-done{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:var(--cream);border:.5px solid var(--ink);padding:10px 14px;cursor:pointer;transition:background .15s,color .15s;}
  .btn-done:hover{background:var(--hover);border-color:var(--hover);color:var(--cream);}
  .btn-script,.btn-replied{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:none;border:.5px solid var(--hairline);padding:10px 10px;cursor:pointer;color:var(--grey);}
  .btn-script:hover,.btn-replied:hover{color:var(--ink);border-color:var(--ink);}
  .btn-replied:hover{color:var(--gold);border-color:var(--gold);}
  .script{display:none;border-top:.5px solid var(--hairline);padding:14px;background:var(--panel);}
  .script.open{display:block;}
  .script .eyebrow{margin-bottom:8px;}
  .script textarea{width:100%;background:var(--cream);border:.5px solid var(--hairline);font-family:'Geist',sans-serif;font-size:13.5px;line-height:1.55;padding:10px;min-height:96px;resize:vertical;color:var(--ink);}
  .script-actions{display:flex;gap:8px;margin-top:8px;}
  .script-actions button{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--hairline);background:none;padding:7px 12px;cursor:pointer;color:var(--grey);}
  .script-actions button:hover{color:var(--ink);border-color:var(--ink);}
  .script-actions button.ai-btn{color:var(--blue);border-color:var(--blue);font-weight:600;}
  .script-actions button.ai-btn:hover{background:var(--blue);border-color:var(--blue);color:#fff;}
  .script-actions button.ai-btn[disabled]{opacity:.5;cursor:default;}
  .script-actions button.ai-btn[disabled]:hover{background:none;color:var(--blue);}
  .clear-msg{text-align:center;padding:30px 10px;}
  .clear-msg .big{font-family:'Geist',sans-serif;font-weight:900;font-size:20px;text-transform:uppercase;}
  .clear-msg .big span{color:var(--gold);}
  .clear-msg p{color:var(--grey);font-size:13.5px;margin-top:6px;}

  details.section{border-top:.5px solid var(--hairline);margin-top:26px;}
  details.section summary{list-style:none;cursor:pointer;padding:16px 0;display:flex;justify-content:space-between;align-items:center;}
  details.section summary::-webkit-details-marker{display:none;}
  .sum-title{font-family:'Geist',sans-serif;font-weight:900;font-size:14px;text-transform:uppercase;letter-spacing:.02em;}
  .sum-count{font-family:'Geist Mono',monospace;font-size:11px;color:var(--grey);letter-spacing:.1em;}

  .form-full{margin-bottom:8px;}
  .form-full input,.form-full textarea{width:100%;background:var(--cream);border:.5px solid var(--hairline);font-family:'Geist',sans-serif;font-size:14px;padding:11px 12px;color:var(--ink);}
  .hint{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--grey);margin:4px 0 10px;line-height:1.5;}
  .btn-primary{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;background:var(--ink);color:var(--cream);border:.5px solid var(--ink);padding:12px 20px;cursor:pointer;width:100%;}
  .btn-primary:hover{background:var(--hover);border-color:var(--hover);color:var(--cream);}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .btn-mini{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:none;border:.5px solid var(--hairline);color:var(--grey);padding:9px 12px;cursor:pointer;}
  .btn-mini .ic{width:13px;height:13px;}
  .btn-mini:hover{border-color:var(--ink);color:var(--ink);}
  .btn-mini.pop{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:600;}
  .btn-mini.pop:hover{background:var(--navy-2);border-color:var(--navy-2);color:#fff;}
  .btn-mini.danger:hover{border-color:#A5341F;color:#A5341F;}

  .acct{margin-bottom:16px;}
  .acct-name{font-family:'Geist',sans-serif;font-weight:900;font-size:13px;text-transform:uppercase;padding:8px 0 4px;display:flex;justify-content:space-between;align-items:baseline;}
  .acct-roll{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);padding-bottom:8px;border-bottom:.5px solid var(--hairline);}
  .acct-roll b{color:var(--gold);font-weight:500;}
  .contact-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid var(--hairline);font-size:13.5px;gap:8px;}
  .contact-row .nm{font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .contact-row .st{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);white-space:nowrap;}
  .contact-row .st.gold{color:var(--gold);font-weight:500;}
  .tiny-x{background:none;border:none;color:var(--grey);cursor:pointer;font-family:'Geist Mono',monospace;font-size:12px;padding:2px 6px;}
  .tiny-x:hover{color:var(--ink);}

  .cadence-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 0 14px;}
  .cad-step{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;border:.5px solid var(--hairline);padding:6px 9px;}
  .cad-arrow{color:var(--grey);font-size:11px;}

  .day-row{display:flex;gap:5px;padding:14px 0 4px;}
  .day-sq{flex:1;aspect-ratio:1/1;max-width:30px;border:1.5px solid var(--hairline);position:relative;}
  .day-sq.hit{background:var(--honey);border-color:var(--honey);}
  .day-sq.partial{background:linear-gradient(to top,var(--honey) 45%,transparent 45%);border-color:var(--honey);}
  .day-sq.today-marker::after{content:"";position:absolute;left:0;right:0;bottom:-7px;height:2px;background:var(--ink);}

  .foot{text-align:center;margin-top:40px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey);}
  /* comeback ritual */
  .comeback{border:.5px solid var(--hairline);border-left:3px solid var(--gold);padding:18px 20px;margin-bottom:16px;background:var(--cream);}
  .comeback h2{font-family:'Geist',sans-serif;font-weight:900;font-size:15px;letter-spacing:-.01em;text-transform:uppercase;margin-bottom:6px;}
  .comeback .cb-sub{font-size:13.5px;color:var(--grey);line-height:1.5;margin-bottom:12px;}
  .comeback .cb-note{font-family:'Geist',sans-serif;font-size:15.5px;line-height:1.5;color:var(--ink);border-left:2px solid var(--gold);padding-left:12px;margin:12px 0;}
  .comeback .cb-meta{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);margin-bottom:14px;}
  .comeback .cb-back{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:var(--cream);border:.5px solid var(--ink);padding:11px 18px;cursor:pointer;}
  .comeback .cb-back:hover{background:var(--hover);border-color:var(--hover);color:var(--cream);}
  /* before you go */
  .handoff{border:.5px solid var(--hairline);padding:16px 18px;margin-top:22px;}
  .handoff h2{font-family:'Geist',sans-serif;font-weight:900;font-size:13px;letter-spacing:.02em;text-transform:uppercase;margin-bottom:4px;}
  .handoff .hsub{font-size:12.5px;color:var(--grey);line-height:1.5;}
  .handoff input{width:100%;background:var(--cream);border:.5px solid var(--hairline);font-family:'Geist',sans-serif;font-size:14.5px;padding:12px;color:var(--ink);margin-top:10px;}
  .handoff .hint{margin-top:8px;}
  .handoff .saved{color:var(--gold);}

  /* lock screen (passkey) — VAMOS styling */
  .lock{position:fixed;inset:0;z-index:80;background:var(--bg);overflow-y:auto;}
  .lock-card{max-width:410px;width:100%;text-align:center;border:.5px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);padding:46px 38px;background:var(--card);}
  .lock .mark{font-family:'Geist',sans-serif;font-weight:900;font-size:34px;}
  .lock .sub{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin:8px 0 26px;}
  .lock-card p{color:var(--grey);font-size:14px;line-height:1.55;margin:0 0 20px;}
  .lock-ico{display:none;}
  .btn{font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;background:var(--honey);color:var(--ink);border:.5px solid var(--honey);border-radius:9px;padding:14px 20px;cursor:pointer;width:100%;display:block;font-weight:600;}
  .btn:hover{background:var(--honey-d);border-color:var(--honey-d);color:var(--ink);}
  .btn.ghost{background:none;color:var(--ink);border:.5px solid var(--hairline);}
  .btn.ghost:hover{background:none;border-color:var(--ink);color:var(--ink);}
  .lock-alt{margin-top:18px;font-size:12.5px;color:var(--grey);}
  .lock-alt a{color:var(--honey);font-weight:600;cursor:pointer;text-decoration:underline;}
  .lock-rec{margin-top:16px;display:none;}
  .lock-rec.show{display:block;}
  .lock-rec input{width:100%;text-align:center;font-family:'Geist Mono',monospace;letter-spacing:.12em;margin-bottom:10px;background:var(--cream);border:.5px solid var(--hairline);padding:11px;color:var(--ink);}
  .lock-err{color:#A5341F;font-size:13px;margin-top:14px;min-height:16px;font-weight:500;}
  .auth-lead{color:var(--grey);font-size:14px;line-height:1.55;margin:0 0 18px;}
  .auth-input{width:100%;background:var(--bg);border:.5px solid var(--hairline);border-radius:8px;font-family:'Geist',sans-serif;font-size:15px;padding:13px;color:var(--ink);margin-bottom:10px;text-align:left;}
  .auth-input:focus{outline:2px solid var(--honey);outline-offset:0;border-color:var(--honey);}
  .auth-input::placeholder{color:var(--grey2);}
  /* outreach identity (onboarding + settings) */
  .sender-overlay{position:fixed;inset:0;z-index:95;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(10,10,10,.5);overflow-y:auto;}
  .sender-overlay.solid{background:var(--bg);}
  .sender-card{max-width:460px;width:100%;background:var(--card);border:.5px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);padding:38px 34px;text-align:left;position:relative;}
  .sender-card h2{font-family:'Geist',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.02em;margin:0 0 8px;}
  .sender-card .sc-help{font-size:13.5px;color:var(--grey);line-height:1.5;margin:0 0 22px;}
  .sender-card .fld{margin-bottom:14px;}
  .sender-card label{display:block;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);margin:0 0 6px;}
  .sender-card label .opt{color:var(--grey2);}
  .sender-card .auth-input{margin-bottom:0;}
  .sender-card textarea.auth-input{min-height:60px;resize:vertical;font-size:14px;line-height:1.5;}
  .sender-card select.auth-input{cursor:pointer;}
  .sender-card .sc-err{color:#A5341F;font-size:12.5px;min-height:16px;margin:6px 0 6px;}
  .sender-card .sc-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;color:var(--grey2);cursor:pointer;line-height:1;}
  .sender-card .sc-close:hover{color:var(--ink);}
  /* onboarding wizard: progress dots + steps + actions */
  .sender-card .sc-steps{display:flex;gap:6px;margin:0 0 22px;}
  .sender-card .sc-dot{height:3px;flex:1;border-radius:2px;background:var(--hairline);transition:background .2s;}
  .sender-card .sc-dot.on{background:var(--honey);}
  .sender-card .sc-step{display:none;}
  .sender-card .sc-step.on{display:block;}
  .sender-card input.auth-input[disabled]{color:var(--grey);cursor:not-allowed;opacity:.7;}
  .sender-card .sc-actions{display:flex;gap:12px;align-items:center;margin-top:20px;}
  .sender-card .sc-actions .btn{flex:1;margin:0;}
  .sender-card .sc-back{background:none;border:none;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);cursor:pointer;padding:0 6px;}
  .sender-card .sc-back:hover{color:var(--ink);}
  /* pricing step */
  .sc-price{text-align:center;padding:10px 0 2px;}
  .sc-price .sc-free{font-family:'Geist',sans-serif;font-weight:800;font-size:56px;letter-spacing:-.04em;line-height:1;color:var(--honey);}
  .sc-price .sc-freelbl{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey);margin:10px 0 24px;}
  .sc-price .sc-then{font-size:15.5px;line-height:1.6;color:var(--ink);}
  .sc-price .sc-then b{font-weight:700;}
  .sc-price .sc-fine{font-size:12.5px;color:var(--grey);margin-top:12px;line-height:1.5;}
  .verifybar{border:.5px solid var(--hairline);border-left:3px solid var(--gold);background:var(--cream);padding:10px 14px;margin-bottom:14px;font-size:12.5px;line-height:1.5;color:var(--grey);}
  .demobar{border:.5px solid var(--ollin-maroon);border-left:3px solid var(--ollin-maroon);background:rgba(168,50,70,.06);padding:10px 14px;margin-bottom:14px;font-size:12.5px;line-height:1.5;color:var(--ink);max-width:840px;margin-left:auto;margin-right:auto;border-radius:var(--radius);}
  .demobar a{color:var(--ollin-maroon);font-weight:600;text-decoration:underline;cursor:pointer;margin-left:6px;}
  .verifybar a{color:var(--gold);font-weight:600;cursor:pointer;text-decoration:underline;}
  /* plan / founding-member gating */
  .planbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border:.5px solid var(--hairline);border-left:3px solid var(--blue);background:var(--cream);padding:10px 14px;margin-bottom:14px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--grey);}
  .planbar.full{border-left-color:var(--blue);}
  .planbar.founding{border-left-color:var(--blue);color:var(--ink);}
  .planbar .pb-count{text-transform:uppercase;}
  .planbar a{color:var(--blue);font-weight:700;cursor:pointer;text-decoration:none;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
  .planbar a:hover{color:#12203C;text-decoration:underline;}
  .btn-mini.gopro{border-color:var(--blue);color:var(--blue);}
  .btn-mini.gopro:hover{background:var(--blue);border-color:var(--blue);color:#fff;}
  .upgrade-card{text-align:left;}
  .upgrade-card .up-eyebrow{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);font-weight:700;margin-bottom:8px;}
  .upgrade-card .btn{background:var(--blue);border-color:var(--blue);color:#fff;}
  .upgrade-card .btn:hover{background:#12203C;border-color:#12203C;color:#fff;}
  .upgrade-card .up-title{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:0 0 12px;line-height:1.15;}
  .upgrade-card .up-body{color:var(--grey);font-size:14px;line-height:1.6;margin:0 0 14px;}
