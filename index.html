<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OLLIN Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF; --surface:#FFFFFF; --hair:#EAEFEB; --hair-strong:#D5DED7;
    --ink:#16241D; --ink-2:#566860; --ink-3:#8E9C94;
    /* deep-green accent system (COS) — kept under legacy var names so logic is unchanged */
    --green:#13271C; --green-mid:#2E5E47; --green-soft:#E7EFEA;
    --amber:#13271C; --amber-soft:#E7EFEA;        /* primary accent = deep forest green #13271C */
    --gold:#E9C46A; --gold-deep:#D9AE45; --gold-ink:#3A2C06;
    --ox:#A63124; --ox-soft:#FBEAE7;
    --beige:#F6EFD9;
    --li:#13271C; --em:#2E5E47; --call:#9A7A1E;
    --r:12px; --r-sm:6px;
    --sh:0 1px 3px rgba(19,39,28,.10), 0 6px 18px rgba(19,39,28,.10);
    --sh-lg:0 4px 10px rgba(19,39,28,.16), 0 16px 38px rgba(19,39,28,.18);
    --sh-btn:0 2px 6px rgba(19,39,28,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Geist",system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    font-size:16px;
  }
  .mono{font-family:"Geist Mono",ui-monospace,monospace}
  .lbl{font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-3); font-weight:500}
  .wrap{max-width:900px; margin:0 auto; padding:0 20px 96px}

  /* header */
  header{position:sticky; top:0; z-index:30; background:rgba(255,255,255,.92); backdrop-filter:saturate(1.4) blur(8px); box-shadow:0 1px 0 var(--hair), 0 6px 20px rgba(22,36,29,.04); }
  .hbar{max-width:900px; margin:0 auto; padding:16px 20px 13px; display:flex; align-items:center; gap:14px}
  .brand{display:flex; align-items:baseline; gap:10px}
  .brand .mark{font-family:"Geist",sans-serif; font-weight:800; letter-spacing:.02em; font-size:19px; color:var(--green); text-transform:uppercase}
  .brand .sep{color:var(--hair-strong); font-weight:300}
  .brand .sub{font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-2); font-weight:500}
  .acct-sel{margin-left:auto; display:flex; align-items:center; gap:9px}
  select,input,textarea{font-family:inherit; font-size:15px; color:var(--ink); background:var(--surface); border:1.5px solid var(--hair-strong); border-radius:var(--r-sm); padding:10px 12px}
  select{padding-right:30px; cursor:pointer; -webkit-appearance:none; appearance:none; font-weight:500;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2313271C' stroke-width='2.2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 10px center}
  :focus-visible{outline:2.5px solid var(--green); outline-offset:2px}

  nav{display:flex; gap:4px; max-width:900px; margin:0 auto; padding:0 20px}
  .tab{font-family:"Geist",sans-serif; font-size:13px; letter-spacing:.02em; text-transform:uppercase; color:var(--ink-2); font-weight:700;
    background:none; border:none; border-bottom:3px solid transparent; padding:13px 14px; cursor:pointer}
  .tab[aria-selected="true"]{color:var(--green); border-bottom-color:var(--green)}
  .tab:hover{color:var(--ink)}

  /* today bar */
  .todaybar{display:flex; align-items:flex-end; gap:18px; padding:30px 0 22px; flex-wrap:wrap}
  .todaybar .date .lbl{display:block; margin-bottom:5px}
  .todaybar .date .d{font-size:30px; font-weight:700; letter-spacing:-.02em; color:var(--ink)}
  .count{margin-left:auto; text-align:right}
  .count .big{font-family:"Geist",sans-serif; font-size:56px; font-weight:800; letter-spacing:-.03em; line-height:.9}
  .count .big .rem{color:var(--green)}
  .count .big .tot{color:var(--ink-3); font-weight:600; font-size:34px}
  .count .lbl{margin-top:8px; display:block}
  .count.clear .big .rem{color:var(--green-mid)}

  /* timeline */
  .tl{margin:14px 0 6px; padding:22px; background:var(--surface); border-radius:var(--r); box-shadow:var(--sh); overflow-x:auto}
  .tl-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px}
  .tl-grid{position:relative; min-width:520px}
  .tl-days{display:flex; padding-left:128px; margin-bottom:8px}
  .tl-day{flex:1; text-align:center; min-width:30px}
  .tl-day .dn{font-family:"Geist Mono",monospace; font-size:10.5px; color:var(--ink-3); font-weight:500}
  .tl-day.today .dn{color:var(--green); font-weight:600}
  .tl-lane{display:flex; align-items:center; height:34px; position:relative}
  .tl-name{width:128px; flex:none; padding-right:12px; font-size:13px; font-weight:600; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .tl-track{flex:1; display:flex; position:relative; height:100%}
  .tl-cell{flex:1; min-width:30px; display:flex; align-items:center; justify-content:center; position:relative}
  .tl-cell::before{content:""; position:absolute; left:0; right:0; top:50%; height:2px; background:var(--hair)}
  .dot{width:13px; height:13px; border-radius:50%; position:relative; z-index:2; border:2px solid; box-shadow:0 1px 2px rgba(22,36,29,.12)}
  .dot.done{background:var(--green); border-color:var(--green)}
  .dot.todo{background:var(--surface)}
  .dot.over{background:var(--ox-soft); border-color:var(--ox)}
  .dot.li{border-color:var(--li)} .dot.li.todo{background:var(--surface)}
  .dot.em{border-color:var(--em)} .dot.call{border-color:var(--call)}
  .todayline{position:absolute; top:-5px; bottom:-5px; width:2.5px; background:var(--green); z-index:1; opacity:.5; border-radius:2px}
  .tl-legend{display:flex; gap:18px; flex-wrap:wrap; margin-top:16px; padding-top:14px; border-top:2px solid var(--hair)}
  .tl-legend span{display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--ink-2); font-weight:500}

  section.block{margin-top:32px}
  .block-head{display:flex; align-items:center; gap:12px; margin-bottom:14px}
  .block-head .line{flex:1; height:2px; background:var(--hair)}

  /* touch card — dark green, white type */
  .card{background:var(--green); color:#fff; border-radius:var(--r); box-shadow:var(--sh-lg); padding:18px; margin-bottom:13px; display:flex; gap:15px; align-items:flex-start; transition:box-shadow .16s, transform .16s}
  .card:hover{box-shadow:0 4px 12px rgba(22,36,29,.20), 0 20px 44px rgba(22,36,29,.24); transform:translateY(-2px)}
  .card.over{box-shadow:var(--sh-lg), inset 5px 0 0 var(--gold)}
  .card.done{opacity:.5}
  .card.done:hover{transform:none}
  .check{flex:none; width:26px; height:26px; border:2.5px solid rgba(255,255,255,.55); border-radius:50%; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-top:1px; padding:0; transition:.14s}
  .check:hover{border-color:#fff}
  .check.on{background:#fff; border-color:#fff}
  .check svg{width:14px; height:14px; stroke:var(--green); display:none}
  .check.on svg{display:block}
  .card-body{flex:1; min-width:0}
  .card-top{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:5px}
  .who{font-size:18px; font-weight:700; letter-spacing:-.01em; color:#fff}
  .at{color:rgba(255,255,255,.64); font-size:14px; font-weight:500}
  .chan{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:3px 9px; border-radius:20px; font-weight:700; background:#fff}
  .chan.li{color:var(--li)}
  .chan.em{color:var(--em)}
  .chan.call{color:var(--call)}
  .touchno{font-family:"Geist Mono",monospace; font-size:11px; color:rgba(255,255,255,.55); letter-spacing:.06em; font-weight:500}
  .overtag{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold-ink); background:var(--gold); border-radius:20px; padding:3px 8px; font-weight:700}
  .persona{font-family:"Geist Mono",monospace; font-size:10.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--gold); font-weight:700}
  .cmpny{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold-ink); background:var(--gold); padding:3px 9px; border-radius:20px; font-weight:700}
  .angle{font-size:14.5px; color:rgba(255,255,255,.86); margin:7px 0 0; line-height:1.5}
  .card-actions{display:flex; gap:9px; margin-top:13px; flex-wrap:wrap}
  .lk{font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:#fff; text-decoration:none; border:1.5px solid rgba(255,255,255,.42); border-radius:var(--r-sm); padding:7px 11px; background:transparent; cursor:pointer; font-weight:600; transition:.14s}
  .lk:hover{border-color:#fff; background:rgba(255,255,255,.14)}
  .note{margin-top:13px}
  .note textarea{width:100%; min-height:0; height:42px; resize:vertical; font-size:14px; color:var(--ink); background:#fff; border-color:transparent; line-height:1.45}
  .copybtn{margin-top:7px}

  .day-group .day-lbl{font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.07em; text-transform:uppercase; color:var(--green); font-weight:600; margin:22px 0 11px}

  /* empty / held */
  .empty{background:var(--surface); border:2px dashed var(--hair-strong); border-radius:var(--r); padding:34px 22px; text-align:center; color:var(--ink-2); font-weight:500}
  .empty .lbl{margin-bottom:9px; display:block}
  .held{background:var(--beige); border-radius:var(--r); box-shadow:0 1px 2px rgba(120,90,10,.08); padding:16px 17px; margin-bottom:11px}
  .held .htop{display:flex; gap:10px; align-items:center; margin-bottom:5px}

  /* accounts panel */
  .acct-card{background:var(--surface); border-radius:var(--r); box-shadow:var(--sh); padding:20px; margin-bottom:16px}
  .acct-card h3{margin:0; font-size:21px; font-weight:700; letter-spacing:-.01em}
  .acct-meta{display:flex; gap:16px; align-items:center; margin:6px 0 14px}
  .thread-row{display:grid; grid-template-columns:1fr auto auto auto; gap:12px; align-items:center; padding:12px 0; border-top:2px solid var(--hair); font-size:14px}
  .thread-row .tname{font-weight:700}
  .thread-row .tmeta{color:var(--ink-3); font-size:13px; font-weight:500}
  .btn{font-family:"Geist",sans-serif; font-size:13px; letter-spacing:.02em; text-transform:uppercase; border:none; background:var(--gold); color:var(--gold-ink); border-radius:var(--r-sm); padding:12px 18px; cursor:pointer; font-weight:700; box-shadow:var(--sh-btn); transition:.14s}
  .btn:hover{background:var(--gold-deep); transform:translateY(-1px)}
  .btn.ghost{background:var(--surface); color:var(--green); border:2px solid var(--hair-strong); box-shadow:none; font-weight:700}
  .btn.ghost:hover{border-color:var(--green); background:var(--green-soft); transform:none}
  .btn.danger{background:var(--surface); color:var(--ox); border:2px solid var(--ox); box-shadow:none}
  .btn.amber{background:var(--green); color:#fff}
  .btn.sm{padding:7px 11px; font-size:11px}

  .form{background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-lg); padding:20px; margin-bottom:16px}
  .form .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px}
  .form label{display:block}
  .form label .lbl{display:block; margin-bottom:5px}
  .form input,.form select,.form textarea{width:100%}
  .full{grid-column:1 / -1}
  .form-actions{display:flex; gap:9px; justify-content:flex-end}

  .hide{display:none !important}
  .delx{background:none; border:none; color:var(--ink-3); cursor:pointer; font-family:"Geist Mono",monospace; font-size:12px; font-weight:500}
  .delx:hover{color:var(--ox)}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green); color:#fff; font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.05em; text-transform:uppercase; padding:12px 20px; border-radius:var(--r-sm); box-shadow:var(--sh-lg); opacity:0; transition:.2s; pointer-events:none; z-index:60; font-weight:600}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  @media (max-width:640px){
    .form .grid{grid-template-columns:1fr}
    .thread-row{grid-template-columns:1fr; gap:4px}
    .count{margin-left:0}
    .count .big{font-size:46px}
    .todaybar .date .d{font-size:25px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}

  /* header mini buttons (See all / Lock) */
  .acct-sel .mini{font-family:"Geist Mono",monospace; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; color:var(--green); background:var(--green-soft); border:1.5px solid var(--hair-strong); border-radius:var(--r-sm); padding:9px 11px; cursor:pointer; transition:.14s; white-space:nowrap}
  .acct-sel .mini:hover{border-color:var(--green); background:var(--green); color:#fff}

  /* lock screen */
  .lock{position:fixed; inset:0; z-index:80; background:linear-gradient(160deg,#13271C,#0c1a12); display:flex; align-items:center; justify-content:center; padding:24px}
  .lock-card{background:#fff; border-radius:16px; box-shadow:var(--sh-lg); max-width:380px; width:100%; padding:34px 28px; text-align:center}
  .lock-card .mark{font-family:"Geist",sans-serif; font-weight:800; letter-spacing:.04em; font-size:24px; color:var(--green); text-transform:uppercase}
  .lock-card .sub{font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); margin:6px 0 22px}
  .lock-card p{color:var(--ink-2); font-size:14px; line-height:1.5; margin:0 0 20px}
  .lock-card .btn{width:100%; justify-content:center; padding:14px; font-size:14px; display:block}
  .lock-ico{width:54px; height:54px; margin:0 auto 16px; border-radius:50%; background:var(--green-soft); display:flex; align-items:center; justify-content:center}
  .lock-ico svg{width:28px; height:28px; stroke:var(--green); fill:none; stroke-width:2}
  .lock-alt{margin-top:18px; font-size:12.5px; color:var(--ink-2)}
  .lock-alt a{color:var(--green-mid); font-weight:600; cursor:pointer; text-decoration:underline}
  .lock-rec{margin-top:16px; display:none}
  .lock-rec.show{display:block}
  .lock-rec input{width:100%; text-align:center; font-family:"Geist Mono",monospace; letter-spacing:.12em; margin-bottom:10px}
  .lock-err{color:var(--ox); font-size:13px; margin-top:14px; min-height:16px; font-weight:500}
  .reccode{font-family:"Geist Mono",monospace; font-size:18px; letter-spacing:.1em; color:var(--green); background:var(--green-soft); border-radius:var(--r-sm); padding:14px; margin:14px 0; word-break:break-all; font-weight:600}
</style>

<header class="hide">
  <div class="hbar">
    <div class="brand">
      <span class="mark">OLLIN</span><span class="sep">/</span><span class="sub">Tracker</span>
    </div>
    <div class="acct-sel">
      <span class="lbl">Account</span>
      <select id="acctSelect" aria-label="Active account"></select>
      <button class="mini" id="seeAllBtn" title="See all accounts">See all</button>
      <button class="mini hide" id="lockBtn" title="Lock app">Lock</button>
    </div>
  </div>
  <nav role="tablist">
    <button class="tab" role="tab" data-view="today" aria-selected="true">Today</button>
    <button class="tab" role="tab" data-view="upcoming" aria-selected="false">Upcoming</button>
    <button class="tab" role="tab" data-view="accounts" aria-selected="false">Accounts</button>
  </nav>
</header>

<div class="wrap hide">
  <div id="view-today"></div>
  <div id="view-upcoming" class="hide"></div>
  <div id="view-accounts" class="hide"></div>
</div>

<div class="toast" id="toast"></div>

<div class="lock hide" id="lockScreen">
  <div class="lock-card">
    <div class="lock-ico"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></div>
    <div class="mark">OLLIN</div>
    <div class="sub">Tracker</div>
    <div id="lockBody"></div>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<script src="https://unpkg.com/@simplewebauthn/browser@13/dist/bundle/index.umd.min.js"></script>
<script>
(function(){
  "use strict";

  // ---------- storage wrapper ----------
  // Order: window.storage (inside Claude) -> localStorage (real website) -> in-memory (last resort).
  var mem = {};
  var hasStore = (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function");
  var hasLS = (function(){ try{ window.localStorage.setItem("__t","1"); window.localStorage.removeItem("__t"); return true; }catch(e){ return false; } })();
  async function sGet(k){
    if(hasStore){ try{ var r = await window.storage.get(k); return r ? r.value : null; }catch(e){} }
    if(hasLS){ try{ var v = window.localStorage.getItem(k); return v===null ? null : v; }catch(e){} }
    return (k in mem) ? mem[k] : null;
  }
  async function sSet(k,v){
    if(hasStore){ try{ await window.storage.set(k,v); return; }catch(e){} }
    if(hasLS){ try{ window.localStorage.setItem(k,v); return; }catch(e){} }
    mem[k]=v;
  }

  // ---------- model ----------
  var CADENCE = [
    {off:0, ch:"li",   label:"LinkedIn"},
    {off:2, ch:"em",   label:"Email"},
    {off:4, ch:"li",   label:"LinkedIn"},
    {off:7, ch:"em",   label:"Email"},
    {off:9, ch:"call", label:"Call / VM"}
  ];
  var PERSONA_ENTRY = { "Champion":1, "Technical Evaluator":3, "Economic Buyer":5, "Additional":8, "Blocker":0 };
  var PERSONAS = ["Champion","Technical Evaluator","Economic Buyer","Additional","Blocker"];

  var state = { accounts:[], done:{}, notes:{}, activeId:null, view:"today", seeded:false };
  var MODE = { api:false }; // api=true once the Vercel /api + KV backend is detected
  var ALL = "__all__"; // sentinel activeId meaning "show every account combined"

  // ---------- date helpers (local, no tz drift) ----------
  function todayStr(){ var d=new Date(); return iso(d); }
  function iso(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function pad(n){ return (n<10?"0":"")+n; }
  function parse(s){ var p=s.split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
  function addDays(s,n){ var d=parse(s); d.setDate(d.getDate()+n); return d; }
  function shiftWeekend(d){ var g=d.getDay(); if(g===6)d.setDate(d.getDate()+2); else if(g===0)d.setDate(d.getDate()+1); return d; }
  function fmtLong(s){ var d=parse(s); return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
  function fmtShort(s){ var d=parse(s); return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
  function daysBetween(a,b){ return Math.round((parse(b)-parse(a))/86400000); }

  // ---------- schedule build ----------
  function buildTouches(acct){
    var out=[];
    (acct.threads||[]).forEach(function(t){
      if(t.persona==="Blocker") return; // blocker not sequenced
      var entry = t.entryDay || PERSONA_ENTRY[t.persona] || 1;
      CADENCE.forEach(function(c,i){
        var d = addDays(acct.start, (entry-1)+c.off);
        d = shiftWeekend(d);
        out.push({
          id: acct.id+"|"+t.id+"|"+i,
          acctId: acct.id, threadId:t.id, company:acct.company,
          who:t.name, title:t.title, persona:t.persona,
          li:t.linkedin, email:t.email, angle:t.angle,
          ch:c.ch, chLabel:c.label, touchNo:i+1, date:iso(d)
        });
      });
    });
    return out;
  }
  function activeAcct(){ return state.accounts.find(function(a){return a.id===state.activeId;}); }
  function allTouches(){ var out=[]; state.accounts.forEach(function(a){ out=out.concat(buildTouches(a)); }); return out; }
  function byDateThenCompany(a,b){
    if(a.date!==b.date) return a.date<b.date?-1:1;
    var ca=a.company||"", cb=b.company||"";
    if(ca!==cb) return ca<cb?-1:1;
    return a.touchNo-b.touchNo;
  }

  // ---------- persistence ----------
  async function load(){
    var a = await sGet("tracker:accounts");
    var d = await sGet("tracker:done");
    var n = await sGet("tracker:notes");
    var act = await sGet("tracker:active");
    var seeded = await sGet("tracker:seeded");
    if(a){ try{ state.accounts = JSON.parse(a); }catch(e){} }
    if(d){ try{ state.done = JSON.parse(d); }catch(e){} }
    if(n){ try{ state.notes = JSON.parse(n); }catch(e){} }
    state.seeded = !!seeded;
    if(!state.seeded && (!state.accounts || state.accounts.length===0)){
      seed();
      state.seeded = true;
      localSave();
    }
    if(act===ALL || (act && state.accounts.some(function(x){return x.id===act;}))) state.activeId = act;
    if(!state.activeId && state.accounts.length) state.activeId = state.accounts[0].id;
  }

  // ---------- save layer (local keys OR Vercel KV via /api/entries) ----------
  var saveTimer=null;
  function localSave(){
    sSet("tracker:accounts", JSON.stringify(state.accounts));
    sSet("tracker:active", state.activeId||"");
    sSet("tracker:done", JSON.stringify(state.done));
    sSet("tracker:notes", JSON.stringify(state.notes));

  function renderTimeline(acct, touches, today){
    var threads=(acct.threads||[]).filter(function(t){return t.persona!=="Blocker";});
    if(!threads.length) return el('<div></div>');

    var maxOff=0;
    threads.forEach(function(t){ var entry=t.entryDay||PERSONA_ENTRY[t.persona]||1; maxOff=Math.max(maxOff,(entry-1)+CADENCE[CADENCE.length-1].off); });
    var span=maxOff+1;
    var days=[]; for(var i=0;i<span;i++){ days.push(iso(addDays(acct.start,i))); }
    var todayIdx=daysBetween(acct.start,today);

    var box=el('<div class="tl"><div class="tl-head"><span class="lbl">Thread timeline</span><span class="lbl">'+threads.length+' threads</span></div><div class="tl-grid"></div></div>');
    var grid=box.querySelector(".tl-grid");

    // day header
    var dayRow=el('<div class="tl-days"></div>');

    });
    grid.appendChild(dayRow);

    // today line
    if(todayIdx>=0 && todayIdx<span){
      var leftPct = 120 + ( (todayIdx+0.5) / span ) * 0; // placeholder; we position per-cell instead
    }

    threads.forEach(function(t){
      var entry=t.entryDay||PERSONA_ENTRY[t.persona]||1;

      var track=lane.querySelector(".tl-track");
      // map day->touch
      var touchByDay={};
      CADENCE.forEach(function(c,i){
        var d=shiftWeekend(addDays(acct.start,(entry-1)+c.off));
        var di=daysBetween(acct.start,iso(d));
        touchByDay[di]={i:i,ch:c.ch,date:iso(d)};
      });
      for(var di=0; di<span; di++){
        var cell=el('<div class="tl-cell"></div>');
        if(touchByDay[di]){
          var tb=touchByDay[di];
          var tid=acct.id+"|"+t.id+"|"+tb.i;

          var over = !done && tb.date<today;
          var cls="dot "+tb.ch+" "+(done?"done":(over?"over":"todo"));

      '<span><span class="dot li todo" style="width:10px;height:10px"></span>LinkedIn</span>'+

      '<span><span class="dot over" style="width:10px;height:10px"></span>Overdue</span>'+

  // ---------- Engine 7 CSV import ----------
  function parseCSV(text){
    var rows=[], row=[], cur="", q=false;
    for(var i=0;i<text.length;i++){
      var c=text[i];
      if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
      else {
        if(c==='"')q=true;
        else if(c===','){ row.push(cur); cur=""; }
        else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(cur); rows.push(row); row=[]; cur=""; }
        else cur+=c;
      }
    }
    if(cur!=="" || row.length){ row.push(cur); rows.push(row); }
    return rows.filter(function(r){ return r.some(function(c){return (c||"").trim()!=="";}); });
  }
  function colMap(header){
    var m={}; header.forEach(function(h,i){ m[(h||"").trim().toLowerCase()]=i; });
    function find(){ for(var a=0;a<arguments.length;a++){ if(arguments[a] in m) return m[arguments[a]]; } return -1; }
    return {
      first:find("first name","firstname","first"),
      last:find("last name","lastname","last"),
      name:find("name","full name","contact"),
      email:find("email","email address"),
      company:find("company","company name","account"),
      title:find("job title","title"),
      li:find("linkedin url","linkedin","linkedin profile"),
      thread:find("outreach thread","thread","persona"),
      seq:find("sequence day","entry day","day"),
      chan:find("first touch channel","channel","first channel"),
      angle:find("outreach angle","angle","why this person"),
      status:find("lead status","status"),
      t1:find("touch 1 copy","touch 1","touch1 copy","linkedin 1","touch 1 message"),
      t2subj:find("touch 2 subject","email 1 subject","touch2 subject"),
      t2:find("touch 2 copy","touch 2","touch2 copy","email 1 body","touch 2 message"),
      t3:find("touch 3 copy","touch 3","touch3 copy","linkedin 2","touch 3 message"),
      t4subj:find("touch 4 subject","email 2 subject","touch4 subject"),
      t4:find("touch 4 copy","touch 4","touch4 copy","email 2 body","touch 4 message"),
      t5:find("touch 5 copy","touch 5","touch5 copy","call script","touch 5 message")
    };
  }
  function personaFrom(thread, status){
    var s=((thread||"")+" "+(status||"")).toLowerCase();
    if(s.indexOf("blocker")>-1 || s.indexOf("hold")>-1) return "Blocker";
    if(s.indexOf("champion")>-1) return "Champion";
    if(s.indexOf("evaluat")>-1 || s.indexOf("technical")>-1 || s.indexOf("tech")>-1) return "Technical Evaluator";
    if(s.indexOf("buyer")>-1 || s.indexOf("economic")>-1) return "Economic Buyer";
    return "Additional";
  }
  function channelFrom(s){ s=(s||"").toLowerCase(); if(s.indexOf("email")>-1)return"em"; if(s.indexOf("call")>-1)return"call"; return "li"; }
  function dayFrom(s, persona){ var m=(s||"").match(/\d+/); if(m) return parseInt(m[0],10); return PERSONA_ENTRY[persona]||1; }

  function importEngine7(text){
    var rows=parseCSV(text);
    if(rows.length<2) return {ok:false,msg:"No data rows found"};
    var cm=colMap(rows[0]);
    if(cm.name<0 && cm.first<0) return {ok:false,msg:"No Name column found — paste the Engine 7 CSV with its header row"};
    var byCompany={};
    var imported=0;
    for(var i=1;i<rows.length;i++){
      var r=rows[i];
      var get=function(idx){ return idx>=0 && idx<r.length ? (r[idx]||"").trim() : ""; };
      var name = cm.name>=0 ? get(cm.name) : (get(cm.first)+" "+get(cm.last)).trim();
      if(!name) continue;
      var company = get(cm.company) || "Imported account";
      var persona = personaFrom(get(cm.thread), get(cm.status));
      var thread={
        id:"t"+Date.now()+"_"+i+"_"+Math.floor(Math.random()*999),
        name:name, title:get(cm.title), persona:persona,
        entryDay: persona==="Blocker"?0:dayFrom(get(cm.seq), persona),
        channel:channelFrom(get(cm.chan)),
        linkedin:get(cm.li), email:get(cm.email),
        angle:get(cm.angle)
      };
      // capture per-touch message copy (maps to the 5-touch cadence i=0..4)
      function withSubj(subj, body){ subj=(subj||"").trim(); body=(body||"").trim(); if(!body && !subj) return ""; return subj ? ("Subject: "+subj+"\n\n"+body) : body; }
      thread._msgs = {
        0: get(cm.t1),
        1: withSubj(get(cm.t2subj), get(cm.t2)),
        2: get(cm.t3),
        3: withSubj(get(cm.t4subj), get(cm.t4)),
        4: get(cm.t5)
      };
      (byCompany[company]=byCompany[company]||[]).push(thread);
      imported++;
    }
    var lastId=null;
    Object.keys(byCompany).forEach(function(company){
      var existing=state.accounts.find(function(a){return a.company.toLowerCase()===company.toLowerCase();});
      var acctId, threadsToAdd=byCompany[company];
      if(existing){ existing.threads=(existing.threads||[]).concat(threadsToAdd); acctId=existing.id; }
      else { acctId="a"+Date.now()+"_"+Math.floor(Math.random()*999); state.accounts.push({id:acctId, company:company, start:todayStr(), threads:threadsToAdd}); }
      // now that account id is known, drop any captured message copy into the matching touch slots
      threadsToAdd.forEach(function(t){
        if(t._msgs){
          for(var k=0;k<5;k++){ var v=(t._msgs[k]||"").trim(); if(v) state.notes[acctId+"|"+t.id+"|"+k]=v; }
          delete t._msgs;
        }
      });
      lastId=acctId;
    });
    if(lastId) state.activeId=lastId;
    return {ok:true, count:imported, accounts:Object.keys(byCompany).length};
  }

  function showImportForm(root){
    var f=el(
      '<div class="form">'+
        '<label class="full"><span class="lbl">Paste Engine 7 HubSpot CSV (include the header row)</span>'+
        '<textarea id="imp-text" style="height:160px; font-family:\'Geist Mono\',monospace; font-size:12.5px" placeholder="First Name,Last Name,Email,Company,Job Title,LinkedIn URL,Outreach Thread,Sequence Day,First Touch Channel,Outreach Angle,Lead Status&#10;Maya,Chen,m.chen@arcadia.io,Arcadia,Eng Manager,https://...,Thread 1 - Champion,Day 1,LinkedIn,Platform rearchitecture needs senior capacity,Outreach - Round 1"></textarea></label>'+
        '<div style="font-size:12.5px; color:var(--ink-2); margin:2px 0 12px; line-height:1.5">Campaign start date is set to <b>today</b> (Day 1). Sequence Day values become each contact\u2019s staggered entry. Edit the start date afterward in the account if needed.</div>'+
        '<div class="form-actions"><button class="btn ghost" id="imp-cancel">Cancel</button><button class="btn" id="imp-save">Import campaign</button></div>'+
      '</div>');
    root.insertBefore(f, root.children[2]);
    f.querySelector("#imp-text").focus();
    f.querySelector("#imp-cancel").addEventListener("click", function(){ f.remove(); });
    f.querySelector("#imp-save").addEventListener("click", function(){
      var txt=f.querySelector("#imp-text").value.trim();
      if(!txt){ toast("Paste a CSV first"); return; }
      var res=importEngine7(txt);
      if(!res.ok){ toast(res.msg); return; }
      Promise.all([persistAccounts(), persistNotes()]).then(function(){ render(); toast("Imported "+res.count+" contacts"); });
    });
  }

  function deleteAcct(id){
    state.accounts=state.accounts.filter(function(a){return a.id!==id;});
    if(state.activeId===id) state.activeId = state.accounts.length?state.accounts[0].id:null;
    persistAccounts().then(render);
  }
  function deleteThread(acctId,tid){
    var a=state.accounts.find(function(x){return x.id===acctId;});
    if(a) a.threads=a.threads.filter(function(t){return t.id!==tid;});
    persistAccounts().then(render);
  }

  // ---------- duplicate detection / cleanup ----------
  function normCompany(s){
    return (s||"").toLowerCase().trim()
      .replace(/[.,/&]/g," ")
      .replace(/\b(inc|llc|ltd|limited|corp|corporation|co|company|gmbh|sa|sas|srl|plc|the)\b/g," ")
      .replace(/\s+/g," ").trim();
  }
  function normContact(t){
    var e=(t.email||"").toLowerCase().trim();
    if(e) return "e:"+e;
    var li=(t.linkedin||"").toLowerCase().trim().replace(/\/+$/,"");
    if(li) return "l:"+li;
    var n=(t.name||"").toLowerCase().replace(/\s+/g," ").trim();
    return n ? "n:"+n : "";
  }
  function migrateKey(map, from, to){
    if(from===to) return;
    if(map[from]!=null){ if(map[to]==null) map[to]=map[from]; delete map[from]; }
  }
  function dedupeThreads(acct){
    var seen={}, kept=[], removed=0;
    (acct.threads||[]).forEach(function(t){
      var k=normContact(t);
      if(!k){ kept.push(t); return; }
      if(seen[k]){
        var keep=seen[k];
        ["title","email","linkedin","angle"].forEach(function(f){ if(!((keep[f]||"").trim()) && (t[f]||"").trim()) keep[f]=t[f]; });
        for(var c=0;c<5;c++){
          migrateKey(state.done, acct.id+"|"+t.id+"|"+c, acct.id+"|"+keep.id+"|"+c);
          migrateKey(state.notes, acct.id+"|"+t.id+"|"+c, acct.id+"|"+keep.id+"|"+c);
        }
        removed++;
      } else { seen[k]=t; kept.push(t); }
    });
    acct.threads=kept;
    return removed;
  }
  function countDuplicates(){
    var groups={}, dupAccts=0, dupThreads=0;
    state.accounts.forEach(function(a){ var k=normCompany(a.company)||("id:"+a.id); (groups[k]=groups[k]||[]).push(a); });
    Object.keys(groups).forEach(function(k){
      dupAccts += groups[k].length-1;
      var seen={};
      groups[k].forEach(function(a){ (a.threads||[]).forEach(function(t){ var ck=normContact(t); if(!ck) return; if(seen[ck]) dupThreads++; else seen[ck]=1; }); });
    });
    return { accounts:dupAccts, threads:dupThreads };
  }
  function runDedupe(){
    var groups={};
    state.accounts.forEach(function(a){ var k=normCompany(a.company)||("id:"+a.id); (groups[k]=groups[k]||[]).push(a); });
    var newAccounts=[], removedAccts=0, removedThreads=0;
    Object.keys(groups).forEach(function(k){
      var list=groups[k].slice().sort(function(a,b){ return (a.start||"").localeCompare(b.start||""); });
      var keep=list[0]; keep.threads=keep.threads||[];
      for(var i=1;i<list.length;i++){
        var b=list[i];
        (b.threads||[]).forEach(function(t){
          for(var c=0;c<5;c++){
            migrateKey(state.done, b.id+"|"+t.id+"|"+c, keep.id+"|"+t.id+"|"+c);
            migrateKey(state.notes, b.id+"|"+t.id+"|"+c, keep.id+"|"+t.id+"|"+c);
          }
          keep.threads.push(t);
        });
        removedAccts++;
      }
      removedThreads += dedupeThreads(keep);
      newAccounts.push(keep);
    });
    state.accounts=newAccounts;
    if(!state.accounts.some(function(a){return a.id===state.activeId;})) state.activeId=state.accounts.length?state.accounts[0].id:null;
    return { accounts:removedAccts, threads:removedThreads };
  }

  // ---------- auth / lock screen (passkeys via WebAuthn + Vercel KV) ----------
  function WA(){ return window.SimpleWebAuthnBrowser; }
  function lockErr(m){ var e=document.getElementById("lockErr"); if(e) e.textContent=m||""; }
  function lockBody(html){ document.getElementById("lockBody").innerHTML=html; }
  function showApp(show){
    document.querySelector("header").classList.toggle("hide", !show);
    document.querySelector(".wrap").classList.toggle("hide", !show);
    document.getElementById("lockScreen").classList.toggle("hide", show);
    document.getElementById("lockBtn").classList.toggle("hide", !(show && MODE.api));
  }
  function renderRegister(){
    lockErr("");
    lockBody('<p>Set up this device with your fingerprint or Face ID. No password needed.</p><button class="btn" id="doRegister">Set up fingerprint</button>');
    document.getElementById("doRegister").addEventListener("click", function(){ doRegister(); });
  }
  function renderUnlock(){
    lockErr("");
    lockBody(
      '<p>Unlock with your fingerprint or Face ID.</p>'+
      '<button class="btn" id="doUnlock">Unlock with fingerprint</button>'+
      '<div class="lock-alt">New device? <a id="showRec">Use recovery code</a></div>'+
      '<div class="lock-rec" id="recBox">'+
        '<input id="recInput" placeholder="XXXXX-XXXXX-XXXXX-XXXXX" autocomplete="off" autocapitalize="characters">'+
        '<button class="btn ghost" id="doRegisterRec">Add this device</button>'+
      '</div>'
    );
    document.getElementById("doUnlock").addEventListener("click", function(){ doUnlock(); });
    document.getElementById("showRec").addEventListener("click", function(){ document.getElementById("recBox").classList.toggle("show"); });
    document.getElementById("doRegisterRec").addEventListener("click", function(){ doRegister(document.getElementById("recInput").value.trim()); });
  }
  function renderRecoveryReveal(code){
    lockErr("");
    lockBody(
      '<p>Save this recovery code somewhere safe. It is the <b>only</b> way to add another device later. You will not see it again.</p>'+
      '<div class="reccode">'+esc(code)+'</div>'+
      '<button class="btn" id="recDone">I’ve saved it — continue</button>'
    );
    document.getElementById("recDone").addEventListener("click", function(){ showApp(true); render(); });
  }
  async function doRegister(recoveryCode){
    lockErr("");
    if(!WA()){ lockErr("Security library failed to load."); return; }
    try{
      var optRes=await fetch("/api/auth?action=register-options",{credentials:"same-origin"});
      if(!optRes.ok) throw new Error("Could not start setup");
      var options=await optRes.json();
      var attResp=await WA().startRegistration({ optionsJSON: options });
      var body={ attResp:attResp };
      if(typeof recoveryCode==="string" && recoveryCode) body.recoveryCode=recoveryCode;
      var verRes=await fetch("/api/auth?action=register-verify",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"same-origin",body:JSON.stringify(body)});
      var ver=await verRes.json();
      if(!verRes.ok || !ver.verified) throw new Error(ver.error||"Setup failed");
      await afterAuthLoad();
      if(ver.recoveryCode) renderRecoveryReveal(ver.recoveryCode);
      else { showApp(true); render(); }
    }catch(e){ lockErr((e&&e.message)||"Setup failed"); }
  }
  async function doUnlock(){
    lockErr("");
    if(!WA()){ lockErr("Security library failed to load."); return; }
    try{
      var optRes=await fetch("/api/auth?action=login-options",{credentials:"same-origin"});
      if(!optRes.ok) throw new Error("Could not start login");
      var options=await optRes.json();
      var authResp=await WA().startAuthentication({ optionsJSON: options });
      var verRes=await fetch("/api/auth?action=login-verify",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"same-origin",body:JSON.stringify({authResp:authResp})});
      var ver=await verRes.json();
      if(!verRes.ok || !ver.verified) throw new Error(ver.error||"Login failed");
      await afterAuthLoad();
      showApp(true); render();
    }catch(e){ lockErr((e&&e.message)||"Login failed"); }
  }
  async function afterAuthLoad(){
    try{
      var r=await fetch("/api/entries",{credentials:"same-origin"});
      if(r.ok){
        var d=await r.json();
        state.accounts=d.accounts||[]; state.done=d.done||{}; state.notes=d.notes||{}; state.seeded=!!d.seeded;
        state.activeId=((d.active===ALL && state.accounts.length) || (d.active && state.accounts.some(function(a){return a.id===d.active;})))?d.active:((state.accounts[0]&&state.accounts[0].id)||null);
        if(!state.seeded && state.accounts.length===0){ seed(); state.seeded=true; apiSave(); }
      }
    }catch(e){}
  }
  async function logout(){
    try{ await fetch("/api/auth?action=logout",{method:"POST",credentials:"same-origin"}); }catch(e){}
    showApp(false); renderUnlock();
  }
  async function boot(){
    var st=null;
    try{ var r=await fetch("/api/auth?action=status",{credentials:"same-origin"}); if(r.ok) st=await r.json(); }catch(e){}
    if(!st){ // no backend reachable — fall back to local (localStorage / in-memory)
      MODE.api=false; await load(); showApp(true); render(); return;
    }
    MODE.api=true;
    if(st.authenticated){ await afterAuthLoad(); showApp(true); render(); return; }
    showApp(false);
    if(st.registered) renderUnlock(); else renderRegister();
  }

  // ---------- render dispatcher ----------
  function render(){
    renderSelect();
    document.querySelectorAll(".tab").forEach(function(b){ b.setAttribute("aria-selected", b.dataset.view===state.view ? "true":"false"); });
    ["today","upcoming","accounts"].forEach(function(v){ document.getElementById("view-"+v).classList.toggle("hide", v!==state.view); });
    if(state.view==="today") renderToday();
    else if(state.view==="upcoming") renderUpcoming();
    else renderAccounts();
  }

  // ---------- events ----------
  document.querySelectorAll(".tab").forEach(function(b){ b.addEventListener("click", function(){ state.view=b.dataset.view; render(); }); });
  document.getElementById("acctSelect").addEventListener("change", function(e){ state.activeId=e.target.value; scheduleSave(); render(); });
  document.getElementById("seeAllBtn").addEventListener("click", function(){ state.view="accounts"; render(); window.scrollTo({top:0,behavior:"smooth"}); });
  document.getElementById("lockBtn").addEventListener("click", function(){ logout(); });

  // ---------- boot ----------
  boot();
})();
</script>
